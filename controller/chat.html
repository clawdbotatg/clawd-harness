<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fleet PM</title>
<style>
  :root{ --bg:#0b0e14; --panel:#121722; --line:#1e2633; --txt:#cdd6e4; --dim:#7c889b;
         --me:#1f6feb; --bot:#182030; --high:#ff5d5d; --med:#ffb13d; --low:#5db0ff; --ok:#3fb950; }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
       background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--line);
         background:var(--panel);flex-wrap:wrap}
  header h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.3px}
  header .sp{flex:1}
  select,button{background:#0d1320;color:var(--txt);border:1px solid var(--line);border-radius:7px;
         padding:6px 9px;font-size:12.5px;cursor:pointer}
  button:hover{border-color:#33405a}
  .badge{font-size:12px;color:var(--dim)}
  .badge b{color:var(--txt)}
  .pill{padding:2px 8px;border-radius:999px;font-size:11px;border:1px solid var(--line)}
  /* PM threads — the chat analog of per-project sessions */
  #threadbar{display:flex;align-items:center;gap:6px;padding:7px 10px;overflow-x:auto;
        border-bottom:1px solid var(--line);background:#0d1320;white-space:nowrap}
  #threadbar::-webkit-scrollbar{height:6px} #threadbar::-webkit-scrollbar-thumb{background:#1e2633;border-radius:3px}
  .tab{display:inline-flex;align-items:center;gap:6px;flex:0 0 auto;
        background:#121722;border:1px solid var(--line);border-radius:8px;padding:5px 8px;
        font-size:12.5px;color:var(--dim);cursor:pointer}
  .tab:hover{border-color:#33405a;color:var(--txt)}
  .tab.cur{color:#fff;border-color:var(--me);background:#172238}
  .tab.arch{opacity:.55;font-style:italic}
  .tab .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
  .tab .n{font-size:10.5px;color:var(--dim);background:#0d1320;border-radius:999px;padding:0 5px}
  .tab .x{color:var(--dim);font-weight:700;padding:0 3px;border-radius:4px}
  .tab .x:hover{color:var(--high);background:#1e2633}
  #newThread,#showArch{flex:0 0 auto;font-size:12.5px;padding:5px 9px}
  main{flex:1;display:flex;min-height:0}
  #chat{flex:1;display:flex;flex-direction:column;min-width:0}
  #log{flex:1;overflow:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:760px;padding:10px 13px;border-radius:12px;white-space:pre-wrap;word-wrap:break-word}
  .me{align-self:flex-end;background:var(--me);color:#fff;border-bottom-right-radius:4px}
  .bot{align-self:flex-start;background:var(--bot);border:1px solid var(--line);border-bottom-left-radius:4px}
  .trace{margin-top:7px;font-size:11.5px;color:var(--dim);border-top:1px dashed var(--line);padding-top:6px}
  .trace code{color:#8fb6ff}
  .think{align-self:flex-start;color:var(--dim);font-style:italic;font-size:12.5px}
  form{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line);background:var(--panel)}
  #box{flex:1;resize:none;background:#0d1320;color:var(--txt);border:1px solid var(--line);
       border-radius:9px;padding:10px;font:14px/1.4 inherit;max-height:140px}
  .navbtn{display:inline-block;margin-top:8px;padding:6px 12px;background:var(--me);color:#fff;
       border-radius:8px;font-size:12.5px;font-weight:600;text-decoration:none}
  .navbtn:hover{background:#2b7df5}
  #send{padding:0 18px;background:var(--me);color:#fff;border:none;border-radius:9px;font-weight:600}
  #send:disabled{opacity:.5}
  aside{width:300px;border-left:1px solid var(--line);background:var(--panel);overflow:auto;padding:12px}
  aside h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--dim);margin:4px 0 10px}
  .att{border:1px solid var(--line);border-radius:9px;padding:9px 10px;margin-bottom:8px;background:#0d1320}
  .att .t{font-weight:600;font-size:13px;display:flex;gap:6px;align-items:center}
  .att .s{color:var(--dim);font-size:12px;margin-top:3px}
  .att .a{font-size:11px;color:#8fb6ff;margin-top:5px}
  .att .a a.open{color:#8fb6ff;text-decoration:none;font-weight:600}
  .att .a a.open:hover{text-decoration:underline}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .high .dot{background:var(--high)} .medium .dot{background:var(--med)} .low .dot{background:var(--low)}
  .empty{color:var(--dim);font-size:12.5px}
  @media (max-width:760px){ aside{display:none} }
</style>
</head>
<body>
<header>
  <h1>🛰️ Fleet PM</h1>
  <span class="pill" id="attBadge">—</span>
  <span class="sp"></span>
  <span class="badge" id="brainLabel" title="The PM brain: claude -p on your subscription">claude</span>
  <a href="/debug" target="_blank" class="badge" style="text-decoration:none;color:#8fb6ff">🛠 debug</a>
  <span class="badge">writes</span>
  <select id="autonomy" title="Write autonomy">
    <option value="readonly">read-only</option>
    <option value="confirm">confirm</option>
    <option value="auto">auto</option>
  </select>
  <button id="reset" title="Clear this thread's context (keeps the thread)">🧹 clear</button>
</header>
<div id="threadbar"></div>
<main>
  <section id="chat">
    <div id="log"></div>
    <form id="f">
      <textarea id="box" rows="1" placeholder="Ask the PM… (e.g. 'anything need me?' or 'add a README to demo and start it')"></textarea>
      <button id="send" type="submit">Send</button>
    </form>
  </section>
  <aside>
    <h2>Needs you <span id="attCount"></span></h2>
    <div id="att"><div class="empty">loading…</div></div>
    <h2 style="margin-top:18px">Fleet</h2>
    <div id="fleet" class="empty">loading…</div>
    <h2 style="margin-top:18px">Recent events</h2>
    <div id="events" class="empty">—</div>
  </aside>
</main>
<script>
const $ = s => document.querySelector(s);
const log = $("#log"), box = $("#box");

function add(cls, text){
  const d = document.createElement("div");
  d.className = "msg " + cls; d.textContent = text;
  log.appendChild(d); log.scrollTop = log.scrollHeight; return d;
}
function navHref(r){
  // Rebuild against THIS browser's hostname so a link minted on localhost still
  // works when the chat is open over the LAN (phone). Direct mode carries an
  // explicit port (chat origin ≠ harness origin); fleet mode omits it (relay
  // serves both at one public origin → use location.origin, no :8788).
  if (r.path) return r.port ? location.protocol+"//"+location.hostname+":"+r.port+r.path
                            : location.origin+r.path;
  return r.url || null;
}
const GREETING = "Hi — I'm your fleet PM. Ask me what needs your attention, or tell me to start work on a project.";
function botEl(text, trace){
  const d = add("bot", text || "(no reply)");
  // Any read verb that built a deep link (open_session/open_project) → Open button.
  const nav = (trace || []).map(t => t.result)
    .filter(r => r && r.nav && navHref(r)).pop();
  if (nav){
    const a = document.createElement("a");
    a.className = "navbtn"; a.href = navHref(nav);
    a.textContent = "↗ Open " + (nav.cid
      ? "session: " + (nav.title || nav.cid)
      : "project: " + (nav.name || nav.pid));
    d.appendChild(a);
  }
  if (trace && trace.length){
    const tr = document.createElement("div");
    tr.className = "trace";
    tr.innerHTML = "did: " + trace.map(t => "<code>"+t.tool+"</code>").join(" → ");
    d.appendChild(tr);
  }
  return d;
}
function addBot(out){ return botEl(out.reply, out.trace); }
// Re-render the whole log from a thread's stored transcript (on thread switch).
function renderLog(messages){
  log.innerHTML = "";
  if (!messages || !messages.length){ add("bot", GREETING); return; }
  for (const m of messages){
    if (m.who === "me") add("me", m.text);
    else botEl(m.text, m.trace);
  }
}

async function jget(u){ const r = await fetch(u); return r.json(); }
async function jpost(u, b){ const r = await fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b||{})}); return r.json(); }

let busy = false;
async function sendMsg(text){
  if (busy || !text.trim()) return;
  busy = true; $("#send").disabled = true;
  add("me", text);
  const think = document.createElement("div");
  think.className = "think"; think.textContent = "thinking…"; log.appendChild(think);
  log.scrollTop = log.scrollHeight;
  try {
    const out = await jpost("/api/chat", {message: text});
    think.remove(); addBot(out);
  } catch(e){ think.remove(); add("bot", "⚠️ "+e); }
  busy = false; $("#send").disabled = false; box.focus(); refresh();
}

$("#f").addEventListener("submit", e => { e.preventDefault(); const t = box.value; box.value=""; box.style.height="auto"; sendMsg(t); });
box.addEventListener("input", ()=>{ box.style.height="auto"; box.style.height=Math.min(box.scrollHeight,140)+"px"; });
box.addEventListener("keydown", e => { if (e.key==="Enter" && !e.shiftKey){ e.preventDefault(); $("#f").requestSubmit(); }});
$("#autonomy").onchange = async e => { await jpost("/api/autonomy", {autonomy:e.target.value}); };

// -- PM threads — multiple conversations, switch / new / clear / archive ------
let threadState = {threads:[], current:null, archived_count:0};
let showArchived = false;

function renderThreads(s){
  threadState = s;
  const bar = $("#threadbar"); bar.innerHTML = "";
  for (const t of s.threads){
    if (t.archived && !showArchived) continue;
    const tab = document.createElement("div");
    tab.className = "tab" + (t.current?" cur":"") + (t.archived?" arch":"");
    tab.title = t.archived ? "archived — click to restore" : t.title;
    const nm = document.createElement("span"); nm.className = "nm"; nm.textContent = t.title;
    tab.appendChild(nm);
    if (t.count){ const c = document.createElement("span"); c.className="n"; c.textContent=t.count; tab.appendChild(c); }
    if (!t.archived){
      const x = document.createElement("span"); x.className="x"; x.textContent="✕"; x.title="archive thread";
      x.onclick = e => { e.stopPropagation(); archiveThread(t.id); };
      tab.appendChild(x);
    }
    tab.onclick = () => selectThread(t.id);
    bar.appendChild(tab);
  }
  const nb = document.createElement("button"); nb.id="newThread"; nb.textContent="＋ new"; nb.title="New thread";
  nb.onclick = newThread; bar.appendChild(nb);
  if (s.archived_count){
    const sa = document.createElement("button"); sa.id="showArch";
    sa.textContent = showArchived ? "hide archived" : ("🗄 "+s.archived_count);
    sa.title = "show / hide archived threads";
    sa.onclick = () => { showArchived = !showArchived; renderThreads(threadState); };
    bar.appendChild(sa);
  }
}
async function loadThreads(){ try{ renderThreads(await jget("/api/threads")); }catch(e){} }
async function loadMessages(){ const r = await jget("/api/thread/messages"); renderLog(r.messages); }

async function selectThread(id){
  if (id === threadState.current) return;
  renderThreads(await jpost("/api/thread/select", {id}));
  await loadMessages();
}
async function newThread(){
  showArchived = false;
  renderThreads(await jpost("/api/thread/new", {}));
  await loadMessages(); box.focus();
}
async function archiveThread(id){
  const wasCurrent = id === threadState.current;
  renderThreads(await jpost("/api/thread/archive", {id}));
  if (wasCurrent) await loadMessages();   // current moved → render the new current
}
$("#reset").onclick = async ()=>{ renderThreads(await jpost("/api/thread/clear", {})); await loadMessages(); };

let harnessInfo = null;        // {base, token, port} — for building deep links
function sessionHref(machine, pid, cid){
  if (!harnessInfo || !pid || !cid) return null;
  const path = (harnessInfo.token ? "/?t="+encodeURIComponent(harnessInfo.token) : "/")
             + "#/p/"+pid+"/s/"+cid;
  return harnessInfo.port
    ? location.protocol+"//"+location.hostname+":"+harnessInfo.port+path
    : harnessInfo.base+path;
}

async function refresh(){
  try{
    const st = await jget("/api/state");
    harnessInfo = st.harness || null;
    $("#autonomy").value = st.autonomy;
    // the PM brain is fixed (claude -p on the subscription); show its live label
    if (st.model) $("#brainLabel").textContent = st.model;
    const n = st.attention_count;
    $("#attBadge").textContent = n ? (n+" need you") : "all clear";
    $("#attBadge").style.color = n ? "var(--high)" : "var(--ok)";
    $("#attCount").textContent = n ? "("+n+")" : "";
    $("#fleet").innerHTML = st.machines.map(m =>
      `<div class="badge"><b>${m.id}</b> · ${m.connected?"online":"offline"} · ${m.sessions} sess</div>`).join("") || '<span class="empty">no machines</span>';
    const att = (await jget("/api/attention")).items || [];
    $("#att").innerHTML = att.length ? att.map(a => {
      const href = sessionHref(a.machine, a.pid, a.cid);
      const open = href ? ` · <a href="${href}" class="open">open ↗</a>` : "";
      return `<div class="att ${a.sev}"><div class="t"><span class="dot"></span>${a.title} <span class="badge">${a.cid}</span></div>
       <div class="s">${a.summary}</div><div class="a">→ ${a.suggested_action}${open}</div></div>`;
    }).join("")
      : '<div class="empty">nothing needs you 🎉</div>';
    const evs = ((await jget("/api/notifications")).events || []).slice(-8).reverse();
    const icon = k => k==="blocked"?"⏳":k==="turn_done"?"✓":k==="ended"?"■":"·";
    $("#events").innerHTML = evs.length ? evs.map(e =>
      `<div class="badge">${icon(e.kind)} <b>${e.cid?e.cid.slice(0,8):""}</b> ${e.summary||e.kind}</div>`).join("")
      : '<span class="empty">no events yet</span>';
    loadThreads();   // keep the thread bar (titles + msg counts) fresh
  }catch(e){ /* server may be mid-restart */ }
}
(async ()=>{ await loadThreads(); await loadMessages(); })();
refresh(); setInterval(refresh, 5000);
</script>
</body>
</html>
