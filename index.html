<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=0.9, minimum-scale=0.9, maximum-scale=0.9, user-scalable=no" />
<title>clawd-harness</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<style>
  /* ── terminal brutalist · amber phosphor ───────────────────────────────
     thesis: this is a terminal harness, so it should look like one. one
     monospace voice, true-black ground, hairline boxes, square corners,
     a single amber accent. no gradients, no soft shadows, no pills, no
     rounded "cards". structure is drawn with rules, not decoration. */
  :root { --bg:#000000; --panel:#0a0a0a; --raised:#101010; --edge:#262626; --edge-hi:#3b3b3b;
          --ink:#d9d7cf; --dim:#79726a; --accent:#e8a13a; --accent-dim:#6d5220; --accent-bg:#171002;
          --ok:#5fa563; --err:#d6564b; --tool:#9c8f54; --mono:ui-monospace,"SF Mono",Menlo,Monaco,"Courier New",monospace; }
  * { box-sizing:border-box; }
  ::selection { background:var(--accent); color:#000; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
              overscroll-behavior:none;   /* kill the browser's back/forward swipe overscroll */
              font:13px/1.55 var(--mono); -webkit-font-smoothing:antialiased; }
  #app { display:flex; flex-direction:column; height:100%; }
  header { display:flex; align-items:center; gap:11px; padding:7px 12px;
           border-bottom:1px solid var(--edge); background:var(--panel); }
  #logo { width:22px; height:22px; flex:0 0 auto; display:block; border:1px solid var(--edge); }
  header h1 { font-size:13px; margin:0; font-weight:600; letter-spacing:.5px; text-transform:lowercase; cursor:pointer; }
  header h1:hover { color:var(--accent); }
  header .meta { color:var(--dim); font-size:12px; font-family:var(--mono);
                 flex:0 1 auto; min-width:0; max-width:32vw;
                 white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  @media (pointer: coarse) { header .meta { max-width:42vw; } }
  header .spacer { flex:1; }
  #dot { width:8px; height:8px; background:var(--err); flex:0 0 auto; }   /* square status LED */
  #dot.up { background:var(--ok); }
  /* second header row: session tabs for the current project, busy→idle→dead, left to right */
  #sessionbar { display:flex; align-items:center; gap:6px; padding:5px 12px;
                border-bottom:1px solid var(--edge); background:var(--panel);
                overflow-x:auto; white-space:nowrap; scrollbar-width:none; }
  #sessionbar::-webkit-scrollbar { display:none; }
  #sessionbar[hidden] { display:none; }
  #sessionbar .stab { display:inline-flex; align-items:center; gap:6px; flex:0 0 auto;
                      padding:4px 9px; border:1px solid var(--edge); background:transparent;
                      color:var(--dim); font-size:12px; font-family:var(--mono); cursor:pointer;
                      max-width:170px; }
  #sessionbar .stab:hover { border-color:var(--edge-hi); color:var(--ink); }
  #sessionbar .stab.active { border-color:var(--accent); color:var(--accent); background:var(--accent-bg); }
  #sessionbar .stab .sdot { width:7px; height:7px; background:var(--ok); flex:0 0 auto; }   /* square LED, matches sessions page */
  #sessionbar .stab .sdot.busy { background:var(--accent); animation:pulse 1.1s ease-in-out infinite; }
  #sessionbar .stab .sdot.dead { background:var(--err); }
  #sessionbar .stab .lbl { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #status { font-size:11px; padding:3px 9px; border:1px solid var(--edge); text-transform:uppercase;
            letter-spacing:.1em; color:var(--dim); white-space:nowrap; cursor:pointer; user-select:none; }
  #status:hover { border-color:var(--edge-hi); color:var(--ink); }
  #status.pmopen { border-color:var(--accent); color:var(--accent); }
  #status.needs { border-color:var(--err); color:var(--err); }
  #status::before { content:"["; margin-right:5px; color:var(--dim); }
  #status::after  { content:"]"; margin-left:5px;  color:var(--dim); }
  #status.working { color:var(--accent); border-color:var(--accent-dim); background:var(--accent-bg); }
  #status.idle    { color:var(--ok); border-color:#22401f; background:#07120a; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #status.working { animation:pulse 1.1s ease-in-out infinite; }
  /* live "claude is thinking" row, pinned to the bottom of the transcript while a turn is in flight */
  .thinking { display:flex; align-items:center; gap:9px; padding:2px 4px;
              color:var(--dim); font-size:12px; font-family:var(--mono); }
  .thinking .spin { flex:none; color:var(--accent); font-family:var(--mono);
                    font-size:14px; line-height:12px; width:10px; text-align:center;
                    text-shadow:0 0 6px var(--accent); }
  .thinking .lbl { animation:pulse 1.1s ease-in-out infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  main { flex:1; display:flex; min-height:0;
         touch-action:pan-y; }   /* we own horizontal swipes (page nav); leave vertical scroll to the browser */
  .col { display:flex; flex-direction:column; min-width:0; min-height:0; }
  #left  { flex:1; }
  #right { flex:1; background:var(--bg); }
  .col.hidden { display:none; }
  #term { flex:1; min-height:0; padding:6px 4px 0 8px; background:#000; touch-action:pan-y;
          overflow:hidden; }
  /* bottom-justify the TTY: the xterm grid fills #term (so the PTY size claude sees is the
     real height), but claude prints its content into the TOP rows and leaves the rest of the
     grid blank — that's the black gap. We can't reflow content that lives inside the grid, so
     bottomJustifyTTY() translates the rendered .xterm-screen down by the unused height; the
     now-empty bottom rows slide past #term's edge and are clipped (overflow:hidden). Content
     anchors to the bottom, TUI-style, matching #feed. Self-disabling once content fills/scrolls. */
  /* xterm's viewport is its own overflow:scroll box and defaults to touch-action:auto,
     which re-grabs horizontal gestures the browser would otherwise leave to our swipe
     handler — that's the "swipe-back is janky on the TUI" bug. Pin it to pan-y like main. */
  .xterm-viewport, .xterm-screen, .xterm-scroll-area { touch-action:pan-y !important; }
  .xterm-viewport { -webkit-overflow-scrolling:touch; }   /* momentum scroll on iOS instead of frame-by-frame drag */
  #feed, #pmfeed { flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
          padding:12px; display:flex; flex-direction:column; gap:9px;
          width:100%; max-width:880px; align-self:center; }
  /* anchor content to the bottom (TUI-style): short transcripts sit at the bottom and
     grow upward; once content overflows, the auto-margin collapses and scrolling is normal. */
  #feed > :first-child, #pmfeed > :first-child { margin-top:auto; }
  /* messages read like a terminal log: flat ground, hairline box, a 2px left rule
     no colored rules — every turn is the same neutral box; you read the
     speaker from its uppercase tag, like log lines, not chat bubbles. */
  .msg { border:1px solid var(--edge); padding:6px 11px 8px; max-width:100%;
         white-space:pre-wrap; word-break:break-word; background:var(--panel); }
  .msg .who { font-size:10px; text-transform:uppercase; letter-spacing:.16em; color:var(--dim);
              margin:0 -11px 6px; padding:0 11px 5px; border-bottom:1px solid var(--edge); }
  .msg .who:empty { display:none; }
  /* user turns get a faint amber wash + amber edge so you can scan the
     transcript and spot at a glance where *you* spoke amid claude's output */
  .msg.user      { background:rgba(232,161,58,.07); border-color:var(--accent-dim); }
  .msg.user .who      { color:var(--accent); }
  .msg.assistant { background:var(--panel); }
  .msg.assistant .who { color:var(--ink); }
  .msg.tool      { background:#0a0a08; font-family:var(--mono); font-size:12px; }
  .msg.tool .who { color:var(--tool); }
  .msg.tool_result { background:#070707; color:var(--dim);
                     font-family:var(--mono); font-size:12px; padding:0; }
  .msg.tool_result details { padding:0; }
  .msg.tool_result summary { cursor:pointer; padding:7px 11px; list-style:none;
                             color:var(--dim); user-select:none; }
  .msg.tool_result summary::-webkit-details-marker { display:none; }
  .msg.tool_result summary::before { content:"+ "; color:var(--accent); }
  .msg.tool_result details[open] summary::before { content:"- "; }
  .msg.tool_result summary:hover { color:var(--ink); }
  .msg.tool_result .result-body { padding:0 11px 9px; white-space:pre-wrap; word-break:break-word;
                                  max-height:280px; overflow:auto; border-top:1px solid var(--edge); margin-top:2px; }
  .msg.result    { background:#070707; color:var(--dim); font-size:12px; }
  .msg.cmd  { background:#0c0a05; color:var(--accent);
              font-family:var(--mono); font-size:12px; }
  .msg.sys  { background:#070707; color:var(--dim); font-size:12px; font-style:italic; }
  /* rendered markdown inside bubbles */
  .md { white-space:normal; }
  .md p { margin:0 0 6px; }
  .md strong { color:#fff; font-weight:650; }
  .md em { font-style:italic; }
  .md a { color:var(--accent); text-underline-offset:2px; }
  .md code { background:#000; border:1px solid var(--edge); padding:1px 4px;
             font-family:var(--mono); font-size:12px; color:var(--accent); }
  .md pre { background:#000; border:1px solid var(--edge); padding:9px 11px;
            overflow:auto; max-height:300px; margin:6px 0; }
  .md pre code { background:none; border:0; padding:0; white-space:pre; color:inherit; }
  .msg .toolname { color:var(--tool); font-weight:600; }
  footer { border-top:1px solid var(--edge); background:var(--panel); padding:10px 12px;
           display:flex; flex-direction:column; gap:8px; }
  /* AI session name shown just above the message box so you know what this
     long-running session is when you return to it. Hidden when there's no title. */
  #sessiondesc { font-size:13px; line-height:1.3;
                 white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #sessiondesc:empty { display:none; }
  #sessiondesc .sd-project { color:#fff; font-weight:600; }
  #sessiondesc .sd-title { color:var(--accent); font-weight:600; }
  #sessiondesc .sd-desc { color:var(--dim); font-weight:400; }
  @media (pointer: coarse) { #sessiondesc { font-size:5px; } }
  .inputrow { display:flex; gap:8px; align-items:flex-end; }
  #keys { display:flex; flex-wrap:wrap; gap:6px; }
  #keys button { background:var(--raised); border:1px solid var(--edge); color:var(--ink);
                 padding:7px 11px; font-size:13px; min-width:40px;
                 font-family:var(--mono); cursor:pointer; }
  #keys button:hover { border-color:var(--accent); color:var(--accent); }
  #keys button:active { background:var(--accent); color:#000; }
  #attachments { display:flex; flex-wrap:wrap; gap:6px; }
  #attachments:empty { display:none; }
  /* queued messages: acked locally (amber), removed once they land in the transcript */
  #pending { display:flex; flex-direction:column; gap:6px; margin-bottom:8px; }
  #pending:empty { display:none; }
  .pending-msg { display:flex; gap:8px; align-items:flex-start; background:var(--accent-bg);
                 border:1px solid var(--accent-dim); color:#e9d4a4;
                 padding:7px 10px; font-size:13px; white-space:pre-wrap; word-break:break-word; }
  .pending-msg .tag { flex:0 0 auto; font-size:10px; text-transform:uppercase; letter-spacing:.1em;
                      color:var(--accent); padding-top:2px; }
  .chip { display:flex; align-items:center; gap:6px; background:var(--raised); border:1px solid var(--edge);
          padding:4px 8px; font-size:12px; color:var(--ink); }
  .chip img { width:30px; height:30px; object-fit:cover; border:1px solid var(--edge); }
  .chip.up { color:var(--dim); font-style:italic; }
  .chip button { background:transparent; border:0; color:var(--dim); cursor:pointer; padding:0 2px;
                 font-weight:700; font-size:14px; }
  .chip button:hover { color:var(--err); }
  /* field-sizing:content lets the browser grow AND shrink the textarea to fit its
     content in its own layout engine — so clearing box.value on send snaps it back
     to min-height instantly, with no JS call to forget (the old autosizeBox() patch
     had to be re-run after every programmatic value change and kept regressing).
     Browsers without it fall back to the JS autosize below. */
  #box { flex:1; resize:none; field-sizing:content; min-height:38px; max-height:160px;
         background:var(--raised); color:var(--ink);
         border:1px solid var(--edge); padding:9px 11px; font:inherit; }
  /* 13px on mobile (small, per request). iOS Safari would normally auto-zoom on focus for a field
     under ~16 visual px, but the viewport's maximum-scale=1 caps zoom so it can't — so small type
     here no longer triggers the zoom. Scoped to coarse pointers so the desktop input keeps its
     inherited size. */
  @media (pointer: coarse) { #box { font-size:13px; } }
  @media (pointer: fine) { #box { min-height:58px; } }   /* desktop: a little taller resting height */
  #box:focus { outline:none; border-color:var(--accent); }
  #box::placeholder { color:var(--dim); }
  /* voice column: speaker (TTS) over mic (STT), stacked to the left of the box */
  #voice { display:flex; flex-direction:column; gap:6px; flex:0 0 auto; }
  #voice button { background:var(--raised); border:1px solid var(--edge); color:var(--ink);
                  padding:7px 9px; font-size:15px; line-height:1; cursor:pointer; }
  #voice button:hover { border-color:var(--accent); }
  #voice button:disabled { opacity:.35; cursor:default; }
  #voice button.on { border-color:var(--accent); background:var(--accent-bg); }
  #ttsBtn.speaking { border-color:var(--accent); animation:vpulse 1.4s infinite; }
  #micBtn.rec { border-color:var(--err); background:#1c0c0a; animation:vpulse 1s infinite; }
  @keyframes vpulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  button { background:var(--accent); color:#000; border:0; padding:10px 16px;
           font-family:var(--mono); font-weight:600; cursor:pointer; }
  /* right-side action column: attach-image over send, mirroring the voice column on the left */
  #actions { display:flex; flex-direction:column; gap:6px; flex:0 0 auto; }
  #actions button { padding:7px 9px; font-size:15px; line-height:1; font-weight:400; }
  #imgBtn { background:var(--raised); border:1px solid var(--edge); color:var(--ink); }
  #imgBtn:hover { border-color:var(--accent); }
  #send { background:var(--raised); border:1px solid var(--edge); color:var(--ink); }
  #send:hover { border-color:var(--accent); }
  button:disabled { opacity:.4; cursor:default; }
  .hint { color:var(--dim); font-size:11px; padding:0 12px 8px; }
  #phoneBtn, #panelBtn, #menuBtn, #projectsBtn, #machinesBtn { background:transparent; border:1px solid var(--edge); color:var(--dim);
              padding:5px 10px; font-size:12px; font-family:var(--mono); text-transform:lowercase; letter-spacing:.04em;
              white-space:nowrap; }
  #phoneBtn:hover, #panelBtn:hover, #menuBtn:hover, #projectsBtn:hover, #machinesBtn:hover:hover { color:var(--ink); border-color:var(--edge-hi); }
  #panelBtn.on, #menuBtn.on, #projectsBtn.on, #machinesBtn.on.on { color:var(--accent); border-color:var(--accent); }
  .bico { font-size:14px; line-height:1; }
  /* Fleet PM — folded into the harness as a first-class view: PM threads ride the
     same #sessionbar tab strip, and the chat reuses the transcript #feed look.
     #pmfeed inherits the #feed rules (see the #feed selectors above). */
  .msg .pmopen { display:inline-block; margin-top:7px; padding:4px 10px; border:1px solid var(--accent);
                 color:var(--accent); border-radius:6px; font-size:11px; text-decoration:none; }
  .msg .pmopen:hover { background:var(--accent-bg); }
  /* PM thread tabs: same .stab look as session tabs, plus a subtle archive ✕ and
     trailing management controls (new / clear / show-archived). */
  #sessionbar .stab.pmtab .x { color:var(--dim); font-weight:700; padding:0 2px; margin-left:1px; border-radius:3px; }
  #sessionbar .stab.pmtab .x:hover { color:var(--err); background:var(--edge); }
  #sessionbar .stab.arch { opacity:.55; font-style:italic; }
  #sessionbar .pmctl { display:inline-flex; align-items:center; flex:0 0 auto; gap:4px;
        background:transparent; border:1px solid var(--edge); color:var(--dim); border-radius:6px;
        padding:4px 9px; font-size:11px; font-family:var(--mono); cursor:pointer; }
  #sessionbar .pmctl:hover { border-color:var(--accent); color:var(--accent); }
  #sessionbar select.pmctl { -webkit-appearance:none; appearance:none; padding-right:9px; }
  /* mobile: collapse header to icon-only buttons so the bar fits + stops over-scrolling */
  @media (pointer: coarse) {
    header { gap:8px; padding:8px 10px; }
    header .blbl { display:none; }
    #phoneBtn, #panelBtn, #menuBtn, #projectsBtn, #machinesBtn { padding:6px 9px; }
    #status { font-size:11px; padding:3px 8px; }
    #brand { display:none; }
  }
  /* projects (top rung) + sessions (next rung): both are scrollable card lists */
  #menu, #projects, #machines { flex:1; background:var(--bg); }
  #sessions, #projectlist, #machinelist { flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
              padding:14px; display:flex; flex-direction:column; gap:9px;
              width:100%; max-width:780px; align-self:center; }
  /* project cards reuse .scard; status colors + an add-project row */
  .scard.cloning, .scard.error { cursor:default; }
  .scard.cloning { opacity:.75; }
  .sdot.cloning { background:var(--accent); animation:pulse 1.1s ease-in-out infinite; }
  .sdot.err { background:var(--err); }
  .scard .scount { color:var(--dim); font-size:11px; font-family:var(--mono);
                   border:1px solid var(--edge); padding:1px 8px; flex:0 0 auto; }
  .scard .swork { color:var(--accent); border-color:var(--accent-dim); background:var(--accent-bg);
                  animation:pulse 1.1s ease-in-out infinite; }
  .scard .swait { color:#ffce9e; border-color:var(--err); background:rgba(214,77,42,.12);
                  animation:pulse 1.1s ease-in-out infinite; }
  .scard .serror { color:var(--err); font-size:12px; word-break:break-word; }
  #addProject { display:flex; flex-direction:column; gap:8px; border:1px dashed var(--edge);
                padding:12px 14px; }
  #addProject input { background:var(--raised); color:var(--ink); border:1px solid var(--edge);
                      padding:9px 11px; font:inherit; }
  @media (pointer: coarse) { #addProject input { font-size:18px; } }
  #addProject input:focus { outline:none; border-color:var(--accent); }
  #addProject .arow { display:flex; gap:8px; }
  #addProject .arow button { flex:1; font-size:13px; padding:8px 10px; }
  #addProject .ahint { color:var(--dim); font-size:11px; }
  /* the card: a plain hairline box; the whole border lights amber when active/hovered */
  .scard { border:1px solid var(--edge); padding:11px 14px; background:var(--panel);
           cursor:pointer; display:flex; flex-direction:column; gap:4px; position:relative; }
  .scard:hover { border-color:var(--edge-hi); }
  .scard.active { border-color:var(--accent); background:#0e0e0e; }
  .scard .row { display:flex; align-items:center; gap:9px; }
  .scard .sdot { width:7px; height:7px; background:var(--ok); flex:0 0 auto; }   /* square LED */
  .scard .sdot.busy { background:var(--accent); animation:pulse 1.1s ease-in-out infinite; }
  .scard .sdot.blocked { background:var(--err); animation:pulse 1.1s ease-in-out infinite; }
  .scard .sdot.dead { background:var(--err); }
  .scard .stitle { font-weight:600; font-size:13px; flex:1; min-width:0;
                   overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .scard .sdesc { color:var(--dim); font-size:12px; line-height:1.4; }
  /* live "what it's doing now" digest (volatile) vs the stable .sdesc summary */
  .scard .sdig { color:#9b937f; font-size:12px; line-height:1.4; font-style:italic; }
  /* the high-signal "needs you" line — a session blocked on a human decision */
  .scard .sblock { color:#ffce9e; font-size:12px; line-height:1.4; background:rgba(214,77,42,.10);
                   border-left:2px solid var(--err); padding:3px 8px; margin-top:1px; }
  .scard .smeta { color:var(--dim); font-size:11px; font-family:var(--mono); }
  /* compact CPU/RAM/disk/GPU bars on a machine card */
  .sysstats { display:flex; flex-direction:column; gap:2px; margin-top:2px; }
  .sysrow { display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:10.5px; color:var(--dim); }
  .syslab { flex:0 0 26px; text-transform:uppercase; letter-spacing:.04em; }
  .systrack { flex:1; height:5px; min-width:34px; background:var(--raised); border:1px solid var(--edge); }
  .sysfill { display:block; height:100%; }
  .sysval { flex:0 0 auto; color:var(--dim); white-space:nowrap; }
  .scard .sclose { position:absolute; top:8px; right:9px; background:transparent; border:0; color:var(--dim);
                   font-size:15px; cursor:pointer; padding:2px 5px; line-height:1; }
  .scard .sclose:hover { color:var(--err); background:var(--raised); }
  #newSession { border:1px dashed var(--edge); padding:11px 14px; background:transparent;
                color:var(--dim); cursor:pointer; font-family:var(--mono); font-size:13px; text-align:left; font-weight:500; }
  #newSession:hover { color:var(--accent); border-color:var(--accent-dim); }
  .menutitle { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.16em;
               padding:0 2px 2px; }
  #qrmodal { position:fixed; inset:0; background:rgba(0,0,0,.78); display:flex;
             align-items:center; justify-content:center; z-index:50; }
  #qrmodal[hidden] { display:none; }
  .qrcard { background:var(--panel); border:1px solid var(--edge); border-top:2px solid var(--accent);
            padding:22px; text-align:center; max-width:340px; }
  #qrcode { background:#fff; padding:12px; display:inline-block; }
  #qrcode img, #qrcode canvas { display:block; }
  .qrurl { font-family:var(--mono); font-size:11px; color:var(--dim);
           margin:12px 0; word-break:break-all; }
  /* token entry — shown only when no token is in the URL or localStorage */
  #login, #passkey { position:fixed; inset:0; background:var(--bg); display:flex;
           align-items:center; justify-content:center; z-index:70; padding:20px; }
  #login[hidden], #passkey[hidden] { display:none; }
  #login .qrcard, #passkey .qrcard { max-width:360px; width:100%; }
  #login .lh, #passkey .lh { color:var(--ink); font-size:14px; font-weight:600; margin-bottom:4px; }

  #rebootovl .rb-title { font-size:18px; font-weight:600; letter-spacing:.2px; }

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
<script>
// Kill all zoom on mobile. The viewport meta (user-scalable=no, min=max=scale)
// handles Android/Chrome, but iOS Safari deliberately *ignores* user-scalable=no
// for accessibility — so we also defeat its two zoom gestures in JS:
//   1. pinch  → Safari fires non-standard `gesture*` events; preventDefault them.
//   2. double-tap → suppress the second tap when it lands <300ms after the first.
['gesturestart', 'gesturechange', 'gestureend'].forEach(t =>
  document.addEventListener(t, (e) => e.preventDefault(), { passive: false }));
let _lastTouchEnd = 0;
document.addEventListener('touchend', (e) => {
  const now = e.timeStamp;
  if (now - _lastTouchEnd <= 300) e.preventDefault();   // collapse double-tap zoom
  _lastTouchEnd = now;
}, { passive: false });
// Touch devices (phones/tablets): make the terminal a read-only mirror. Mobile
// dictation/IME streams partial, self-revising text that xterm forwards as
// overlapping keystrokes ("thithis issthis is a…"), so all input goes through
// the message box (which gets native dictation/paste/image handling for free).
const isTouch = window.matchMedia('(pointer: coarse)').matches;
// Preferred deep view when you dive into a session: desktop drives the live
// terminal (full keyboard, drives the TUI directly); touch reads the transcript
// (native scroll/markdown, no xterm input pain). You can still toggle to the
// other with the panel button — this is just the default landing.
const DEEP_VIEW = isTouch ? 'transcript' : 'tty';
const term = new Terminal({
  fontFamily: 'ui-monospace, Menlo, Monaco, "Courier New", monospace',
  fontSize: 13, cursorBlink: !isTouch,
  theme: { background: '#000000', foreground: '#d9d7cf', cursor: '#e8a13a',
           cursorAccent: '#000000', selectionBackground: '#e8a13a55' },
  scrollback: 5000, disableStdin: isTouch,
});
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open(document.getElementById('term'));
fit.fit();

// Bottom-justify the TTY: claude prints into the top rows of a full-height grid and leaves
// the rest blank. Translate the rendered screen down by the unused height so content anchors
// to the bottom (the empty rows clip past #term's edge). Self-disables once content fills the
// viewport or the user scrolls history — then the last visible row is non-empty and off→0.
function bottomJustifyTTY() {
  const screen = term.element && term.element.querySelector('.xterm-screen');
  const rowsEl = term.element && term.element.querySelector('.xterm-rows');
  if (!screen || !rowsEl || !rowsEl.children.length) return;
  let last = -1;
  for (let i = 0; i < rowsEl.children.length; i++)
    if (rowsEl.children[i].textContent.trim()) last = i;
  // Blank/transient frame (nothing painted yet): never translate. off would be
  // the full grid height, sliding the whole screen below #term's clipped edge —
  // and an idle session emits no further render to recover, so the terminal
  // vanishes entirely. This is the "I can't see the tty at all" bug.
  if (last < 0) { screen.style.transform = ''; return; }
  const cell = rowsEl.children[0].offsetHeight || 0;
  // Anchor the last content row a constant GAP px above #term's inner bottom edge.
  // Measure against the *container's* content height — NOT the rendered grid height
  // (screen.clientHeight) — so the gap stays consistent regardless of xterm's
  // whole-row fit rounding. Otherwise the sub-cell remainder leaks into the gap and
  // some window heights look tight (~6px) while others look loose (~16px); GAP also
  // keeps the row clear of the clip edge so it's never sliced. Clamp ≥0 so a full /
  // scrolled screen (content taller than the viewport) stays pegged to the bottom.
  const GAP = 12;
  const termEl = document.getElementById('term');
  const tcs = termEl && getComputedStyle(termEl);
  const availH = termEl ? termEl.clientHeight - parseFloat(tcs.paddingTop) - parseFloat(tcs.paddingBottom) : screen.clientHeight;
  const off = Math.max(0, availH - (last + 1) * cell - GAP);
  screen.style.transform = off ? 'translateY(' + off + 'px)' : '';
}
term.onRender(bottomJustifyTTY);

// Inserting/removing a header row (the session-tabs bar, the restart banner)
// shrinks or grows <main> without firing a window resize, so xterm keeps its
// stale row count and the TTY sits mis-positioned until you manually resize the
// window. Refit on any such layout change (only meaningful while viewing the
// terminal). rAF so we measure after the browser has reflowed the new bar.
function refitTTY() {
  if (currentView() !== 'tty') return;
  requestAnimationFrame(() => { fit.fit(); sendResize(); term.refresh(0, term.rows - 1); term.scrollToBottom(); bottomJustifyTTY(); });
}

// A HARD repaint — exactly what dragging the window border does. The real bug:
// term.open() and the first fit.fit() run at BOOT, while #term is display:none
// (the app lands on the projects rung first). xterm measures the character cell
// against a hidden element → caches a wrong/zero cell size → every row then
// renders with squished, overlapping glyphs. fit.fit() and a resize round-trip
// both REUSE that cached measurement, so they never fix it — only a window
// resize did, because that path forces xterm to RE-MEASURE the cell while it's
// visible. So we re-measure here: nudging fontSize down-and-back drives xterm's
// own re-measure + full re-render pipeline (public options API) against the
// now-visible element, then fit.fit() recomputes rows/cols with the correct
// cell size. This is the behaviour you get when you nudge the window, done
// deliberately on landing.
function hardRepaint() {
  if (currentView() !== 'tty') return;
  const el = document.getElementById('term');
  if (!el || !el.clientHeight) return;     // still hidden / zero-size → measuring now would re-cache garbage; wait for a later pass
  const fs = term.options.fontSize || 13;
  term.options.fontSize = fs - 1;          // each assignment fires xterm's re-measure + full re-render…
  term.options.fontSize = fs;              // …ending back at the right size, now measured while visible
  fit.fit();                               // recompute rows/cols against the corrected cell size
  sendResize();
  term.scrollToBottom();
  bottomJustifyTTY();
}

// Showing the terminal un-hides #term from display:none. While hidden xterm
// can't measure its container, so the grid keeps whatever size it last fit to
// (often stale/tiny). Hard-repaint at several settle points because layout +
// web-font metrics land at different moments across devices; the resize
// round-trip is cheap once the size has converged.
function showTTY() {
  if (currentView() !== 'tty') return;
  // double rAF → measure only after the browser has laid out the now-visible panel
  requestAnimationFrame(() => requestAnimationFrame(hardRepaint));
  setTimeout(hardRepaint, 120);   // fallback for layout that settles a frame late
  // glyph metrics can change when the monospace web-font finishes loading — repaint once it's ready
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(hardRepaint);
}

// After subscribing we set this flag; the replayed screen arrives as one or more
// async PTY bursts (see ws.onmessage). We can't repaint until that content is in
// the buffer, so we debounce: each PTY write reschedules, and ~80ms after the
// burst goes quiet we hard-repaint ONCE. Cleared after firing so live streaming
// during an active turn never triggers it (that content paints normally).
let hardRepaintTimer = null, pendingHardRepaint = false;
function armHardRepaint() {
  pendingHardRepaint = true;
  scheduleHardRepaint();
  setTimeout(() => { if (pendingHardRepaint) { pendingHardRepaint = false; hardRepaint(); } }, 600);  // backstop if a burst never goes quiet
}
function scheduleHardRepaint() {
  if (!pendingHardRepaint || currentView() !== 'tty') return;
  clearTimeout(hardRepaintTimer);
  hardRepaintTimer = setTimeout(() => { pendingHardRepaint = false; hardRepaint(); }, 80);
}

// The composer (footer) grows whenever an image chip is attached, a pending
// message is queued, the key bar appears, or the textarea wraps — each shrinks
// <main> without a window resize, so xterm keeps its stale (taller) row count
// and its bottom rows end up clipped behind the footer (the "tty hidden under
// the textarea" bug). Watch the footer's box and refit the TTY on any size
// change so the grid always matches the space actually left for it.
new ResizeObserver(() => refitTTY()).observe(document.querySelector('footer'));

const dot = document.getElementById('dot');
const meta = document.getElementById('meta');
const statusEl = document.getElementById('status');
// Status pill: emoji always shows; the word label is hidden on mobile (.blbl).
// Set text via textContent (not innerHTML) so tool labels can't inject markup.
function setStatus(emoji, text, cls) {
  // #status doubles as the Fleet PM launcher; preserve the open marker across
  // session-status updates so the emoji state and the PM affordance coexist.
  const open = statusEl.classList.contains('pmopen');
  statusEl.className = (cls || '') + (open ? ' pmopen' : '');
  statusEl.innerHTML = '<span class="bico"></span><span class="blbl"></span>';
  statusEl.firstChild.textContent = emoji;
  statusEl.lastChild.textContent = ' ' + text;
}
const feed = document.getElementById('feed');
const box = document.getElementById('box');
const sendBtn = document.getElementById('send');
const sessionsEl = document.getElementById('sessions');
const projectsEl = document.getElementById('projectlist');
const pendingEl = document.getElementById('pending');
const composer = document.querySelector('footer');

let ws = null, decoder = new TextDecoder();
let currentMachine = null;      // fleet machine this browser is driving (null = machines rung)
let machineList = [];           // latest roster from the relay
let currentCid = null;          // session this browser is viewing
let currentTitle = '';          // title of the viewed session (for the breadcrumb)
let currentPid = null;          // project this browser has selected
let sessionList = [];           // latest session metadata from the server
let projectList = [];           // latest project metadata from the server
let projectFilter = '';         // live filter text in the projects add/search box
let gotSessions = false;        // have we received the first sessions snapshot?
let pendingNav = null;          // nav state parsed from the URL, awaiting server data
let pendingNewFocus = false;    // a `new` we issued — its focus should switch us in
let pendingSendText = null;     // text typed on the sessions list — delivered once the new session boots
let lastWrittenHash = '';       // the hash we last wrote, so hashchange ignores our own writes

// Token handling: the relay still accepts ?t=<token> in the URL (so a shared
// link / QR carries it), but we don't LEAVE it in the address bar — on first load
// we stash it in localStorage and strip it from the URL (replaceState), so it
// can't leak via history/screenshots. Later loads read it from storage; a device
// with neither gets a paste-the-token screen.
const TOKEN_KEY = 'cc_fleet_token';
function loadToken() {
  let t = '';
  try {
    const u = new URL(location.href);
    const fromUrl = u.searchParams.get('t');
    if (fromUrl) {
      t = fromUrl;
      try { localStorage.setItem(TOKEN_KEY, fromUrl); } catch {}
      u.searchParams.delete('t');                       // scrub it from the bar
      history.replaceState(null, '', u.pathname + u.search + u.hash);
    } else {
      t = localStorage.getItem(TOKEN_KEY) || '';
    }
  } catch {}
  return t;
}
// Mode: the relay injects window.__FLEET__ when it serves this page (fleet mode —
// machines rung, passkey, toMachine wrapping). The harness serves it untouched →
// FLEET is false → direct mode: talk to the local harness exactly as its own UI does.
const FLEET = !!window.__FLEET__;
// Fleet mode is passkey-only — NO token (the passkey is the sole credential).
// Direct (harness) mode no longer requires a token either: the harness skips auth
// on its loopback bind (only local processes reach it). We still pick up a token if
// one is in the URL/storage — harmless, and it's what a LAN bind (BIND=0.0.0.0) needs.
const token = FLEET ? '' : loadToken();
let serverBoot = null;   // server process id; a change across reconnect = daemon restart → reload
let authFails = 0;       // consecutive socket closes that never opened → likely a bad/expired token
// -- Fleet PM ('pm' view): its own conversation threads, the chat analog of a
// project's sessions. State mirrors the session model so the PM rides the same
// #sessionbar tab strip + transcript #feed look. Talks to the controller over the
// same-origin /pm/* proxy (HTTP), independent of the harness WS.
let pmThreads = [];      // [{id,title,archived,count,current}]
let pmCurrent = null;    // selected thread id
let pmMessages = [];     // current thread's transcript [{who,text,trace}]
let pmArchOpen = false;  // whether archived threads are revealed in the bar
let pmLoaded = false, pmBusy = false;
let pmState = { models: [], model: '', backend: 'bankr' };  // /api/state cache for the model picker
// PM thinking-spinner state (declared early — hoisted render fns touch it at boot)
let pmThinkEl = null, pmThinkTimer = null, pmSpinTimer = null, pmThinkStart = 0, pmSpinFrame = 0;

function clearToken() { try { localStorage.removeItem(TOKEN_KEY); } catch {} }

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  // Fleet mode dials the RELAY as a mobile client; direct mode dials the harness.
  ws = new WebSocket(`${proto}://${location.host}/ws?${FLEET ? 'role=mobile' : 't=' + encodeURIComponent(token)}`);
  ws.binaryType = 'arraybuffer';
  let opened = false;

  ws.onopen = () => {
    opened = true; authFails = 0;   // a successful open proves the token is good
    dot.classList.add('up');
    if (!FLEET) { sendResize(); if (!currentCid) meta.textContent = ''; return; }  // direct: the harness pushes projects
    if (!currentMachine) { meta.textContent = ''; return; }   // on the machines rung — nothing to re-sync
    // Reconnects get a fresh relay mobile id → the worker opens a fresh harness
    // link, so re-fetch this machine's projects/sessions and re-subscribe.
    hsend({ type: 'list' });
    if (currentCid) hsend({ type: 'subscribe', cid: currentCid });
    sendResize();
  };
  ws.onclose = () => {
    dot.classList.remove('up');
    for (const k of Object.keys(e2eChans)) delete e2eChans[k];   // sessions die with the connection → re-handshake
    // A close *before* we ever opened usually means auth: the browser hides the 403
    // behind code 1006, so we infer a bad/expired token from repeated pre-open
    // closes and surface the paste-a-new-token screen (also how a weekly rotation
    // lands the user back at login). But
    // when we KNOW the server is restarting (`_updating` — the `go`/reload path is
    // in flight), a pre-open close is *expected*: the daemon is mid-respawn, not
    // rejecting us. Tripping the login kill-switch here `return`s without arming
    // another reconnect, tearing the loop down — so the BOOT_ID-after-reconnect
    // reload never fires and the user is stranded on the "Updating…" overlay until
    // the 25s safety net (or a manual reload). So while updating, skip the check
    // and just keep retrying until the server is back and a new boot id reloads us.
    // Threshold of 4 (≈4.8s at the 1200ms retry) — not 2 — so a *hard* restart
    // (launchctl/env-change, which sends no `go`, so `_updating` is false) gets time
    // to respawn before we mistake the gap for a bad token and strand the user on
    // login instead of the BOOT_ID-after-reconnect reload. A truly expired token
    // still surfaces login within a few seconds.
    if (!FLEET && !opened && !_updating && ++authFails >= 4) {   // direct mode only: bad/expired harness token
      clearToken();
      return showLogin('Token expired or invalid — paste a current one.');
    }
    meta.textContent = 'reconnecting…';
    setTimeout(connect, 1200);
  };
  ws.onmessage = (e) => {
    if (typeof e.data === 'string') { FLEET ? handleRelay(JSON.parse(e.data)) : handleJson(JSON.parse(e.data)); }
    else if (FLEET) { handleBinary(e.data); }
    else { term.write(new Uint8Array(e.data), () => term.scrollToBottom()); scheduleHardRepaint(); }   // direct: raw PTY — debounce a hard repaint of the replayed screen
  };
}

// Route a harness control frame to the server. Fleet mode wraps it for the
// current machine (toMachine); direct mode sends it straight to the harness —
// so every call site that used to do ws.send(JSON.stringify(frame)) goes here.
function hsend(frame) {
  if (!ws || ws.readyState !== 1) return;
  if (!FLEET) { ws.send(JSON.stringify(frame)); return; }
  if (!currentMachine) return;
  const ch = e2eChans[currentMachine];
  if (ch && ch.status === 'open') { e2eSendFrame(currentMachine, frame); return; }
  e2eEnsure(currentMachine).catch(() => {});   // start the secure handshake if needed
  e2eChans[currentMachine].queue.push(frame);  // queued until the channel opens
}

// Relay → us. `machineMsg` carries a harness frame (act on it only if it's from
// the machine we're viewing); `machines` is the roster; `error` is a relay error.
function handleRelay(m) {
  if (m.type === 'authRequired') { onAuthRequired(m); return; }
  if (m.type === 'authOk') {
    if (m.session) saveSession(m.session, m.expires);
    hidePasskey(); meta.textContent = '';
    // re-sync the viewed machine after a (re)auth — onopen's sends were pre-auth
    if (currentMachine) { hsend({ type: 'list' }); if (currentCid) hsend({ type: 'subscribe', cid: currentCid }); sendResize(); }
    return;
  }
  if (m.type === 'machines') { hidePasskey(); renderMachines(m.machines || []); return; }
  if (m.type === 'machineMsg') {
    const msg = m.msg || {};
    if (msg.t === 'e2e.shello' || msg.t === 'e2e.resumed' || msg.t === 'e2e.done' || msg.t === 'e2e.err') { e2eOnCtl(m.machine, msg); return; }
    if (msg.t === 'e2e.rec') { e2eOnRecord(m.machine, b64uDec(msg.r)); return; }
    return;   // fail-closed: never act on a plaintext harness frame from a machine
  }
  if (m.type === 'error') { meta.textContent = 'relay: ' + (m.error || 'error'); return; }
}

// Relay → us, binary: [1-byte len][machineId ascii][PTY bytes]. Feed the PTY to
// the terminal only when it's tagged with the machine we're currently viewing.
function handleBinary(buf) {
  const u = new Uint8Array(buf);
  if (!u.length) return;
  const n = u[0];
  const machine = decoder.decode(u.subarray(1, 1 + n));
  e2eOnRecord(machine, u.subarray(1 + n));   // encrypted PTY record → decrypt in seq order
}

// ---- passkey second factor (native WebAuthn — zero deps) -------------------
const b64uDec = (s) => { s = s.replace(/-/g, '+').replace(/_/g, '/'); s += '='.repeat((4 - s.length % 4) % 4);
  const bin = atob(s), u = new Uint8Array(bin.length); for (let i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i); return u; };
const b64uEnc = (buf) => { const u = new Uint8Array(buf); let s = ''; for (let i = 0; i < u.length; i++) s += String.fromCharCode(u[i]);
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, ''); };

// ============================================================================
// fleet-e2e/1 — end-to-end channel between this mobile and a machine's worker.
// See docs/fleet/E2E-PROTOCOL.md. Every byte string below MUST match fleet/e2e.py.
// The relay only ever sees ciphertext; a malicious relay degrades to DoS.
// fleet/test_e2e_interop.py extracts the region between the markers to cross-check.
// [e2e-core-begin]
const E2E = (() => {
  const te = new TextEncoder();
  const PROTO = te.encode('fleet-e2e/1');
  const DIR_M2W = 0x4D, DIR_W2M = 0x57, KIND_JSON = 0x01, KIND_BIN = 0x02;
  const C = crypto, S = crypto.subtle;

  const concat = (...a) => { let n = 0; for (const x of a) n += x.length; const o = new Uint8Array(n); let i = 0; for (const x of a) { o.set(x, i); i += x.length; } return o; };
  const u16 = (n) => new Uint8Array([(n >> 8) & 0xff, n & 0xff]);
  const u64 = (n) => { const b = new Uint8Array(8); let x = BigInt(n); for (let i = 7; i >= 0; i--) { b[i] = Number(x & 0xffn); x >>= 8n; } return b; };
  const rd64 = (b) => Number(new DataView(b.buffer, b.byteOffset, 8).getBigUint64(0));
  const lp = (...parts) => { const segs = []; for (const p of parts) { segs.push(u16(p.length), p); } return concat(...segs); };
  const eq = (a, b) => { if (a.length !== b.length) return false; let d = 0; for (let i = 0; i < a.length; i++) d |= a[i] ^ b[i]; return d === 0; };
  const sha256 = async (b) => new Uint8Array(await S.digest('SHA-256', b));
  const hmac = async (key, msg) => new Uint8Array(await S.sign('HMAC', await S.importKey('raw', key, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']), msg));
  const hkdf = async (salt, ikm, info, len = 32) => new Uint8Array(await S.deriveBits({ name: 'HKDF', hash: 'SHA-256', salt, info }, await S.importKey('raw', ikm, 'HKDF', false, ['deriveBits']), len * 8));
  const verifySig = async (ikRaw, sigRaw, data) => S.verify({ name: 'ECDSA', hash: 'SHA-256' }, await S.importKey('raw', ikRaw, { name: 'ECDSA', namedCurve: 'P-256' }, false, ['verify']), sigRaw, data);

  async function keySchedule(Z, midB, epk_m, n_m, epk_w, n_w, ik_w) {
    const salt = await sha256(lp(n_m, n_w));
    const Th = await sha256(lp(PROTO, midB, epk_m, n_m, epk_w, n_w, ik_w));
    const exp = (label) => hkdf(salt, Z, concat(te.encode(label), Th), 32);
    return {
      Th,
      k_m2w: await exp('fleet-e2e/1 key m2w'),
      k_w2m: await exp('fleet-e2e/1 key w2m'),
      iv_m2w: (await exp('fleet-e2e/1 iv m2w')).slice(0, 4),
      iv_w2m: (await exp('fleet-e2e/1 iv w2m')).slice(0, 4),
      kc_m: await exp('fleet-e2e/1 confirm-m'),
      kc_w: await exp('fleet-e2e/1 confirm-w'),
      challenge: await sha256(concat(te.encode('fleet-e2e/1 webauthn-challenge'), Th)),
      resume_master: await exp('fleet-e2e/1 resume-master'),
      resume_id: (await exp('fleet-e2e/1 resume-id')).slice(0, 16),
    };
  }

  // Resumption (§7): derive fresh keys from the stored master + the worker's rn.
  async function resumeKeyset(master, rn) {
    const k = async (label, len = 32) => (await hkdf(rn, master, te.encode(label), 32)).slice(0, len);
    return {
      k_m2w: await k('fleet-e2e/1 rkey m2w'), k_w2m: await k('fleet-e2e/1 rkey w2m'),
      iv_m2w: await k('fleet-e2e/1 riv m2w', 4), iv_w2m: await k('fleet-e2e/1 riv w2m', 4),
    };
  }
  async function resumeSession(master, rn) { return new Session(await resumeKeyset(master, rn)).init(); }
  const resumeConfirm = (master, rn) => hmac(master, concat(te.encode('fleet-e2e/1 resume-confirm'), rn));

  // An open channel: directional AES-GCM keys + monotonic sequence. seal/open are
  // serialized by the caller (sendChain/recvChain) so sequence order is preserved.
  class Session {
    constructor(keys) {   // mobile role: send=m2w, recv=w2m
      this.kS = keys.k_m2w; this.ivS = keys.iv_m2w; this.dS = DIR_M2W;
      this.kR = keys.k_w2m; this.ivR = keys.iv_w2m; this.dR = DIR_W2M;
      this.seqS = 0; this.seqRmax = -1;
    }
    async init() {
      this._eS = await S.importKey('raw', this.kS, 'AES-GCM', false, ['encrypt']);
      this._eR = await S.importKey('raw', this.kR, 'AES-GCM', false, ['decrypt']);
      return this;
    }
    async seal(kind, payload) {
      const seq = this.seqS++;
      const nonce = concat(this.ivS, u64(seq));
      const aad = concat(new Uint8Array([this.dS]), u64(seq));
      const ct = new Uint8Array(await S.encrypt({ name: 'AES-GCM', iv: nonce, additionalData: aad, tagLength: 128 }, this._eS, concat(new Uint8Array([kind]), payload)));
      return concat(u64(seq), ct);
    }
    async open(record) {
      if (record.length < 8 + 16) throw new Error('short');
      const seq = rd64(record.subarray(0, 8));
      if (seq <= this.seqRmax) throw new Error('replay');
      const nonce = concat(this.ivR, u64(seq));
      const aad = concat(new Uint8Array([this.dR]), u64(seq));
      let inner;
      try { inner = new Uint8Array(await S.decrypt({ name: 'AES-GCM', iv: nonce, additionalData: aad, tagLength: 128 }, this._eR, record.subarray(8))); }
      catch { throw new Error('auth'); }
      if (seq <= this.seqRmax) throw new Error('replay');
      this.seqRmax = seq;
      return { kind: inner[0], payload: inner.subarray(1) };
    }
  }

  // Drives the client half of the handshake. The assertion (Face ID) is acquired
  // by the caller between auth() and build() so it can run inside a user gesture.
  function client(midStr, pinnedIkW) {
    const midB = te.encode(midStr);
    let eph, n_m, epk_m, keys, ikW;
    return {
      async hello() {
        eph = await S.generateKey({ name: 'ECDH', namedCurve: 'P-256' }, true, ['deriveBits']);
        epk_m = new Uint8Array(await S.exportKey('raw', eph.publicKey));
        n_m = C.getRandomValues(new Uint8Array(32));
        return { t: 'e2e.hello', epk_m: b64uEnc(epk_m), n_m: b64uEnc(n_m), proto: 'fleet-e2e/1' };
      },
      // Verify the worker's signed ephemeral + derive keys. Returns the WebAuthn
      // challenge (caller obtains the assertion) and build() to finish.
      async auth(sh) {
        const epk_w = b64uDec(sh.epk_w), n_w = b64uDec(sh.n_w), ik_w = b64uDec(sh.ik_w), sig = b64uDec(sh.sig_w);
        if (pinnedIkW && !eq(ik_w, pinnedIkW)) throw new Error('pin');
        const T1 = await sha256(lp(PROTO, midB, epk_m, n_m, epk_w, n_w, ik_w));
        if (!(await verifySig(ik_w, sig, T1))) throw new Error('worker-sig');
        const peer = await S.importKey('raw', epk_w, { name: 'ECDH', namedCurve: 'P-256' }, false, []);
        const Z = new Uint8Array(await S.deriveBits({ name: 'ECDH', public: peer }, eph.privateKey, 256));
        keys = await keySchedule(Z, midB, epk_m, n_m, epk_w, n_w, ik_w);
        ikW = ik_w;
        return {
          challenge: keys.challenge, ikW: ik_w,
          build: async (assertion) => ({ t: 'e2e.auth', assertion, cf_m: b64uEnc(await hmac(keys.kc_m, te.encode('fleet-e2e/1 client-finished'))) }),
        };
      },
      async done(sd) {
        const expect = await hmac(keys.kc_w, te.encode('fleet-e2e/1 server-finished'));
        if (!eq(expect, b64uDec(sd.cf_w))) throw new Error('server-confirm');
        return new Session(keys).init();
      },
      fingerprint() { return E2E._fp(ikW); },
      resumeMaterial() { return { id: b64uEnc(keys.resume_id), master: b64uEnc(keys.resume_master) }; },
    };
  }

  async function _fp(ikRaw) {
    const h = await sha256(ikRaw);
    const b32 = ((bytes) => { const A = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567'; let bits = 0, val = 0, out = ''; for (const b of bytes) { val = (val << 8) | b; bits += 8; while (bits >= 5) { out += A[(val >>> (bits - 5)) & 31]; bits -= 5; } } return out; })(h).slice(0, 20);
    return b32.match(/.{1,5}/g).join(' ');
  }

  return { client, resumeSession, resumeConfirm, KIND_JSON, KIND_BIN, _fp, _eq: eq,
    _test: { keySchedule, Session, lp, sha256, hmac, hkdf, concat, u64, rd64, verifySig, resumeKeyset } };
})();
// [e2e-core-end]

// ---- E2E integration: per-machine secure channels over the relay -----------
// One E2E channel per machine. All harness traffic for a machine is sealed with
// its channel; the relay only routes ciphertext. The handshake's passkey is
// bound to the channel keys, so the worker (and optionally the relay) verifies a
// human authorized THIS channel — independent of the relay's edge gate.
const e2eChans = {};   // machine -> { status, session, queue, sendChain, recvChain, dSH, dSD, ready, fp }
function e2eDeferred() { let r, j; const p = new Promise((res, rej) => { r = res; j = rej; }); p.resolve = r; p.reject = j; return p; }
function e2ePin(m) { try { return localStorage.getItem('cc_e2e_pin_' + m); } catch { return null; } }
function e2eSetPin(m, b) { try { localStorage.setItem('cc_e2e_pin_' + m, b); } catch {} }
// Resumption material (per machine): lets a reload re-attach with NO passkey,
// within the worker's hard TTL. The master is key material on disk for ≤ this
// window — the convenience/secrecy trade (a malicious relay still can't read it).
// Keep in sync with FLEET_E2E_MAX_TTL on the worker (fleet/fleet.env): the
// shorter of the two wins, so a mismatch silently forces an early re-passkey.
const RESUME_TTL_MS = 24 * 60 * 60 * 1000;
function e2eLoadResume(m) { try { const s = JSON.parse(localStorage.getItem('cc_e2e_rs_' + m) || 'null'); return (s && s.exp > Date.now()) ? s : null; } catch { return null; } }
function e2eSaveResume(m, id, master) { try { localStorage.setItem('cc_e2e_rs_' + m, JSON.stringify({ id, master, exp: Date.now() + RESUME_TTL_MS })); } catch {} }
function e2eClearResume(m) { try { localStorage.removeItem('cc_e2e_rs_' + m); } catch {} }

// Reveal the gnome first, then prompt for the passkey. We let the modal paint for
// REVEAL_MS so you actually SEE "what's the safe word?" before the OS sheet, then
// auto-fire (works on desktop / while the tap activation is fresh). If the browser
// needs an explicit gesture (iOS), the modal stays and the tap fires it.
const REVEAL_MS = 350;
function e2eGetAssertion(machine, challengeBytes) {
  const req = lastAuthReq || {};
  const get = () => navigator.credentials.get({ publicKey: {
    challenge: challengeBytes, rpId: req.rpId || location.hostname,
    allowCredentials: (req.credentialIds || []).map(id => ({ id: b64uDec(id), type: 'public-key' })),
    userVerification: 'required', timeout: 60000,
  } }).then(a => ({ credentialId: b64uEnc(a.rawId), clientDataJSON: b64uEnc(a.response.clientDataJSON),
    authenticatorData: b64uEnc(a.response.authenticatorData), signature: b64uEnc(a.response.signature) }));
  return new Promise((resolve) => {
    const el = document.getElementById('passkey');
    document.getElementById('passkeysub').textContent = 'unlock ' + machine + ' — whisper the safe word';
    const btn = document.getElementById('passkeybtn');
    btn.textContent = 'whisper the safe word 🔒';
    let firing = false;
    const fire = () => { if (firing) return; firing = true; meta.textContent = 'passkey…';
      get().then(a => { el.hidden = true; resolve(a); })
           .catch(() => { firing = false; meta.textContent = ''; });   // gesture needed → tap fires it
    };
    btn.onclick = fire;
    el.hidden = false;
    setTimeout(fire, REVEAL_MS);
  });
}

async function e2eEnsure(machine) {
  const cur = e2eChans[machine];
  if (cur && cur.status === 'open') return cur;
  if (cur && cur.status === 'handshaking') return cur.ready;
  const ch = e2eChans[machine] = { status: 'handshaking', session: null, queue: [],
    sendChain: Promise.resolve(), recvChain: Promise.resolve(),
    dSH: e2eDeferred(), dSD: e2eDeferred(), dRes: e2eDeferred() };
  ch.ready = (async () => {
    // 1) Silent resume (no passkey) if we have unexpired material.
    const rs = e2eLoadResume(machine);
    if (rs) {
      try {
        meta.textContent = 'resuming ' + machine + '…';
        e2eSendCtl(machine, { t: 'e2e.resume', id: rs.id });
        const r = await ch.dRes;                                  // {rn, cf}
        const master = b64uDec(rs.master), rn = b64uDec(r.rn);
        if (!E2E._eq(await E2E.resumeConfirm(master, rn), b64uDec(r.cf))) throw new Error('resume-cf');
        ch.session = await E2E.resumeSession(master, rn);
        ch.status = 'open'; meta.textContent = '';
        const q = ch.queue; ch.queue = [];
        for (const fr of q) e2eSendFrame(machine, fr);
        return ch;
      } catch (e) {                                               // expired/dropped → re-handshake
        e2eClearResume(machine); ch.dSH = e2eDeferred(); ch.dSD = e2eDeferred();
      }
    }
    // 2) Full handshake (passkey via the gnome modal).
    const pinB64 = e2ePin(machine);
    const cli = E2E.client(machine, pinB64 ? b64uDec(pinB64) : null);
    meta.textContent = 'securing ' + machine + '…';
    e2eSendCtl(machine, await cli.hello());
    const sh = await ch.dSH;                              // ServerHello (worker-signed)
    const { challenge, ikW, build } = await cli.auth(sh); // verify sig + pin, derive keys
    if (!pinB64) { e2eSetPin(machine, b64uEnc(ikW)); ch.firstPin = true; }   // TOFU
    const assertion = await e2eGetAssertion(machine, challenge);      // Face ID, channel-bound
    hidePasskey();
    e2eSendCtl(machine, await build(assertion));          // ClientAuth
    const sd = await ch.dSD;                              // ServerDone (key confirmation)
    ch.session = await cli.done(sd);
    ch.fp = await cli.fingerprint();
    e2eSaveResume(machine, cli.resumeMaterial().id, cli.resumeMaterial().master);  // no-passkey reloads
    ch.status = 'open';
    meta.textContent = ch.firstPin ? ('🔒 pinned · ' + ch.fp) : '';
    const q = ch.queue; ch.queue = [];
    for (const fr of q) e2eSendFrame(machine, fr);
    return ch;
  })().catch((e) => {
    ch.status = 'failed';
    if ((e && e.message) === 'pin') { meta.textContent = '⚠ ' + machine + ' identity changed — refusing'; alert('SECURITY: ' + machine + "'s key changed since you first connected. Refusing to connect. If you reinstalled the worker, clear the pin in settings."); }
    else { meta.textContent = 'secure channel failed: ' + ((e && e.message) || e); console.error('[e2e] handshake failed for', machine, e); }
    throw e;
  });
  return ch.ready;
}

function e2eSendCtl(machine, msg) { if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'toMachine', machine, msg })); }

function e2eSendFrame(machine, frame) {
  const ch = e2eChans[machine];
  if (!ch || ch.status !== 'open') { if (ch) ch.queue.push(frame); return; }
  const bytes = new TextEncoder().encode(JSON.stringify(frame));
  ch.sendChain = ch.sendChain.then(async () => {
    const rec = await ch.session.seal(E2E.KIND_JSON, bytes);
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'toMachine', machine, msg: { t: 'e2e.rec', r: b64uEnc(rec) } }));
  }).catch(() => {});
}

function e2eOnCtl(machine, msg) {
  const ch = e2eChans[machine];
  if (!ch) return;
  if (msg.t === 'e2e.shello') ch.dSH.resolve(msg);
  else if (msg.t === 'e2e.resumed') ch.dRes.resolve(msg);
  else if (msg.t === 'e2e.done') ch.dSD.resolve(msg);
  else if (msg.t === 'e2e.err') { const e = new Error(msg.error || 'worker error'); ch.dRes.reject(e); ch.dSH.reject(e); ch.dSD.reject(e); if (ch.status !== 'open') ch.status = 'failed'; }
}

// Decrypt a record (from the JSON path or the binary PTY path) in seq order.
function e2eOnRecord(machine, rec) {
  const ch = e2eChans[machine];
  if (!ch || !ch.session) return;
  ch.recvChain = ch.recvChain.then(async () => {
    let out;
    try { out = await ch.session.open(rec); } catch { return; }   // drop bad/replayed
    if (machine !== currentMachine) return;
    if (out.kind === E2E.KIND_BIN) { term.write(out.payload, () => term.scrollToBottom()); scheduleHardRepaint(); }
    else handleJson(JSON.parse(new TextDecoder().decode(out.payload)));
  }).catch(() => {});
}

const SESSION_KEY = 'cc_fleet_session';
function loadSession() { try { const s = JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); return (s && s.exp > Date.now()) ? s.tok : ''; } catch { return ''; } }
function saveSession(tok, expMs) { try { localStorage.setItem(SESSION_KEY, JSON.stringify({ tok, exp: expMs || Date.now() + 86400000 })); } catch {} setPmCookie(tok); }
function clearSession() { try { localStorage.removeItem(SESSION_KEY); } catch {} setPmCookie(''); }
// Mirror the passkey session token into a /pm-scoped cookie so the relay can gate
// the PM surface (chat + debug iframe) on the same auth. Set after every auth.
function setPmCookie(tok) {
  try {
    const sec = location.protocol === 'https:' ? '; Secure' : '';
    document.cookie = tok
      ? `pmt=${tok}; path=/pm; max-age=86400; SameSite=Strict${sec}`
      : `pmt=; path=/pm; max-age=0; SameSite=Strict${sec}`;
  } catch {}
}

let lastAuthReq = null;
function showPasskey(msg) {
  const el = document.getElementById('passkey');
  document.getElementById('passkeysub').textContent = msg;
  const btn = document.getElementById('passkeybtn');
  btn.textContent = 'whisper the safe word 🔒';
  btn.onclick = () => { el.hidden = true; doAssertion(lastAuthReq); };
  el.hidden = false;
}
function hidePasskey() { const el = document.getElementById('passkey'); if (el) el.hidden = true; }

function onAuthRequired(m) {
  lastAuthReq = m;
  if (m.reason === 'expired') clearSession();
  const sess = loadSession();
  if (sess) { setPmCookie(sess); ws.send(JSON.stringify({ type: 'auth', session: sess })); return; }
  // No web enrollment: if no passkey is provisioned, an admin must add one.
  if (!m.enrolled || !(m.credentialIds || []).length) {
    showPasskey('no passkey set up for this relay — an admin must provision one (see DEPLOY.md)');
    return;
  }
  // Show the gnome and let the user tap to scan — a real user gesture, and the
  // experience they asked for ("what's the safe word?").
  showPasskey("prove it's you — unlock with your passkey");
  setTimeout(() => doAssertion(m), REVEAL_MS);   // reveal the gnome, then auto-try (tap is the fallback)
}

async function doAssertion(m) {
  if (!m || doAssertion._busy) return;
  doAssertion._busy = true;
  meta.textContent = 'passkey…';
  try {
    const a = await navigator.credentials.get({ publicKey: {
      challenge: b64uDec(m.challenge), rpId: m.rpId,
      allowCredentials: (m.credentialIds || []).map(id => ({ id: b64uDec(id), type: 'public-key' })),
      userVerification: 'preferred', timeout: 60000,
    } });
    const r = a.response;
    ws.send(JSON.stringify({ type: 'auth', id: b64uEnc(a.rawId),
      clientDataJSON: b64uEnc(r.clientDataJSON), authenticatorData: b64uEnc(r.authenticatorData), signature: b64uEnc(r.signature) }));
  } catch (e) {
    meta.textContent = '';
    showPasskey('the gnome awaits — whisper the safe word to enter');
  } finally {
    doAssertion._busy = false;
  }
}

// -- graceful restart: pending banner (waits for all-idle) + go overlay -------
const rebootbar = document.getElementById('rebootbar');
const rebootmsg = document.getElementById('rebootmsg');
const rebootovl = document.getElementById('rebootovl');
function renderReboot(m) {
  const wasHidden = rebootbar.hidden;
  if (!m.pending) { rebootbar.hidden = true; if (!wasHidden) refitTTY(); return; }
  const n = m.busy || 0;
  const wait = n ? `waiting for ${n} session${n > 1 ? 's' : ''} to finish…`
                 : 'all idle — restarting now…';
  rebootmsg.textContent = `restart pending${m.reason ? ' (' + m.reason + ')' : ''} — ${wait}`;
  rebootbar.hidden = false;
  if (wasHidden) refitTTY();
}
// Unified "Updating…" modal: the clawd-harness logo + a message, then a guaranteed
// hard reload. Every update path funnels through here — a live UI edit (server
// stays up), a graceful daemon restart (server's `go`), and a plain socket-drop +
// new BOOT_ID (covers a hard restart, e.g. `launchctl` reloading the daemon for an
// env change). `scheduleReload` is re-armable: the `go` path arms a long safety
// fallback, and the BOOT_ID-after-reconnect path (server is provably back, since it
// just spoke to us) overrides it with a short reload. Idempotent overlay; the
// caret is snapshotted so the reload doesn't steal where you were typing.
let _updating = false, _reloadTimer = null;
function showRebootOverlay(label, sub) {
  rebootbar.hidden = true;
  if (label) document.getElementById('rebootlbl').textContent = label;
  if (sub) document.getElementById('rebootsub').textContent = sub;
  rebootovl.hidden = false;
}
function scheduleReload(delay) {
  if (_reloadTimer) clearTimeout(_reloadTimer);
  _reloadTimer = setTimeout(() => location.reload(), delay);
}
function beginUpdate(label, delay) {
  _updating = true;
  snapshotBoxFocus();
  showRebootOverlay(label || 'Updating…');
  scheduleReload(delay);
}
document.getElementById('rebootCancel').onclick = () => {
  hsend({ type: 'restartCancel' });
};

function handleJson(m) {
  if (m.type === 'reload') {        // server saw index.html change on disk → live-reload
    // Direct mode only: this page IS the harness's served HTML, so a disk edit
    // means reload. In fleet mode the page comes from the RELAY (its own copy) —
    // a remote machine's harness reloading is irrelevant to us, and acting on it
    // just flashes the phone every time someone edits a laptop's index.html.
    if (FLEET) return;
    beginUpdate('Updating…', 900);  // server stays up; brief beat to show the modal, then reload
    return;
  }
  if (m.type === 'restart') {       // graceful self-restart: pending banner / go overlay
    if (m.state === 'go') {         // server is going down now; wait for it to return…
      _updating = true; snapshotBoxFocus();
      showRebootOverlay('Updating…');
      scheduleReload(25000);        // …safety net only — the BOOT_ID path below reloads sooner
      return;
    }
    renderReboot(m);
    return;
  }
  if (m.type === 'projects') {
    // Server boot id: if it changed since we last connected, the daemon
    // restarted — reconnecting the socket alone leaves a stale "thinking"
    // spinner (the in-flight turn's Stop never arrived), so hard-reload for
    // fresh state. Brief delay lets resumed sessions settle first.
    if (m.boot) {
      if (serverBoot && serverBoot !== m.boot) {
        // Daemon restarted and we've just reconnected (this very frame proves the
        // new server is up) → show the modal and hard-reload promptly for fresh
        // state. Overrides the `go` path's long safety fallback if it was armed.
        beginUpdate('Updating…', 1200);
        return;
      }
      serverBoot = m.boot;
    }
    renderProjects(m.projects || []);
    refreshBreadcrumb();                  // project name resolves once the list lands
    resolvePendingNav();                  // a URL we restored from may name a project
  } else if (m.type === 'sessions') {
    sessionList = m.sessions || [];
    gotSessions = true;
    renderSessions();
    refreshBreadcrumb();                  // a renamed session updates the crumb live
    resolvePendingNav();                  // …or a session
  } else if (m.type === 'focus') {
    // server's pick of which session to view, sent only in reply to a `new` we
    // issued. Switch into the freshly spawned session. (The defensive `stay`
    // check guards a stray focus from clobbering a session we're already viewing.)
    if (pendingNewFocus) {
      pendingNewFocus = false;
      openSession(m.cid);                 // subscribe + drop to the transcript
      // openSession→subscribe clears the feed, so show the queued box now (after).
      if (pendingSendText) addPending(pendingSendText, pendingSendText);
    } else {
      const stay = currentCid && sessionList.some(s => s.cid === currentCid);
      console.log('[TRACE focus-else] m.cid=', m.cid, 'currentCid=', currentCid, 'stay=', stay);
      subscribe(stay ? currentCid : m.cid);
    }
  } else if (m.type === 'hello') {
    console.log('[TRACE hello] m.cid=', m.cid, 'm.pid=', m.pid, 'was currentPid=', currentPid);
    currentCid = m.cid;
    if (m.pid) currentPid = m.pid;
    updateBreadcrumb(m.title || '');
    highlightCard(m.cid);
    setBusy(m.busy, null);
  } else if (m.type === 'transcript') {
    if (m.cid && m.cid !== currentCid) return;        // belongs to a backgrounded session
    renderEvent(m.event, !m.history);   // live events type out; history replay renders instantly
  } else if (m.type === 'hook') {
    // claude received the prompt → the outbox copy did its job; drop it (any session,
    // even one you've navigated away from, so it can't resurface as stale text later).
    if (m.event === 'UserPromptSubmit') clearOutbox(m.cid);
    if (m.cid === currentCid) handleHook(m);          // drive the pill only for the viewed session
    // (menu badges update via the sessions broadcast that follows each hook)
  } else if (m.type === 'exit') {
    if (m.cid !== currentCid) return;
    hideThinking();
    meta.textContent = 'session ended';
    setStatus('🔴', 'ended', '');
  }
}

// -- machines (the fleet's top rung) ----------------------------------------
const machinesEl = document.getElementById('machinelist');
const machinesBtn = document.getElementById('machinesBtn');

// Compact CPU/RAM/disk/GPU line for a machine card. Each metric: a label, a tiny
// proportional bar, and "% (used/total)". Bar tints amber→red as it fills, so a
// loaded box reads at a glance. Byte metrics show a GB hint; CPU shows load×cores.
function fmtGB(b) { return (b / 1073741824).toFixed(b >= 10737418240 ? 0 : 1) + 'G'; }
function renderSysStats(sys) {
  const wrap = document.createElement('div');
  wrap.className = 'sysstats';
  const metric = (label, pct, hint) => {
    if (pct == null) return;
    const row = document.createElement('div'); row.className = 'sysrow';
    const lab = document.createElement('span'); lab.className = 'syslab'; lab.textContent = label;
    const track = document.createElement('span'); track.className = 'systrack';
    const fill = document.createElement('span'); fill.className = 'sysfill';
    fill.style.width = Math.max(0, Math.min(100, pct)) + '%';
    fill.style.background = pct >= 90 ? 'var(--err)' : pct >= 70 ? '#caa030' : 'var(--ok)';
    track.appendChild(fill);
    const val = document.createElement('span'); val.className = 'sysval';
    val.textContent = pct.toFixed(0) + '%' + (hint ? ` ${hint}` : '');
    row.append(lab, track, val); wrap.appendChild(row);
  };
  if (sys.cpu) metric('cpu', sys.cpu.pct, `(${sys.cpu.load1}×${sys.cpu.cores})`);
  if (sys.ram) metric('ram', sys.ram.pct, `(${fmtGB(sys.ram.used)}/${fmtGB(sys.ram.total)})`);
  if (sys.disk) metric('disk', sys.disk.pct, `(${fmtGB(sys.disk.free)} free)`);
  if (sys.gpu) metric('gpu', sys.gpu.pct, `(${fmtGB(sys.gpu.used)}/${fmtGB(sys.gpu.total)})`);
  return wrap;
}

function renderMachines(list) {
  machineList = list;
  machinesEl.innerHTML = '';
  const online = list.filter(m => m.online).length;
  const label = document.createElement('div');
  label.className = 'menutitle'; label.textContent = `machines · ${online}/${list.length} online`;
  machinesEl.appendChild(label);
  if (!list.length) {
    const note = document.createElement('div');
    note.className = 'ahint';
    note.textContent = 'no machines connected — start a worker (worker.py) on a machine running a harness.';
    machinesEl.appendChild(note);
  }
  list.forEach(m => {
    // The relay node is the hub box itself — it has no harness, so there are no
    // projects/sessions to drive. Show it for topology awareness, but as a muted,
    // non-clickable infra card (opening it would only hang on an empty list).
    const isRelay = m.kind === 'relay';
    const card = document.createElement('div');
    card.className = 'scard' + (m.id === currentMachine ? ' active' : '') + (isRelay ? ' relay' : '');
    if (isRelay) { card.style.opacity = '0.7'; card.style.cursor = 'default'; }
    else card.onclick = () => selectMachine(m.id);
    const row = document.createElement('div'); row.className = 'row';
    const sdot = document.createElement('span');
    sdot.className = 'sdot' + (m.online ? '' : ' dead');
    const title = document.createElement('span');
    title.className = 'stitle'; title.textContent = m.id;
    row.appendChild(sdot); row.appendChild(title);
    const tag = document.createElement('span');
    tag.className = 'scount';
    tag.textContent = isRelay ? 'relay' : (m.online ? 'online' : 'offline');
    if (isRelay) { tag.style.color = 'var(--dim)'; tag.style.borderColor = 'var(--edge)'; }
    else if (m.online) { tag.style.color = 'var(--ok)'; tag.style.borderColor = '#22401f'; }
    else tag.style.color = 'var(--err)';
    row.appendChild(tag);
    card.appendChild(row);
    if (m.host && m.host !== m.id) {
      const d = document.createElement('div'); d.className = 'sdesc'; d.textContent = m.host;
      card.appendChild(d);
    }
    if (isRelay) {
      const d = document.createElement('div'); d.className = 'sdesc';
      d.textContent = 'the hub — routes every machine (no sessions of its own)';
      card.appendChild(d);
      machinesEl.appendChild(card);
      return;   // no stats line for the relay
    }
    // Aggregate counts the worker reported in plaintext (no titles/content):
    // N projects · N sessions · N active — an at-a-glance per-machine load.
    if (m.stats) {
      const s = m.stats;
      const cl = document.createElement('div'); cl.className = 'sdesc';
      cl.append(`${s.projects} project${s.projects === 1 ? '' : 's'} · `
              + `${s.sessions} session${s.sessions === 1 ? '' : 's'}`);
      if (s.active > 0) {
        const a = document.createElement('span');
        a.textContent = ` · ${s.active} active`;
        a.style.color = 'var(--ok)';
        cl.append(a);
      }
      card.appendChild(cl);
      // CPU / RAM / disk / GPU — best-effort per-machine load (sysstats.collect).
      // Each metric is optional; a probe that failed on the box is just omitted.
      if (m.stats.sys) card.appendChild(renderSysStats(m.stats.sys));
    }
    machinesEl.appendChild(card);
  });
  refreshBreadcrumb();
  resolvePendingNav();        // a URL we restored from may name a machine
}

// Switch the machine we're driving. A different machine is a different harness,
// so everything below the rung (projects/sessions/terminal) is wiped, then we
// ask the new machine for its projects + sessions.
function selectMachine(id) {
  e2eEnsure(id).catch(() => {});   // start the secure handshake inside this tap gesture
  if (id !== currentMachine) {
    currentMachine = id;
    currentPid = null; currentCid = null; currentTitle = '';
    projectList = []; sessionList = []; gotSessions = false;
    term.reset(); feed.innerHTML = ''; clearPending(); hideThinking();
    if (activeType) { activeType.finish(); activeType = null; }
    projectsEl.innerHTML = ''; sessionsEl.innerHTML = '';
  }
  hsend({ type: 'list' });    // fetch this machine's projects + sessions
  setView('projects');
}

// -- projects (top rung) ----------------------------------------------------
function projectName(pid) {
  const p = projectList.find(p => p.pid === pid);
  return p ? p.name : '';
}

function updateBreadcrumb(title) {        // called when we (re)subscribe to a session
  if (title != null) currentTitle = title;
  refreshBreadcrumb();
}
// The breadcrumb in row 1 now shows just the project name (blank on the projects
// list); the active *session* is shown by the highlighted tab in row 2 instead.
// Recomputed on every nav so climbing back out doesn't strand a stale crumb.
function refreshBreadcrumb(view) {
  view = view || currentView();
  // PM view: a fixed crumb; its threads ride the #sessionbar like sessions do.
  if (view === 'pm') {
    meta.textContent = 'fleet pm';
    document.getElementById('sessiondesc').textContent = '';
    renderSessionBar(view);
    return;
  }
  // machines rung: blank. projects rung: machine name. deeper: machine / project.
  let crumb = '';
  if (view !== 'machines' && currentMachine) {
    crumb = currentMachine;
    const pn = projectName(currentPid);
    if (view !== 'projects' && pn) crumb += ' / ' + pn;
  }
  meta.textContent = crumb;
  // Show the AI session name above the message box, but only when a specific
  // session is open (transcript/tty rungs) — not on the projects/sessions lists.
  const descEl = document.getElementById('sessiondesc');
  const live = sessionList.find(s => s.cid === currentCid);   // live title/desc (AI naming may have re-titled it)
  const inSession = (view === 'tty' || view === 'transcript');
  const title = (live && live.title) || currentTitle || '';
  const longDesc = (live && live.desc) || '';
  // Show "short title: long desc" when AI naming has produced a one-line summary,
  // otherwise just the short title. The two parts are styled distinctly.
  descEl.textContent = '';
  if (inSession && title) {
    const proj = projectName(currentPid);
    if (proj) {
      const p = document.createElement('span'); p.className = 'sd-project'; p.textContent = proj + ' ';
      descEl.appendChild(p);
    }
    const t = document.createElement('span'); t.className = 'sd-title'; t.textContent = title;
    descEl.appendChild(t);
    if (longDesc) {
      const d = document.createElement('span'); d.className = 'sd-desc'; d.textContent = ': ' + longDesc;
      descEl.appendChild(d);
    }
  }
  renderSessionBar(view);
}

// Row 2: a horizontal strip of session tabs for the current project, sorted
// busy → idle → dead (most active to the left), color-coded like the sessions
// page, with the open session highlighted. Hidden on the projects rung.
function renderSessionBar(view) {
  const bar = document.getElementById('sessionbar');
  const wasHidden = bar.hidden;
  view = view || currentView();
  if (view === 'pm') { renderPmBar(bar, wasHidden); return; }   // PM threads ride the same strip
  const list = sessionList.filter(s => s.pid === currentPid);
  if (view === 'projects' || !currentPid || !list.length) {
    bar.hidden = true; bar.innerHTML = '';
    if (!wasHidden) refitTTY();
    return;
  }
  const rank = s => !s.alive ? 2 : s.busy ? 0 : 1;   // busy first, idle next, dead last
  const sorted = list.slice().sort((a, b) => rank(a) - rank(b));
  bar.innerHTML = '';
  sorted.forEach(s => {
    const tab = document.createElement('button');
    tab.className = 'stab' + (s.cid === currentCid ? ' active' : '');
    tab.title = s.title || 'new session';
    tab.onclick = () => { pendingSendText = null; openSession(s.cid); };  // manual open cancels a queued new-session send
    const dot = document.createElement('span');
    dot.className = 'sdot' + (!s.alive ? ' dead' : s.busy ? ' busy' : '');
    const lbl = document.createElement('span');
    lbl.className = 'lbl'; lbl.textContent = s.title || 'new session';
    tab.appendChild(dot); tab.appendChild(lbl);
    bar.appendChild(tab);
  });
  bar.hidden = false;
  if (wasHidden) refitTTY();
}

function selectProject(pid) {
  currentPid = pid;
  renderSessions();
  setView('sessions');
}

function createProject(name) {
  if (!name.trim()) return;
  hsend({ type: 'createProject', name: name.trim() });
}
function addProjectFromUrl(url) {
  if (!url.trim()) return;
  hsend({ type: 'addProject', repoUrl: url.trim() });
}
function renderProjects(list) {
  projectList = list;
  // a freshly selected project that vanished (removed) → drop the selection
  if (currentPid && !list.some(p => p.pid === currentPid)) currentPid = null;
  projectsEl.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'menutitle'; label.textContent = `projects · ${list.length}`;
  projectsEl.appendChild(label);

  // add/search row: the box does double duty. As you type it FILTERS the list
  // below (substring match on name); Enter OPENS the project when the filter has
  // narrowed to a single match. To create or clone you must type a name/URL and
  // physically click a button — Enter never creates/clones.
  const add = document.createElement('div');
  add.id = 'addProject';
  const inp = document.createElement('input');
  inp.placeholder = 'filter projects · or type a name / git URL and click create/clone';
  inp.value = projectFilter;
  const arow = document.createElement('div'); arow.className = 'arow';
  const createBtn = document.createElement('button'); createBtn.textContent = '＋ create';
  const cloneBtn = document.createElement('button'); cloneBtn.textContent = '⤓ clone URL';
  createBtn.onclick = () => { createProject(inp.value); inp.value = ''; projectFilter = ''; applyProjectFilter(); };
  cloneBtn.onclick = () => { addProjectFromUrl(inp.value); inp.value = ''; projectFilter = ''; applyProjectFilter(); };
  inp.addEventListener('input', () => { projectFilter = inp.value; applyProjectFilter(); });
  inp.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const matches = filteredProjects();
    if (matches.length === 1) selectProject(matches[0].pid);  // narrowed to one → open it
  });
  arow.appendChild(createBtn); arow.appendChild(cloneBtn);
  add.appendChild(inp); add.appendChild(arow);
  projectsEl.appendChild(add);

  list.forEach(p => {
