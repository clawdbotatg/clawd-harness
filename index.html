<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=0.9" />
<title>clawd-harness</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<style>
  :root { --bg:#0c0c10; --panel:#14141b; --edge:#262633; --ink:#e6e6ee; --dim:#8a8aa0;
          --accent:#7c5cff; --user:#1f6feb; --tool:#7a5; --err:#e5534b; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--ink);
              font:14px/1.5 ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
  #app { display:flex; flex-direction:column; height:100%; }
  header { display:flex; align-items:center; gap:12px; padding:8px 14px;
           border-bottom:1px solid var(--edge); background:var(--panel); }
  #logo { width:24px; height:24px; border-radius:6px; flex:0 0 auto; display:block; }
  header h1 { font-size:14px; margin:0; font-weight:600; letter-spacing:.3px; cursor:pointer; }
  header h1:hover { color:var(--accent); }
  header .meta { color:var(--dim); font-size:12px; font-family:ui-monospace,Menlo,monospace; }
  header .spacer { flex:1; }
  #dot { width:9px; height:9px; border-radius:50%; background:var(--err); flex:0 0 auto; }
  #dot.up { background:#3fb950; }
  #status { font-size:12px; padding:3px 10px; border-radius:999px; border:1px solid var(--edge);
            color:var(--dim); white-space:nowrap; }
  #status.working { color:#f5d061; border-color:#5a4d1f; background:#1c180a; }
  #status.idle    { color:#3fb950; border-color:#1f5a2f; background:#0c1a10; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  #status.working { animation:pulse 1.1s ease-in-out infinite; }
  /* live "claude is thinking" row, pinned to the bottom of the transcript while a turn is in flight */
  .thinking { display:flex; align-items:center; gap:9px; padding:2px 4px;
              color:var(--dim); font-size:12px; font-family:ui-monospace,Menlo,monospace; }
  .thinking .spin { width:13px; height:13px; flex:none; border-radius:50%;
                    border:2px solid var(--edge); border-top-color:#f5d061;
                    animation:spin .8s linear infinite; }
  .thinking .lbl { animation:pulse 1.1s ease-in-out infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  main { flex:1; display:flex; min-height:0; }
  .col { display:flex; flex-direction:column; min-width:0; min-height:0; }
  #left  { flex:1; }
  #right { flex:1; background:#0a0a0e; }
  .col.hidden { display:none; }
  #term { flex:1; min-height:0; padding:6px 4px 0 8px; background:#000; }
  #feed { flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
          padding:12px; display:flex; flex-direction:column; gap:10px;
          width:100%; max-width:860px; align-self:center; }
  .msg { border:1px solid var(--edge); border-radius:10px; padding:8px 11px; max-width:100%;
         white-space:pre-wrap; word-break:break-word; }
  .msg .who { font-size:10px; text-transform:uppercase; letter-spacing:.1em; color:var(--dim); margin-bottom:3px; }
  .msg.user      { border-color:#23406e; background:#0e1830; }
  .msg.assistant { border-color:#3a2f6b; background:#15122a; }
  .msg.tool      { border-color:#3a4a2a; background:#141a10; font-family:ui-monospace,Menlo,monospace; font-size:12px; }
  .msg.tool_result { border-color:#333; background:#0f0f14; color:var(--dim);
                     font-family:ui-monospace,Menlo,monospace; font-size:12px; padding:0; }
  .msg.tool_result details { padding:0; }
  .msg.tool_result summary { cursor:pointer; padding:7px 11px; list-style:none;
                             color:var(--dim); user-select:none; }
  .msg.tool_result summary::-webkit-details-marker { display:none; }
  .msg.tool_result summary::before { content:"▸ "; color:#555; }
  .msg.tool_result details[open] summary::before { content:"▾ "; }
  .msg.tool_result summary:hover { color:var(--ink); }
  .msg.tool_result .result-body { padding:0 11px 9px; white-space:pre-wrap; word-break:break-word;
                                  max-height:280px; overflow:auto; border-top:1px solid #222; margin-top:2px; }
  .msg.result    { border-color:#444; background:#101016; color:var(--dim); font-size:12px; }
  .msg.cmd  { border-color:#3a3a52; background:#13131f; color:#b9b3e6;
              font-family:ui-monospace,Menlo,monospace; font-size:12px; }
  .msg.sys  { border-color:#333; background:#0f0f14; color:var(--dim); font-size:12px; font-style:italic; }
  /* rendered markdown inside bubbles */
  .md { white-space:normal; }
  .md p { margin:0 0 6px; }
  .md strong { color:#fff; font-weight:650; }
  .md em { font-style:italic; }
  .md a { color:#8aa9ff; }
  .md code { background:#000; border:1px solid var(--edge); border-radius:4px;
             padding:1px 4px; font-family:ui-monospace,Menlo,monospace; font-size:12px; }
  .md pre { background:#000; border:1px solid var(--edge); border-radius:8px; padding:9px 11px;
            overflow:auto; max-height:300px; margin:6px 0; }
  .md pre code { background:none; border:0; padding:0; white-space:pre; }
  .msg .toolname { color:var(--tool); font-weight:600; }
  footer { border-top:1px solid var(--edge); background:var(--panel); padding:10px 12px;
           display:flex; flex-direction:column; gap:8px; }
  .inputrow { display:flex; gap:8px; align-items:flex-end; }
  #keys { display:flex; flex-wrap:wrap; gap:6px; }
  #keys button { background:#0a0a0e; border:1px solid var(--edge); color:var(--ink);
                 border-radius:7px; padding:7px 11px; font-size:13px; min-width:40px;
                 font-family:ui-monospace,Menlo,monospace; cursor:pointer; }
  #keys button:hover { border-color:var(--accent); }
  #keys button:active { background:var(--accent); }
  #attachments { display:flex; flex-wrap:wrap; gap:6px; }
  #attachments:empty { display:none; }
  .chip { display:flex; align-items:center; gap:6px; background:#0a0a0e; border:1px solid var(--edge);
          border-radius:8px; padding:4px 8px; font-size:12px; color:var(--ink); }
  .chip img { width:30px; height:30px; object-fit:cover; border-radius:4px; }
  .chip.up { color:var(--dim); font-style:italic; }
  .chip button { background:transparent; border:0; color:var(--dim); cursor:pointer; padding:0 2px;
                 font-weight:700; font-size:14px; }
  .chip button:hover { color:var(--err); }
  #box { flex:1; resize:none; min-height:38px; max-height:160px; background:#0a0a0e; color:var(--ink);
         border:1px solid var(--edge); border-radius:8px; padding:9px 11px; font:inherit; }
  /* iOS Safari auto-zooms on focus when the field's *visual* size is <16px. The page renders at
     initial-scale=0.9, so a 16px font is only ~14.4 visual px — still under the bar. 18px clears it
     (18*0.9≈16.2). Scoped to coarse pointers so the desktop input keeps its inherited size. */
  @media (pointer: coarse) { #box { font-size:18px; } }
  #box:focus { outline:none; border-color:var(--accent); }
  /* voice column: speaker (TTS) over mic (STT), stacked to the left of the box */
  #voice { display:flex; flex-direction:column; gap:6px; flex:0 0 auto; }
  #voice button { background:#0a0a0e; border:1px solid var(--edge); color:var(--ink);
                  border-radius:7px; padding:7px 9px; font-size:15px; line-height:1; cursor:pointer; }
  #voice button:hover { border-color:var(--accent); }
  #voice button:disabled { opacity:.35; cursor:default; }
  #voice button.on { border-color:var(--accent); background:#15122a; }
  #ttsBtn.speaking { border-color:var(--accent); animation:vpulse 1.4s infinite; }
  #micBtn.rec { border-color:var(--err); background:#2a1212; animation:vpulse 1s infinite; }
  @keyframes vpulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  button { background:var(--accent); color:#fff; border:0; border-radius:8px; padding:10px 16px;
           font-weight:600; cursor:pointer; }
  button:disabled { opacity:.4; cursor:default; }
  .hint { color:var(--dim); font-size:11px; padding:0 12px 8px; }
  #phoneBtn, #panelBtn, #menuBtn, #projectsBtn { background:transparent; border:1px solid var(--edge); color:var(--dim);
              padding:5px 10px; font-size:12px; }
  #phoneBtn:hover, #panelBtn:hover, #menuBtn:hover, #projectsBtn:hover { color:var(--ink); border-color:var(--accent); }
  #panelBtn.on, #menuBtn.on, #projectsBtn.on { color:var(--accent); border-color:var(--accent); }
  /* projects (top rung) + sessions (next rung): both are scrollable card lists */
  #menu, #projects { flex:1; background:#0a0a0e; }
  #sessions, #projectlist { flex:1; min-height:0; overflow-y:auto; -webkit-overflow-scrolling:touch;
              padding:14px; display:flex; flex-direction:column; gap:10px;
              width:100%; max-width:760px; align-self:center; }
  /* project cards reuse .scard; status colors + an add-project row */
  .scard.cloning, .scard.error { cursor:default; }
  .scard.cloning { opacity:.75; }
  .sdot.cloning { background:#f5d061; animation:pulse 1.1s ease-in-out infinite; }
  .sdot.err { background:var(--err); }
  .scard .scount { color:var(--dim); font-size:11px; font-family:ui-monospace,Menlo,monospace;
                   border:1px solid var(--edge); border-radius:999px; padding:1px 8px; flex:0 0 auto; }
  .scard .serror { color:var(--err); font-size:12px; word-break:break-word; }
  #addProject { display:flex; flex-direction:column; gap:8px; border:1px dashed var(--edge);
                border-radius:11px; padding:12px 14px; }
  #addProject input { background:#0a0a0e; color:var(--ink); border:1px solid var(--edge);
                      border-radius:8px; padding:9px 11px; font:inherit; }
  @media (pointer: coarse) { #addProject input { font-size:18px; } }
  #addProject input:focus { outline:none; border-color:var(--accent); }
  #addProject .arow { display:flex; gap:8px; }
  #addProject .arow button { flex:1; font-size:13px; padding:8px 10px; }
  #addProject .ahint { color:var(--dim); font-size:11px; }
  .scard { border:1px solid var(--edge); border-radius:11px; padding:12px 14px; background:var(--panel);
           cursor:pointer; display:flex; flex-direction:column; gap:4px; position:relative; }
  .scard:hover { border-color:var(--accent); }
  .scard.active { border-color:var(--accent); background:#16132a; }
  .scard .row { display:flex; align-items:center; gap:9px; }
  .scard .sdot { width:8px; height:8px; border-radius:50%; background:#3fb950; flex:0 0 auto; }
  .scard .sdot.busy { background:#f5d061; animation:pulse 1.1s ease-in-out infinite; }
  .scard .sdot.dead { background:var(--err); }
  .scard .stitle { font-weight:600; font-size:14px; flex:1; min-width:0;
                   overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .scard .sdesc { color:var(--dim); font-size:12px; line-height:1.4; }
  .scard .smeta { color:var(--dim); font-size:11px; font-family:ui-monospace,Menlo,monospace; }
  .scard .sclose { position:absolute; top:8px; right:9px; background:transparent; border:0; color:var(--dim);
                   font-size:15px; cursor:pointer; padding:2px 5px; line-height:1; border-radius:6px; }
  .scard .sclose:hover { color:var(--err); background:#0a0a0e; }
  #newSession { border:1px dashed var(--edge); border-radius:11px; padding:12px 14px; background:transparent;
                color:var(--dim); cursor:pointer; font-size:13px; text-align:left; font-weight:500; }
  #newSession:hover { color:var(--ink); border-color:var(--accent); }
  .menutitle { color:var(--dim); font-size:11px; text-transform:uppercase; letter-spacing:.12em;
               padding:0 2px 2px; }
  #qrmodal { position:fixed; inset:0; background:rgba(0,0,0,.7); display:flex;
             align-items:center; justify-content:center; z-index:50; }
  #qrmodal[hidden] { display:none; }
  .qrcard { background:var(--panel); border:1px solid var(--edge); border-radius:14px;
            padding:22px; text-align:center; max-width:340px; }
  #qrcode { background:#fff; padding:12px; border-radius:10px; display:inline-block; }
  #qrcode img, #qrcode canvas { display:block; }
  .qrurl { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--dim);
           margin:12px 0; word-break:break-all; }
</style>
</head>
<body>
<div id="app">
  <header>
    <img id="logo" src="favicon.png" alt="clawd-harness" />
    <div id="dot"></div>
    <h1 id="brand" title="All sessions">clawd-harness</h1>
    <span class="meta" id="meta">connecting…</span>
    <span class="spacer"></span>
    <button id="projectsBtn" title="All projects">▦ projects</button>
    <button id="menuBtn" title="Sessions in this project">≡ sessions</button>
    <button id="panelBtn" title="Show/hide the structured transcript">▤ transcript</button>
    <button id="phoneBtn" title="Open on your phone">📱 Phone</button>
    <span id="status">—</span>
  </header>
  <div id="qrmodal" hidden>
    <div class="qrcard">
      <div id="qrcode"></div>
      <div class="qrurl" id="qrurl"></div>
      <button id="qrclose">close</button>
    </div>
  </div>
  <main>
    <section class="col hidden" id="projects">
      <div id="projectlist"></div>
    </section>
    <section class="col hidden" id="menu">
      <div id="sessions"></div>
    </section>
    <section class="col" id="left">
      <div id="term"></div>
    </section>
    <section class="col hidden" id="right">
      <div id="feed"></div>
    </section>
  </main>
  <footer>
    <div id="attachments"></div>
    <div id="keys" title="Send keys to the session (works even when the terminal is read-only) — for navigating TUI menus like /model">
      <button data-k="esc">esc</button>
      <button data-k="up">↑</button>
      <button data-k="down">↓</button>
      <button data-k="left">←</button>
      <button data-k="right">→</button>
      <button data-k="enter">⏎ enter</button>
      <button data-k="tab">⇥</button>
      <button data-k="ctrlc">⌃C</button>
    </div>
    <div class="inputrow">
      <div id="voice">
        <button id="ttsBtn" title="Read replies aloud (text-to-speech)">🔊</button>
        <button id="micBtn" title="Hold to dictate (speech-to-text)">🎤</button>
      </div>
      <textarea id="box" placeholder="message"></textarea>
      <button id="send">Send</button>
    </div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/gh/davidshimjs/qrcodejs@master/qrcode.min.js"></script>
<script>
// Touch devices (phones/tablets): make the terminal a read-only mirror. Mobile
// dictation/IME streams partial, self-revising text that xterm forwards as
// overlapping keystrokes ("thithis issthis is a…"), so all input goes through
// the message box (which gets native dictation/paste/image handling for free).
const isTouch = window.matchMedia('(pointer: coarse)').matches;
const term = new Terminal({
  fontFamily: 'ui-monospace, Menlo, Monaco, "Courier New", monospace',
  fontSize: 13, theme: { background: '#000000' }, cursorBlink: !isTouch,
  scrollback: 5000, disableStdin: isTouch,
});
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open(document.getElementById('term'));
fit.fit();

const dot = document.getElementById('dot');
const meta = document.getElementById('meta');
const statusEl = document.getElementById('status');
const feed = document.getElementById('feed');
const box = document.getElementById('box');
const sendBtn = document.getElementById('send');
const sessionsEl = document.getElementById('sessions');
const projectsEl = document.getElementById('projectlist');

let ws = null, decoder = new TextDecoder();
let currentCid = null;          // session this browser is viewing
let currentPid = null;          // project this browser has selected
let sessionList = [];           // latest session metadata from the server
let projectList = [];           // latest project metadata from the server
let gotSessions = false;        // have we received the first sessions snapshot?
let pendingNav = null;          // nav state parsed from the URL, awaiting server data
let pendingNewFocus = false;    // a `new` we issued — its focus should switch us in
let lastWrittenHash = '';       // the hash we last wrote, so hashchange ignores our own writes

const token = new URLSearchParams(location.search).get('t') || '';

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws?t=${encodeURIComponent(token)}`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => { dot.classList.add('up'); sendResize();
                      if (!currentCid) meta.textContent = ''; };  // clear "connecting…" on the projects rung
  ws.onclose = () => { dot.classList.remove('up'); meta.textContent = 'reconnecting…';
                       setTimeout(connect, 1200); };
  ws.onmessage = (e) => {
    if (typeof e.data === 'string') { handleJson(JSON.parse(e.data)); }
    else { term.write(new Uint8Array(e.data), () => term.scrollToBottom()); }  // raw PTY bytes, pin to bottom
  };
}

function handleJson(m) {
  if (m.type === 'projects') {
    renderProjects(m.projects || []);
    resolvePendingNav();                  // a URL we restored from may name a project
  } else if (m.type === 'sessions') {
    sessionList = m.sessions || [];
    gotSessions = true;
    renderSessions();
    resolvePendingNav();                  // …or a session
  } else if (m.type === 'focus') {
    // server's pick of which session to view, sent only in reply to a `new` we
    // issued. Switch into the freshly spawned session. (The defensive `stay`
    // check guards a stray focus from clobbering a session we're already viewing.)
    if (pendingNewFocus) {
      pendingNewFocus = false;
      openSession(m.cid);                 // subscribe + drop to the transcript
    } else {
      const stay = currentCid && sessionList.some(s => s.cid === currentCid);
      subscribe(stay ? currentCid : m.cid);
    }
  } else if (m.type === 'hello') {
    currentCid = m.cid;
    if (m.pid) currentPid = m.pid;
    updateBreadcrumb(m.title || '');
    highlightCard(m.cid);
    setBusy(m.busy, null);
  } else if (m.type === 'transcript') {
    if (m.cid && m.cid !== currentCid) return;        // belongs to a backgrounded session
    renderEvent(m.event, !m.history);   // live events type out; history replay renders instantly
  } else if (m.type === 'hook') {
    if (m.cid === currentCid) handleHook(m);          // drive the pill only for the viewed session
    // (menu badges update via the sessions broadcast that follows each hook)
  } else if (m.type === 'exit') {
    if (m.cid !== currentCid) return;
    hideThinking();
    meta.textContent = 'session ended';
    statusEl.className = ''; statusEl.textContent = 'ended';
  }
}

// -- projects (top rung) ----------------------------------------------------
function projectName(pid) {
  const p = projectList.find(p => p.pid === pid);
  return p ? p.name : '';
}

function updateBreadcrumb(title) {
  const pn = projectName(currentPid);
  meta.textContent = [pn, title].filter(Boolean).join(' / ');
}

function selectProject(pid) {
  currentPid = pid;
  renderSessions();
  setView('sessions');
}

function createProject(name) {
  if (!name.trim() || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'createProject', name: name.trim() }));
}
function addProjectFromUrl(url) {
  if (!url.trim() || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'addProject', repoUrl: url.trim() }));
}
function removeProject(pid, ev) {
  ev.stopPropagation();
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'removeProject', pid }));
}

function renderProjects(list) {
  projectList = list;
  // a freshly selected project that vanished (removed) → drop the selection
  if (currentPid && !list.some(p => p.pid === currentPid)) currentPid = null;
  projectsEl.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'menutitle'; label.textContent = `projects · ${list.length}`;
  projectsEl.appendChild(label);

  // add-project row: a name (→ create) or a git URL (→ clone)
  const add = document.createElement('div');
  add.id = 'addProject';
  const inp = document.createElement('input');
  inp.placeholder = 'new project name, or a git URL / clawdbotatg repo to clone';
  const arow = document.createElement('div'); arow.className = 'arow';
  const createBtn = document.createElement('button'); createBtn.textContent = '＋ create';
  const cloneBtn = document.createElement('button'); cloneBtn.textContent = '⤓ clone URL';
  const looksUrl = (v) => /^(https?:\/\/|git@|ssh:\/\/)/.test(v.trim());
  createBtn.onclick = () => { createProject(inp.value); inp.value = ''; };
  cloneBtn.onclick = () => { addProjectFromUrl(inp.value); inp.value = ''; };
  inp.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    const v = inp.value;
    if (looksUrl(v)) addProjectFromUrl(v); else createProject(v);
    inp.value = '';
  });
  arow.appendChild(createBtn); arow.appendChild(cloneBtn);
  const hint = document.createElement('div'); hint.className = 'ahint';
  hint.textContent = 'create → new public repo under clawdbotatg; clone → git URL, owner/repo, or a clawdbotatg repo name';
  add.appendChild(inp); add.appendChild(arow); add.appendChild(hint);
  projectsEl.appendChild(add);

  list.forEach(p => {
    const busyP = p.status === 'cloning', errP = p.status === 'error';
    const card = document.createElement('div');
    card.className = 'scard' + (p.pid === currentPid ? ' active' : '') +
                     (busyP ? ' cloning' : errP ? ' error' : '');
    card.dataset.pid = p.pid;
    if (!busyP && !errP) card.onclick = () => selectProject(p.pid);

    const row = document.createElement('div'); row.className = 'row';
    const sdot = document.createElement('span');
    sdot.className = 'sdot' + (busyP ? ' cloning' : errP ? ' err' : '');
    const title = document.createElement('span');
    title.className = 'stitle'; title.textContent = p.name;
    row.appendChild(sdot); row.appendChild(title);
    if (p.pinned) {
      const tag = document.createElement('span');
      tag.className = 'scount'; tag.textContent = 'this app'; tag.title = 'the running harness — live-editable';
      row.appendChild(tag);
    }
    const count = document.createElement('span');
    count.className = 'scount'; count.textContent = `${p.sessionCount || 0} sess`;
    row.appendChild(count);
    card.appendChild(row);

    if (p.repoUrl) {
      const desc = document.createElement('div');
      desc.className = 'sdesc'; desc.textContent = p.repoUrl;
      card.appendChild(desc);
    }
    if (busyP) {
      const sm = document.createElement('div');
      sm.className = 'smeta'; sm.textContent = 'cloning…';
      card.appendChild(sm);
    } else if (errP) {
      const se = document.createElement('div');
      se.className = 'serror'; se.textContent = p.error || 'failed';
      card.appendChild(se);
    }

    if (!p.pinned) {                            // the harness-itself project isn't removable
      const x = document.createElement('button');
      x.className = 'sclose'; x.textContent = '✕'; x.title = 'remove from list (keeps files)';
      x.onclick = (e) => removeProject(p.pid, e);
      card.appendChild(x);
    }

    projectsEl.appendChild(card);
  });
}

// -- sessions (the next rung, scoped to the selected project) ----------------
function subscribe(cid) {
  if (!cid) return;
  currentCid = cid;
  // Wipe both views; the server re-streams this session's screen + history right
  // after. Always clearing (even re-subscribing the same cid on reconnect) keeps
  // the replayed history from duplicating into an existing feed.
  term.reset();
  feed.innerHTML = '';
  hideThinking();
  if (activeType) { activeType.finish(); activeType = null; }
  highlightCard(cid);
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'subscribe', cid }));
  syncUrl();
}

function openSession(cid) {
  const s = sessionList.find(s => s.cid === cid);
  if (s && s.pid) currentPid = s.pid;       // keep the breadcrumb/`new` in this project
  subscribe(cid);
  setView('transcript');
  if (!isTouch) box.focus();                // desktop: ready to type immediately (skip on touch — don't pop the keyboard)
}

function newSession() {
  if (!currentPid) { setView('projects'); return; }   // need a project to host it
  pendingNewFocus = true;          // the focus that comes back should switch us into it
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'new', pid: currentPid }));
  setView('transcript');           // server replies with a focus → subscribe once it's spawned
}

function closeSession(cid, ev) {
  ev.stopPropagation();
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'close', cid }));
}

function highlightCard(cid) {
  sessionsEl.querySelectorAll('.scard').forEach(c =>
    c.classList.toggle('active', c.dataset.cid === cid));
}

function renderSessions() {
  const list = sessionList.filter(s => s.pid === currentPid);
  sessionsEl.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'menutitle';
  const pn = projectName(currentPid);
  label.textContent = (pn ? pn + ' · ' : '') + `sessions · ${list.length}`;
  sessionsEl.appendChild(label);

  const add = document.createElement('button');
  add.id = 'newSession'; add.textContent = '＋  new session';
  add.onclick = newSession;
  sessionsEl.appendChild(add);

  list.forEach(s => {
    const card = document.createElement('div');
    card.className = 'scard' + (s.cid === currentCid ? ' active' : '');
    card.dataset.cid = s.cid;
    card.onclick = () => openSession(s.cid);

    const row = document.createElement('div'); row.className = 'row';
    const sdot = document.createElement('span');
    sdot.className = 'sdot' + (!s.alive ? ' dead' : s.busy ? ' busy' : '');
    const title = document.createElement('span');
    title.className = 'stitle'; title.textContent = s.title || 'new session';
    row.appendChild(sdot); row.appendChild(title);
    card.appendChild(row);

    if (s.desc) {
      const desc = document.createElement('div');
      desc.className = 'sdesc'; desc.textContent = s.desc;
      card.appendChild(desc);
    }
    const sm = document.createElement('div');
    sm.className = 'smeta';
    const state = !s.alive ? 'ended' : s.busy ? (s.tool ? `running ${s.tool}` : 'working…') : 'idle';
    sm.textContent = `${s.promptCount || 0} msg · ${state}`;
    card.appendChild(sm);

    const x = document.createElement('button');
    x.className = 'sclose'; x.textContent = '✕'; x.title = 'close session';
    x.onclick = (e) => closeSession(s.cid, e);
    card.appendChild(x);

    sessionsEl.appendChild(card);
  });
}

function setBusy(busy, label) {
  if (busy) {
    statusEl.className = 'working';
    statusEl.textContent = label ? `working · ${label}` : 'working…';
    showThinking(label);
  } else {
    statusEl.className = 'idle';
    statusEl.textContent = 'idle · ready';
    hideThinking();
  }
}

// Live thinking indicator in the transcript: spinner + current activity + elapsed seconds,
// pinned to the bottom of the feed while a turn is in flight (mirrors the TUI's spinner).
let thinkEl = null, thinkTimer = null, thinkStart = 0, thinkLabel = '';
function showThinking(label) {
  thinkLabel = label || '';
  if (!thinkEl) {
    thinkEl = document.createElement('div');
    thinkEl.className = 'thinking';
    thinkEl.innerHTML = '<span class="spin"></span><span class="lbl"></span>';
    thinkStart = Date.now();
    thinkTimer = setInterval(paintThinking, 1000);
  }
  feed.appendChild(thinkEl);            // keep it the last child as new events arrive
  paintThinking();
  feed.scrollTop = feed.scrollHeight;
}
function paintThinking() {
  if (!thinkEl) return;
  const secs = Math.round((Date.now() - thinkStart) / 1000);
  const what = thinkLabel ? `running ${thinkLabel}` : 'thinking';
  thinkEl.querySelector('.lbl').textContent = `claude is ${what}… ${secs}s`;
}
function hideThinking() {
  if (thinkTimer) { clearInterval(thinkTimer); thinkTimer = null; }
  if (thinkEl) { thinkEl.remove(); thinkEl = null; }
}
function bumpThinking() { if (thinkEl) feed.appendChild(thinkEl); }  // re-pin below newest content

function handleHook(m) {
  const ev = m.event, d = m.data || {};
  const tool = d.tool || m.tool;
  if (ev === 'UserPromptSubmit') { setBusy(true, null); restoreViewAfterQuestion(); }
  else if (ev === 'PreToolUse')  {
    setBusy(true, tool);
    // these tools render an interactive prompt that only shows in the TUI
    if (tool === 'AskUserQuestion' || tool === 'ExitPlanMode') openTtyForQuestion();
    else restoreViewAfterQuestion();          // a normal tool starting = prior prompt was answered
  }
  else if (ev === 'PostToolUse') {
    setBusy(true, tool);
    if (tool === 'AskUserQuestion' || tool === 'ExitPlanMode') restoreViewAfterQuestion();
  }
  else if (ev === 'Stop')        { setBusy(false, null); restoreViewAfterQuestion(); }
  else if (ev === 'SessionStart') setBusy(false, null);
  else if (ev === 'SessionEnd')  { hideThinking(); statusEl.className=''; statusEl.textContent='session ended'; }
  else if (ev === 'Notification') {
    setBusy(m.busy, d.message ? d.message.slice(0,40) : null);
    openTtyForQuestion();                      // permission / "needs your input" — surface the TUI
  }
}

function bubble(cls, who, text, asMarkdown) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  const w = document.createElement('div'); w.className = 'who'; w.textContent = who;
  d.appendChild(w);
  const body = document.createElement('div');
  if (asMarkdown) { body.className = 'md'; body.innerHTML = mdToHtml(text); }
  else body.textContent = text;
  d.appendChild(body);
  feed.appendChild(d);
  bumpThinking();
  feed.scrollTop = feed.scrollHeight;
  return d;
}

// Typewriter reveal for live assistant prose — re-renders markdown of the
// growing prefix each tick so formatting (bold, code, lists) stays intact as it
// streams, mirroring the TUI. Step count is capped so long messages stay snappy.
// Only one types at a time; a new one instantly finalizes the previous.
let activeType = null;
function typeBubble(cls, who, text) {
  if (activeType) activeType.finish();
  const d = bubble(cls, who, '', true);
  const body = d.lastChild;
  const n = text.length;
  const steps = Math.min(70, Math.max(8, Math.ceil(n / 8)));
  let step = 0, done = false;
  const paint = (k) => { body.innerHTML = mdToHtml(text.slice(0, k)); bumpThinking(); feed.scrollTop = feed.scrollHeight; };
  const finish = () => {
    if (done) return; done = true;
    clearInterval(timer);
    body.innerHTML = mdToHtml(text);
    bumpThinking(); feed.scrollTop = feed.scrollHeight;
    if (activeType === handle) activeType = null;
  };
  const timer = setInterval(() => {
    step++;
    paint(Math.round(n * step / steps));
    if (step >= steps) finish();
  }, 22);
  const handle = { finish };
  activeType = handle;
}

// Minimal, XSS-safe markdown: escape first, then format a common subset.
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mdToHtml(src) {
  const blocks = [], inline = [];
  const SB=String.fromCharCode(57344),SE=String.fromCharCode(57345),IB=String.fromCharCode(57346),IE=String.fromCharCode(57347);
  src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    blocks.push('<pre><code>' + escHtml(code.replace(/\n$/,'')) + '</code></pre>');
    return SB + (blocks.length - 1) + SE;
  });
  src = escHtml(src);
  src = src.replace(/`([^`]+)`/g, (m, c) => { inline.push('<code>' + c + '</code>'); return IB + (inline.length-1) + IE; });
  src = src.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  src = src.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  src = src.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  src = src.replace(/^#{1,6}\s+(.+)$/gm, '<strong>$1</strong>');
  src = src.replace(/^\s*[-*]\s+(.+)$/gm, '• $1');
  src = src.replace(/\n/g, '<br>');
  src = src.replace(new RegExp(IB+'(\\d+)'+IE,'g'), (m, i) => inline[+i]);
  src = src.replace(new RegExp(SB+'(\\d+)'+SE,'g'), (m, i) => blocks[+i]);
  return src;
}

// Tool results can be huge — collapse them into a dropdown, opened on demand.
function resultBubble(text) {
  text = String(text);
  const d = document.createElement('div');
  d.className = 'msg tool_result';
  const det = document.createElement('details');
  const sum = document.createElement('summary');
  const oneline = text.replace(/\s+/g, ' ').trim();
  const chars = text.length.toLocaleString();
  sum.textContent = `result · ${chars} chars` + (oneline ? ` — ${clip(oneline, 70)}` : '');
  det.appendChild(sum);
  const body = document.createElement('div');
  body.className = 'result-body';
  body.textContent = clip(text, 8000);
  det.appendChild(body);
  d.appendChild(det);
  feed.appendChild(d);
  bumpThinking();
  feed.scrollTop = feed.scrollHeight;
}

function renderEvent(ev, live) {
  if (ev.role === 'user') {
    bubble('user', 'you', ev.text, true);
  } else if (ev.role === 'command') {
    if (/^\/?clear\b/.test(ev.text.trim())) {       // /clear wipes the TUI — wipe the transcript to match
      if (activeType) activeType.finish();
      feed.innerHTML = '';
      return;
    }
    bubble('cmd', 'command', '⌘ ' + ev.text);
  } else if (ev.role === 'system') {
    bubble('sys', 'system', ev.text);
  } else if (ev.role === 'assistant') {
    if (ev.text) {
      if (live) { typeBubble('assistant', 'claude', ev.text); speak(speakable(ev.text)); }
      else bubble('assistant', 'claude', ev.text, true);
    }
    (ev.tools || []).forEach(t => {
      const d = bubble('tool', 'tool', '');
      const body = d.lastChild;
      const nm = document.createElement('span'); nm.className = 'toolname'; nm.textContent = t.name;
      body.appendChild(nm);
      body.appendChild(document.createTextNode(' ' + summarizeInput(t.input)));
    });
    // (tool calls are shown but not spoken — only prose is read aloud)
  } else if (ev.role === 'tool_result') {
    (ev.results || []).forEach(r => resultBubble(r));
  } else if (ev.role === 'result') {
    const u = ev.usage || {};
    const tok = (u.input_tokens != null)
      ? ` · in ${u.input_tokens} / out ${u.output_tokens}` : '';
    bubble('result', 'turn complete',
      `${ev.subtype || ''}${ev.duration_ms ? ' · ' + Math.round(ev.duration_ms/1000) + 's' : ''}${tok}`);
  }
}

function summarizeInput(input) {
  if (input == null) return '';
  if (typeof input === 'string') return clip(input, 300);
  const keys = ['command','file_path','path','pattern','prompt','description','url','query'];
  for (const k of keys) if (input[k]) return clip(String(input[k]), 300);
  return clip(JSON.stringify(input), 300);
}
function clip(s, n) { s = String(s); return s.length > n ? s.slice(0, n) + '…' : s; }

// -- write channel ----------------------------------------------------------
function sendResize() {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({type:'resize', cols: term.cols, rows: term.rows}));
}
// -- image attachments (paste / drop → upload → fold path into message) ------
let attachments = [];   // {path, name, url}
const attachEl = document.getElementById('attachments');

function renderChips() {
  attachEl.innerHTML = '';
  attachments.forEach((a, i) => {
    const c = document.createElement('div');
    c.className = 'chip' + (a.pending ? ' up' : '');
    if (a.url) { const im = document.createElement('img'); im.src = a.url; c.appendChild(im); }
    c.appendChild(document.createTextNode(a.pending ? 'uploading…' : a.name));
    if (!a.pending) {
      const x = document.createElement('button'); x.textContent = '✕';
      x.onclick = () => { attachments.splice(i, 1); renderChips(); };
      c.appendChild(x);
    }
    attachEl.appendChild(c);
  });
}

async function uploadImage(file) {
  const slot = { pending: true, url: URL.createObjectURL(file) };
  attachments.push(slot); renderChips();
  try {
    const res = await fetch(`/upload?t=${encodeURIComponent(token)}`, {
      method: 'POST', headers: { 'Content-Type': file.type || 'image/png' }, body: file });
    const j = await res.json();
    slot.pending = false; slot.path = j.path; slot.name = j.name;
  } catch (e) {
    attachments = attachments.filter(a => a !== slot);
  }
  renderChips();
}

function sendMessage() {
  const text = box.value.trim();
  // `/new` is a console-level command — it spins up a fresh claude session
  // rather than being typed into the current one.
  if (/^\/new(\s|$)/.test(text)) { box.value = ''; newSession(); return; }
  const ready = attachments.filter(a => a.path);
  if ((!text && !ready.length) || !ws || ws.readyState !== 1) return;
  // claude reads each path via its Read tool → sees the image
  const full = [text, ...ready.map(a => a.path)].filter(Boolean).join(' ');
  ws.send(JSON.stringify({ type: 'send', text: full }));
  box.value = ''; attachments = []; renderChips();
}

box.addEventListener('paste', (e) => {
  const items = (e.clipboardData || {}).items || [];
  for (const it of items) {
    if (it.type && it.type.startsWith('image/')) {
      const f = it.getAsFile(); if (f) { e.preventDefault(); uploadImage(f); }
    }
  }
});
['dragover', 'drop'].forEach(ev => document.addEventListener(ev, (e) => {
  if (ev === 'dragover') { e.preventDefault(); return; }
  e.preventDefault();
  for (const f of (e.dataTransfer?.files || [])) {
    if (f.type.startsWith('image/')) uploadImage(f);
  }
}));
sendBtn.onclick = sendMessage;
box.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
// Raw passthrough when the user types directly in the terminal (desktop only;
// the terminal is read-only on touch, so onData won't fire there).
term.onData(d => sendKeys(d));

// Control-key bar: send raw escape sequences straight to the PTY (bypasses
// xterm, so it drives TUI menus even on touch where the terminal is read-only).
const KEY_SEQ = {
  esc: '\x1b', up: '\x1b[A', down: '\x1b[B', right: '\x1b[C', left: '\x1b[D',
  enter: '\r', tab: '\t', ctrlc: '\x03',
};
function sendKeys(data) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'input', data }));
}
document.getElementById('keys').addEventListener('click', (e) => {
  const k = e.target.closest('button')?.dataset.k;
  if (k && KEY_SEQ[k] != null) { sendKeys(KEY_SEQ[k]); box.focus(); }
});

// -- voice: read replies aloud (TTS) + dictate into the box (STT) -------------
// TTS prefers ElevenLabs (server-proxied via /tts when ELEVENLABS_API_KEY is set)
// and falls back to the browser-native Web Speech voice. STT rides Web Speech.
const ttsBtn = document.getElementById('ttsBtn');
const micBtn = document.getElementById('micBtn');

// --- text-to-speech: speak live assistant prose, chunk by chunk as it streams.
const synth = window.speechSynthesis || null;
let ttsOn = false;
let serverTts = false;                 // true once /config reports an ElevenLabs key
try { ttsOn = localStorage.getItem('cc_tts') === '1'; } catch {}
// Probe the server once: with a key we route audio through /tts (better voice).
fetch('/config').then(r => r.json()).then(c => { serverTts = !!c.tts; }).catch(() => {});

// ElevenLabs playback queue. speak() fires per streamed chunk and the fetches
// return out of order, so we play strictly in enqueue order. Each item carries
// an AbortController so toggling TTS off cancels in-flight fetches and audio.
let audioQueue = [], audioPlaying = false, audioEl = null;
const audioAborts = new Set();
function stopServerAudio() {
  audioAborts.forEach(a => { try { a.abort(); } catch {} }); audioAborts.clear();
  audioQueue = []; audioPlaying = false;
  if (audioEl) { try { audioEl.pause(); } catch {} audioEl = null; }
}
function playNext() {
  if (audioPlaying) return;
  const item = audioQueue.shift();
  if (!item) { if (!audioEl) ttsBtn.classList.remove('speaking'); return; }
  audioPlaying = true;
  item.urlP.then(url => {
    if (!ttsOn || url == null) { audioPlaying = false; return playNext(); }
    const a = new Audio(url); audioEl = a;
    a.playbackRate = 1.4;   // bump ElevenLabs read-aloud ~40% (pitch preserved by browser)
    ttsBtn.classList.add('speaking');
    a.onended = a.onerror = () => {
      URL.revokeObjectURL(url); audioPlaying = false;
      if (audioEl === a) audioEl = null;
      playNext();
    };
    a.play().catch(() => { audioPlaying = false; playNext(); });
  });
}
function speakServer(text) {
  // Fire the fetch immediately (parallel), but keep play order = enqueue order.
  const ac = new AbortController(); audioAborts.add(ac);
  const urlP = fetch(`/tts?t=${encodeURIComponent(token)}`, {
    method: 'POST', signal: ac.signal,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  }).then(r => r.ok ? r.blob() : null)
    .then(b => b ? URL.createObjectURL(b) : null)
    .catch(() => null)
    .finally(() => audioAborts.delete(ac));
  audioQueue.push({ urlP });
  playNext();
}

function setTts(on) {
  ttsOn = on;
  ttsBtn.classList.toggle('on', on);
  try { localStorage.setItem('cc_tts', on ? '1' : '0'); } catch {}
  // Chrome's cancel() doesn't reliably fire onend, so drop the pulse class by
  // hand — otherwise the button keeps animating as if it's still reading.
  if (!on) {
    if (synth) synth.cancel();
    stopServerAudio();
    ttsBtn.classList.remove('speaking');
  }
}
ttsBtn.onclick = () => setTts(!ttsOn);
setTts(ttsOn);

// Strip markdown down to something worth hearing: drop fenced code (reading it
// aloud is useless), unwrap inline code/bold/italic/links, flatten bullets.
function speakable(md) {
  return String(md)
    .replace(/```[\s\S]*?```/g, ' . code block . ')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1$2')
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/^\s*[-*]\s+/gm, ', ')
    .replace(/\s+/g, ' ').trim();
}
function speak(text) {
  if (!ttsOn || !text) return;
  if (serverTts) { speakServer(text); return; }   // ElevenLabs path
  if (!synth) return;
  // Browser fallback: chunk into sentences so toggling-off stops fast.
  for (const p of (text.match(/[^.!?]+[.!?]*/g) || [text])) {
    const s = p.trim(); if (!s) continue;
    const u = new SpeechSynthesisUtterance(s);
    u.rate = 1.05;
    u.onstart = () => ttsBtn.classList.add('speaking');
    u.onend = () => { if (!synth.speaking && !synth.pending) ttsBtn.classList.remove('speaking'); };
    synth.speak(u);
  }
}

// --- speech-to-text: dictate into the box by press-and-holding the mic button.
const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;
let rec = null, recOn = false, recBase = '';   // recBase = box text captured when recording began
function buildRec() {
  const r = new SR();
  r.continuous = true; r.interimResults = true; r.lang = 'en-US';
  r.onresult = (e) => {
    let finalT = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const tr = e.results[i];
      if (tr.isFinal) finalT += tr[0].transcript; else interim += tr[0].transcript;
    }
    if (finalT) recBase = (recBase + ' ' + finalT).replace(/\s+/g, ' ').trimStart();
    box.value = (recBase + ' ' + interim).replace(/\s+/g, ' ').trimStart();
  };
  r.onend = () => { if (recOn) { try { r.start(); } catch {} } };  // Chrome auto-stops; keep alive while on
  r.onerror = (ev) => { if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') stopRec(); };
  return r;
}
function startRec() {
  if (!SR || recOn) return;
  if (synth) synth.cancel();                  // barge-in: don't read replies back into the mic
  rec = rec || buildRec();
  recBase = box.value; recOn = true;
  micBtn.classList.add('rec'); box.focus();
  try { rec.start(); } catch {}
}
function stopRec() {
  if (!recOn) return;
  recOn = false; micBtn.classList.remove('rec');
  try { rec.stop(); } catch {}
}
if (!SR) { micBtn.disabled = true; micBtn.title = 'Speech-to-text not supported in this browser'; }
else {
  // Push-to-talk: press and hold the mic to dictate, release to stop. The space
  // bar is intentionally NOT bound — it types a normal space like any textarea.
  micBtn.title = 'Hold to dictate (speech-to-text)';
  const hold = (e) => { e.preventDefault(); startRec(); };
  const release = () => stopRec();
  micBtn.addEventListener('pointerdown', hold);
  micBtn.addEventListener('pointerup', release);
  micBtn.addEventListener('pointerleave', release);
  micBtn.addEventListener('pointercancel', release);
}

// -- view switcher: one of four depth levels at a time ------------------------
// projects → sessions → transcript → tty. Mobile defaults to the transcript
// (native scroll, markdown, no xterm pain) for a session; the app opens on the
// projects rung. Drop to the tty only to get surgical.
const projectsPanel = document.getElementById('projects');
const menuPanel = document.getElementById('menu');
const leftPanel = document.getElementById('left');
const rightPanel = document.getElementById('right');
const panelBtn = document.getElementById('panelBtn');
const menuBtn = document.getElementById('menuBtn');
const projectsBtn = document.getElementById('projectsBtn');
function setView(view) {
  const tty = view === 'tty', sessions = view === 'sessions', projects = view === 'projects';
  projectsPanel.classList.toggle('hidden', !projects);
  menuPanel.classList.toggle('hidden', !sessions);
  leftPanel.classList.toggle('hidden', !tty);
  rightPanel.classList.toggle('hidden', !(view === 'transcript'));
  document.getElementById('keys').style.display = tty ? '' : 'none';  // keys only drive the tty
  panelBtn.textContent = tty ? '▤ transcript' : '❯_ terminal';
  menuBtn.classList.toggle('on', sessions);
  projectsBtn.classList.toggle('on', projects);
  try { localStorage.setItem('cc_view', view); } catch {}
  syncUrl();                       // keep the URL in step with the depth we're at
  if (tty) setTimeout(() => { fit.fit(); sendResize(); term.scrollToBottom(); }, 60);
  else if (view === 'transcript') feed.scrollTop = feed.scrollHeight;
}
// the toggle button hops between the two deep views; projects/sessions have their own entries
panelBtn.onclick = () => setView(currentView() === 'tty' ? 'transcript' : 'tty');
menuBtn.onclick = () => { if (currentPid) setView('sessions'); else setView('projects'); };
projectsBtn.onclick = () => setView('projects');
document.getElementById('brand').onclick = () => setView('projects');
pendingNav = parseHash();        // restore project / session / depth from the URL…
setView(pendingNav.view);        // …optimistically; resolvePendingNav refines once data lands

// Auto-surface the TUI when claude asks something interactive (AskUserQuestion,
// plan approval, permission prompt) — those render only in the terminal, so the
// transcript view would otherwise leave you not knowing. Restore the prior view
// once the prompt is answered. Skips work if you're already on the tty.
let viewBeforeQuestion = null;
function currentView() {
  if (!projectsPanel.classList.contains('hidden')) return 'projects';
  if (!menuPanel.classList.contains('hidden')) return 'sessions';
  if (!leftPanel.classList.contains('hidden')) return 'tty';
  return 'transcript';
}

// -- URL routing: project / session / depth live in the hash (the `?t=` token
// stays in the query) so a reload — or a shared link — lands back where you were.
// Shapes: `#/` projects · `#/p/<pid>` sessions · `#/p/<pid>/s/<cid>` transcript
// · `#/p/<pid>/s/<cid>/tty` terminal.
function parseHash() {
  const parts = location.hash.replace(/^#\/?/, '').split('/').filter(Boolean);
  const nav = { view: 'projects', pid: null, cid: null };
  if (parts[0] === 'p' && parts[1]) {
    nav.pid = decodeURIComponent(parts[1]);
    nav.view = 'sessions';
    if (parts[2] === 's' && parts[3]) {
      nav.cid = decodeURIComponent(parts[3]);
      nav.view = parts[4] === 'tty' ? 'tty' : 'transcript';
    }
  }
  return nav;
}
function syncUrl() {
  if (pendingNav) return;          // mid-restore: don't write until the URL's state is applied
  const v = currentView();
  let h = '#/';
  if (v !== 'projects' && currentPid) {
    h = '#/p/' + encodeURIComponent(currentPid);
    if ((v === 'transcript' || v === 'tty') && currentCid) {
      h += '/s/' + encodeURIComponent(currentCid);
      if (v === 'tty') h += '/tty';
    }
  }
  if (h !== location.hash) { lastWrittenHash = h; location.hash = h; }
}
// Re-apply pendingNav as server data arrives (project list, then session list).
// Returns early — leaving pendingNav set — until the data it names shows up.
function resolvePendingNav() {
  const nav = pendingNav;
  if (!nav) return;
  if (nav.pid) {
    if (!projectList.length) return;                         // projects not in yet
    if (!projectList.some(p => p.pid === nav.pid)) {         // project is gone
      pendingNav = null; currentPid = null; setView('projects'); return;
    }
    currentPid = nav.pid;
    renderSessions();
  }
  if (nav.cid) {
    if (!gotSessions) return;                                // sessions not in yet
    const s = sessionList.find(x => x.cid === nav.cid);
    if (!s) {                                                // session is gone
      pendingNav = null; setView(currentPid ? 'sessions' : 'projects'); return;
    }
    currentPid = s.pid;
    subscribe(nav.cid);
  }
  pendingNav = null;
  setView(nav.view);
}
// Back/forward (or a hand-edited hash) — but ignore the writes syncUrl makes.
window.addEventListener('hashchange', () => {
  if (location.hash === lastWrittenHash) return;
  pendingNav = parseHash();
  resolvePendingNav();
});
function openTtyForQuestion() {
  if (currentView() === 'tty') return;
  if (viewBeforeQuestion === null) viewBeforeQuestion = currentView();
  setView('tty');
}
function restoreViewAfterQuestion() {
  if (viewBeforeQuestion === null) return;
  const v = viewBeforeQuestion; viewBeforeQuestion = null;
  setView(v);
}

// -- depth navigation: views are an ordered stack, shallow → deep. Swipe right
// climbs out (toward projects); swipe left dives in (toward the tty), matching
// the iOS back-gesture feel. projects → sessions → transcript → tty.
const LEVELS = ['projects', 'sessions', 'transcript', 'tty'];
function stepLevel(dir) {
  const i = LEVELS.indexOf(currentView());
  if (i === -1) return;
  let next = LEVELS[Math.min(LEVELS.length - 1, Math.max(0, i + dir))];
  // diving past projects needs a selected project; auto-pick the first ready
  // one if none is chosen, else stay put.
  if (next === 'sessions' && !currentPid) {
    const ready = projectList.find(p => p.status !== 'cloning' && p.status !== 'error');
    if (!ready) return;
    currentPid = ready.pid; renderSessions();
  }
  if (next !== currentView()) setView(next);
}
const goDeeper    = () => stepLevel(+1);   // swipe left
const goShallower = () => stepLevel(-1);   // swipe right

// Horizontal swipe on the stage switches depth. Listen in the capture phase so
// xterm (which handles its own touches on the tty view) can't swallow it.
// Vertical motion is left untouched so the transcript scrolls natively.
const stage = document.querySelector('main');
let swX = 0, swY = 0, swT = 0, swOn = false;
stage.addEventListener('touchstart', (e) => {
  swOn = e.touches.length === 1;
  if (!swOn) return;
  const t = e.touches[0]; swX = t.clientX; swY = t.clientY; swT = Date.now();
}, { capture: true, passive: true });
stage.addEventListener('touchend', (e) => {
  if (!swOn) return; swOn = false;
  const t = e.changedTouches[0];
  const dx = t.clientX - swX, dy = t.clientY - swY;
  if (Date.now() - swT > 800) return;                       // too slow for a flick
  if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.8) return;  // not a clean horizontal swipe
  if (dx < 0) goDeeper(); else goShallower();
}, { capture: true, passive: true });

window.addEventListener('resize', () => { fit.fit(); sendResize(); term.scrollToBottom(); });

// -- phone / QR --------------------------------------------------------------
const qrmodal = document.getElementById('qrmodal');
document.getElementById('phoneBtn').onclick = async () => {
  let url;
  try {
    const cfg = await (await fetch('/config')).json();
    url = `http://${cfg.lanIp}:${cfg.port}/?t=${encodeURIComponent(token)}`;
  } catch { url = location.href; }
  const holder = document.getElementById('qrcode');
  holder.innerHTML = '';
  new QRCode(holder, { text: url, width: 220, height: 220, correctLevel: QRCode.CorrectLevel.M });
  document.getElementById('qrurl').textContent = url;
  qrmodal.hidden = false;
};
document.getElementById('qrclose').onclick = () => { qrmodal.hidden = true; };
qrmodal.onclick = (e) => { if (e.target === qrmodal) qrmodal.hidden = true; };

connect();
</script>
</body>
