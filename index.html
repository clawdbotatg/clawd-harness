    const busyP = p.status === 'cloning', errP = p.status === 'error';
    const card = document.createElement('div');
    card.className = 'scard' + (p.pid === currentPid ? ' active' : '') +
                     (busyP ? ' cloning' : errP ? ' error' : '');
    card.dataset.pid = p.pid;
    if (!busyP && !errP) card.onclick = () => selectProject(p.pid);

    const row = document.createElement('div'); row.className = 'row';
    const sdot = document.createElement('span');
    sdot.className = 'sdot' + (busyP ? ' cloning' : errP ? ' err' : '');
    const title = document.createElement('span');
    title.className = 'stitle'; title.textContent = p.name;
    row.appendChild(sdot); row.appendChild(title);
    if (p.pinned) {
      const tag = document.createElement('span');
      tag.className = 'scount'; tag.textContent = 'this app'; tag.title = 'the running harness — live-editable';
      row.appendChild(tag);
    }
    if (p.waitingCount > 0) {
      const need = document.createElement('span');
      need.className = 'scount swait';
      need.textContent = `⏳ ${p.waitingCount} needs you`;
      need.title = `${p.waitingCount} session${p.waitingCount === 1 ? '' : 's'} blocked on you`;
      row.appendChild(need);
    }
    if (p.busyCount > 0) {
      const work = document.createElement('span');
      work.className = 'scount swork';
      work.textContent = `▶ ${p.busyCount} working`;
      work.title = `${p.busyCount} session${p.busyCount === 1 ? '' : 's'} actively working`;
      row.appendChild(work);
    }
    const count = document.createElement('span');
    count.className = 'scount'; count.textContent = `${p.sessionCount || 0} sess`;
    row.appendChild(count);
    card.appendChild(row);

    if (p.repoUrl) {
      const desc = document.createElement('div');
      desc.className = 'sdesc'; desc.textContent = p.repoUrl;
      card.appendChild(desc);
    }
    if (busyP) {
      const sm = document.createElement('div');
      sm.className = 'smeta'; sm.textContent = 'cloning…';
      card.appendChild(sm);
    } else if (errP) {
      const se = document.createElement('div');
      se.className = 'serror'; se.textContent = p.error || 'failed';
      card.appendChild(se);
    }

    projectsEl.appendChild(card);
  });

  applyProjectFilter();          // honor any live filter text after a re-render
  // landing on the projects rung: the box takes focus so you can filter/create
  // straight away. Desktop-only — autofocus on touch would pop the soft keyboard.
  // Don't steal focus while typing elsewhere or off this rung.
  if (!isTouch && currentView() === 'projects' && document.activeElement !== inp &&
      !(document.activeElement && /^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName))) {
    inp.focus();
    const n = inp.value.length; try { inp.setSelectionRange(n, n); } catch {}
  }
}

// projects matching the live filter (case-insensitive substring on name). Empty
// filter → everything. Drives both the Enter-to-open and the visual hide below.
function filteredProjects() {
  const q = projectFilter.trim().toLowerCase();
  if (!q) return projectList.slice();
  return projectList.filter(p => (p.name || '').toLowerCase().includes(q));
}
// show/hide the rendered cards to match the filter without rebuilding the DOM
// (keeps input focus while typing).
function applyProjectFilter() {
  const q = projectFilter.trim().toLowerCase();
  projectsEl.querySelectorAll('.scard').forEach(card => {
    const p = projectList.find(x => x.pid === card.dataset.pid);
    const hit = !q || (p && (p.name || '').toLowerCase().includes(q));
    card.style.display = hit ? '' : 'none';
  });
}

// -- sessions (the next rung, scoped to the selected project) ----------------
function subscribe(cid) {
  if (!cid) return;
  currentCid = cid;
  // Wipe both views; the server re-streams this session's screen + history right
  // after. Always clearing (even re-subscribing the same cid on reconnect) keeps
  // the replayed history from duplicating into an existing feed.
  term.reset();
  feed.innerHTML = '';
  clearPending();              // queued boxes belong to the session we're leaving
  hideThinking();
  if (activeType) { activeType.finish(); activeType = null; }
  highlightCard(cid);
  syncComposer();              // load this session's own draft (bring back text from before a reload)
  hsend({ type: 'subscribe', cid });
  armHardRepaint();            // the replayed screen lands as async PTY bursts — force one full repaint once it settles
  syncUrl();
}

function openSession(cid) {
  const s = sessionList.find(s => s.cid === cid);
  if (s && s.pid) currentPid = s.pid;       // keep the breadcrumb/`new` in this project
  subscribe(cid);
  setView(DEEP_VIEW);                        // desktop → terminal, touch → transcript
  if (!isTouch) box.focus();                // desktop: ready to type immediately (skip on touch — don't pop the keyboard)
}

function newSession() {
  if (!currentPid) { setView('projects'); return; }   // need a project to host it
  pendingNewFocus = true;          // the focus that comes back should switch us into it
  hsend({ type: 'new', pid: currentPid });
  setView(DEEP_VIEW);              // server replies with a focus → subscribe once it's spawned
}

function closeSession(cid, ev) {
  if (ev) ev.stopPropagation();
  hsend({ type: 'close', cid });
}

// -- keyboard session-hopping (Ctrl+Shift+↑/↓ cycle, Ctrl+Shift+W close) ------
// Up/down cycle through EVERY session across all projects (currentPid follows
// the session into its project, so the breadcrumb switches too) — a fast "where
// are we" sweep. We stay at the current depth: cycling inside the tty swaps the
// terminal, inside the transcript swaps the bubbles, on a list just moves the
// highlight. Left/right (Ctrl+Shift) drive the abstraction nav instead — see the
// capture-phase handler below, which works even from inside the terminal.
function cycleSession(dir) {
  if (!sessionList.length) return;
  const idx = sessionList.findIndex(s => s.cid === currentCid);
  const next = idx < 0 ? (dir > 0 ? 0 : sessionList.length - 1)
                       : (idx + dir + sessionList.length) % sessionList.length;
  const s = sessionList[next];
  if (s.pid) currentPid = s.pid;     // follow the session into its project
  subscribe(s.cid);                  // swap content; subscribe() never changes depth
  if (!isTouch) box.focus();
}

function closeCurrentSession() {
  if (!currentCid) return;
  // Stay within the current project: pick a neighbour from THIS project only,
  // and if there are none left, fall back to its session list — never hop to a
  // session in another project.
  const mine = sessionList.filter(s => s.pid === currentPid);
  const idx = mine.findIndex(s => s.cid === currentCid);
  const rest = mine.filter(s => s.cid !== currentCid);
  console.log('[TRACE close] currentPid=', currentPid, 'currentCid=', currentCid,
    'mine=', mine.map(s=>s.cid.slice(0,6)+'@'+String(s.pid).slice(0,6)),
    'rest=', rest.length);
  closeSession(currentCid);
  if (!rest.length) { console.log('[TRACE close] -> navTo sessions'); navTo('sessions'); return; }   // closed the last one in this project — fall back to the list
  const nb = rest[Math.min(idx, rest.length - 1)] || rest[0];
  console.log('[TRACE close] -> subscribe sibling', nb.cid.slice(0,6), 'pid=', String(nb.pid).slice(0,6));
  subscribe(nb.cid);                 // land on a neighbour in the same project, keeping the current depth
  if (!isTouch) box.focus();
}

function highlightCard(cid) {
  sessionsEl.querySelectorAll('.scard').forEach(c =>
    c.classList.toggle('active', c.dataset.cid === cid));
}

function renderSessions() {
  const list = sessionList.filter(s => s.pid === currentPid);
  sessionsEl.innerHTML = '';
  const label = document.createElement('div');
  label.className = 'menutitle';
  const pn = projectName(currentPid);
  label.textContent = (pn ? pn + ' · ' : '') + `sessions · ${list.length}`;
  sessionsEl.appendChild(label);

  const add = document.createElement('button');
  add.id = 'newSession'; add.textContent = '＋  new session';
  add.onclick = newSession;
  sessionsEl.appendChild(add);

  list.forEach(s => {
    const card = document.createElement('div');
    card.className = 'scard' + (s.cid === currentCid ? ' active' : '');
    card.dataset.cid = s.cid;
    card.onclick = () => { pendingSendText = null; openSession(s.cid); };  // manual open cancels a queued new-session send

    const row = document.createElement('div'); row.className = 'row';
    const sdot = document.createElement('span');
    sdot.className = 'sdot' + (!s.alive ? ' dead' : s.waiting ? ' blocked' : s.busy ? ' busy' : '');
    const title = document.createElement('span');
    title.className = 'stitle'; title.textContent = s.title || 'new session';
    row.appendChild(sdot); row.appendChild(title);
    card.appendChild(row);

    if (s.desc) {
      const desc = document.createElement('div');
      desc.className = 'sdesc'; desc.textContent = s.desc;
      card.appendChild(desc);
    }
    // live digest ("what it's doing right now"), shown when it adds over the stable desc
    if (s.digest && s.digest !== s.desc) {
      const dig = document.createElement('div');
      dig.className = 'sdig'; dig.textContent = '› ' + s.digest;
      card.appendChild(dig);
    }
    // the "needs you" line — highest-signal state, surfaced prominently
    if (s.blocked_on) {
      const blk = document.createElement('div');
      blk.className = 'sblock'; blk.textContent = '⏳ ' + s.blocked_on;
      card.appendChild(blk);
    }
    const sm = document.createElement('div');
    sm.className = 'smeta';
    const state = !s.alive ? 'ended' : s.waiting ? 'needs you' :
                  s.busy ? (s.tool ? `running ${s.tool}` : 'working…') : 'idle';
    sm.textContent = `${s.promptCount || 0} msg · ${state}`;
    card.appendChild(sm);

    const x = document.createElement('button');
    x.className = 'sclose'; x.textContent = '✕'; x.title = 'close session';
    x.onclick = (e) => closeSession(s.cid, e);
    card.appendChild(x);

    sessionsEl.appendChild(card);
  });
}

function setBusy(busy, label) {
  if (busy) {
    setStatus('🟡', label ? `working · ${label}` : 'working…', 'working');
    showThinking(label);
  } else {
    setStatus('🟢', 'idle · ready', 'idle');
    hideThinking();
  }
}

// Live thinking indicator in the transcript: spinner + current activity + elapsed seconds,
// pinned to the bottom of the feed while a turn is in flight (mirrors the TUI's spinner).
let thinkEl = null, thinkTimer = null, thinkStart = 0, thinkLabel = '';
// braille spinner frames — terminal-native, spins like a CLI does (no square-corner jank)
const SPIN_FRAMES = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
let spinTimer = null, spinFrame = 0;
function showThinking(label) {
  thinkLabel = label || '';
  if (!thinkEl) {
    thinkEl = document.createElement('div');
    thinkEl.className = 'thinking';
    thinkEl.innerHTML = '<span class="spin"></span><span class="lbl"></span>';
    thinkStart = Date.now();
    thinkTimer = setInterval(paintThinking, 1000);
    spinTimer = setInterval(spinTick, 80);   // fast frame cadence for a lively spin
  }
  feed.appendChild(thinkEl);            // keep it the last child as new events arrive
  paintThinking();
  spinTick();
  feed.scrollTop = feed.scrollHeight;
}
function spinTick() {
  if (!thinkEl) return;
  spinFrame = (spinFrame + 1) % SPIN_FRAMES.length;
  thinkEl.querySelector('.spin').textContent = SPIN_FRAMES[spinFrame];
}
function paintThinking() {
  if (!thinkEl) return;
  const secs = Math.round((Date.now() - thinkStart) / 1000);
  const what = thinkLabel ? `running ${thinkLabel}` : 'thinking';
  thinkEl.querySelector('.lbl').textContent = `claude is ${what}… ${secs}s`;
}
function hideThinking() {
  if (thinkTimer) { clearInterval(thinkTimer); thinkTimer = null; }
  if (spinTimer) { clearInterval(spinTimer); spinTimer = null; }
  if (thinkEl) { thinkEl.remove(); thinkEl = null; }
}
function bumpThinking() { if (thinkEl) feed.appendChild(thinkEl); }  // re-pin below newest content

function handleHook(m) {
  const ev = m.event, d = m.data || {};
  const tool = d.tool || m.tool;
  // A fresh user prompt means you're driving the TTY yourself — cancel any pending
  // auto-return (don't yank you back to where a question pulled you from).
  if (ev === 'UserPromptSubmit') { setBusy(true, null); viewBeforeQuestion = null; deferredView = null; }
  else if (ev === 'PreToolUse')  {
    setBusy(true, tool);
    // these tools render an interactive prompt that only shows in the TUI
    if (tool === 'AskUserQuestion' || tool === 'ExitPlanMode') openTtyForQuestion();
    else restoreViewAfterQuestion();          // a normal tool starting = prior prompt was answered
  }
  else if (ev === 'PostToolUse') {
    setBusy(true, tool);
    if (tool === 'AskUserQuestion' || tool === 'ExitPlanMode') restoreViewAfterQuestion();
  }
  else if (ev === 'Stop')        { setBusy(false, null); restoreViewAfterQuestion(); }
  else if (ev === 'SessionStart') { setBusy(false, null); if (pendingSendText) setTimeout(flushPendingSend, 500); }
  else if (ev === 'SessionEnd')  { hideThinking(); setStatus('🔴', 'session ended', ''); }
  else if (ev === 'Notification') {
    setBusy(m.busy, d.message ? d.message.slice(0,40) : null);
    openTtyForQuestion();                      // permission / "needs your input" — surface the TUI
  }
}

// `feedEl` defaults to the session transcript feed; the PM view passes #pmfeed so
// it renders with the exact same bubble vocabulary. Bump the spinner that belongs
// to the target feed (session vs PM each own one).
function bubble(cls, who, text, asMarkdown, feedEl) {
  const F = feedEl || feed;
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  const w = document.createElement('div'); w.className = 'who'; w.textContent = who;
  d.appendChild(w);
  const body = document.createElement('div');
  if (asMarkdown) { body.className = 'md'; body.innerHTML = mdToHtml(text); }
  else body.textContent = text;
  d.appendChild(body);
  F.appendChild(d);
  (F === pmfeed ? pmBumpThinking : bumpThinking)();
  F.scrollTop = F.scrollHeight;
  return d;
}

// Typewriter reveal for live assistant prose — re-renders markdown of the
// growing prefix each tick so formatting (bold, code, lists) stays intact as it
// streams, mirroring the TUI. Step count is capped so long messages stay snappy.
// Only one types at a time; a new one instantly finalizes the previous.
let activeType = null;
function typeBubble(cls, who, text, feedEl) {
  const F = feedEl || feed;
  const bump = F === pmfeed ? pmBumpThinking : bumpThinking;
  if (activeType) activeType.finish();
  const d = bubble(cls, who, '', true, F);
  const body = d.lastChild;
  const n = text.length;
  const steps = Math.min(70, Math.max(8, Math.ceil(n / 8)));
  let step = 0, done = false;
  const paint = (k) => { body.innerHTML = mdToHtml(text.slice(0, k)); bump(); F.scrollTop = F.scrollHeight; };
  const finish = () => {
    if (done) return; done = true;
    clearInterval(timer);
    body.innerHTML = mdToHtml(text);
    bump(); F.scrollTop = F.scrollHeight;
    if (activeType === handle) activeType = null;
  };
  const timer = setInterval(() => {
    step++;
    paint(Math.round(n * step / steps));
    if (step >= steps) finish();
  }, 22);
  const handle = { finish };
  activeType = handle;
  return d;
}

// Minimal, XSS-safe markdown: escape first, then format a common subset.
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function mdToHtml(src) {
  const blocks = [], inline = [];
  const SB=String.fromCharCode(57344),SE=String.fromCharCode(57345),IB=String.fromCharCode(57346),IE=String.fromCharCode(57347);
  src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    blocks.push('<pre><code>' + escHtml(code.replace(/\n$/,'')) + '</code></pre>');
    return SB + (blocks.length - 1) + SE;
  });
  src = escHtml(src);
  src = src.replace(/`([^`]+)`/g, (m, c) => { inline.push('<code>' + c + '</code>'); return IB + (inline.length-1) + IE; });
  src = src.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  src = src.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  src = src.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  src = src.replace(/^#{1,6}\s+(.+)$/gm, '<strong>$1</strong>');
  src = src.replace(/^\s*[-*]\s+(.+)$/gm, '• $1');
  src = src.replace(/\n/g, '<br>');
  src = src.replace(new RegExp(IB+'(\\d+)'+IE,'g'), (m, i) => inline[+i]);
  src = src.replace(new RegExp(SB+'(\\d+)'+SE,'g'), (m, i) => blocks[+i]);
  return src;
}

// Tool results can be huge — collapse them into a dropdown, opened on demand.
function resultBubble(text, feedEl) {
  const F = feedEl || feed;
  text = String(text);
  const d = document.createElement('div');
  d.className = 'msg tool_result';
  const det = document.createElement('details');
  const sum = document.createElement('summary');
  const oneline = text.replace(/\s+/g, ' ').trim();
  const chars = text.length.toLocaleString();
  sum.textContent = `result · ${chars} chars` + (oneline ? ` — ${clip(oneline, 70)}` : '');
  det.appendChild(sum);
  const body = document.createElement('div');
  body.className = 'result-body';
  body.textContent = clip(text, 8000);
  det.appendChild(body);
  d.appendChild(det);
  F.appendChild(d);
  (F === pmfeed ? pmBumpThinking : bumpThinking)();
  F.scrollTop = F.scrollHeight;
}

function renderEvent(ev, live) {
  if (ev.role === 'user') {
    if (live) landPending(ev.text);   // it arrived — drop its queued yellow box
    bubble('user', 'you', ev.text, true);
  } else if (ev.role === 'command') {
    if (live) landPending(ev.text);   // box-sent slash commands land here, not as `user`
    if (/^\/?clear\b/.test(ev.text.trim())) {       // /clear wipes the TUI — wipe the transcript to match
      if (activeType) activeType.finish();
      feed.innerHTML = '';
      return;
    }
    bubble('cmd', 'command', '⌘ ' + ev.text);
  } else if (ev.role === 'system') {
    bubble('sys', 'system', ev.text);
  } else if (ev.role === 'assistant') {
    if (ev.text) {
      if (live) { typeBubble('assistant', 'claude', ev.text); speak(speakable(ev.text)); }
      else bubble('assistant', 'claude', ev.text, true);
    }
    (ev.tools || []).forEach(t => {
      const d = bubble('tool', 'tool', '');
      const body = d.lastChild;
      const nm = document.createElement('span'); nm.className = 'toolname'; nm.textContent = t.name;
      body.appendChild(nm);
      body.appendChild(document.createTextNode(' ' + summarizeInput(t.input)));
    });
    // (tool calls are shown but not spoken — only prose is read aloud)
  } else if (ev.role === 'tool_result') {
    (ev.results || []).forEach(r => resultBubble(r));
  } else if (ev.role === 'result') {
    const u = ev.usage || {};
    const tok = (u.input_tokens != null)
      ? ` · in ${u.input_tokens} / out ${u.output_tokens}` : '';
    bubble('result', 'turn complete',
      `${ev.subtype || ''}${ev.duration_ms ? ' · ' + Math.round(ev.duration_ms/1000) + 's' : ''}${tok}`);
  }
}

function summarizeInput(input) {
  if (input == null) return '';
  if (typeof input === 'string') return clip(input, 300);
  const keys = ['command','file_path','path','pattern','prompt','description','url','query'];
  for (const k of keys) if (input[k]) return clip(String(input[k]), 300);
  return clip(JSON.stringify(input), 300);
}
function clip(s, n) { s = String(s); return s.length > n ? s.slice(0, n) + '…' : s; }

// -- write channel ----------------------------------------------------------
function sendResize() {
  hsend({ type: 'resize', cols: term.cols, rows: term.rows });
}
// -- image attachments (paste / drop → upload → fold path into message) ------
let attachments = [];   // {path, name, url}
const attachEl = document.getElementById('attachments');

function renderChips() {
  attachEl.innerHTML = '';
  attachments.forEach((a, i) => {
    const c = document.createElement('div');
    c.className = 'chip' + (a.pending ? ' up' : '');
    if (a.url) { const im = document.createElement('img'); im.src = a.url; c.appendChild(im); }
    c.appendChild(document.createTextNode(a.pending ? 'uploading…' : a.name));
    if (!a.pending) {
      const x = document.createElement('button'); x.textContent = '✕';
      x.onclick = () => { attachments.splice(i, 1); renderChips(); };
      c.appendChild(x);
    }
    attachEl.appendChild(c);
  });
}

async function uploadImage(file) {
  if (!currentMachine) return;   // no machine selected → nowhere to upload to
  const slot = { pending: true, url: URL.createObjectURL(file) };
  attachments.push(slot); renderChips();
  try {
    // The relay forwards the bytes to the current machine's worker, which POSTs
    // to that machine's local harness /upload and returns a path local to it.
    const res = await fetch(`/upload?t=${encodeURIComponent(token)}&machine=${encodeURIComponent(currentMachine)}`, {
      method: 'POST', headers: { 'Content-Type': file.type || 'image/png' }, body: file });
    if (!res.ok) throw new Error('upload failed');
    const j = await res.json();
    slot.pending = false; slot.path = j.path; slot.name = j.name;
  } catch (e) {
    attachments = attachments.filter(a => a !== slot);
  }
  renderChips();
}

// Image picker button → hidden <input type=file> → same uploadImage pipeline as
// paste/drop. Reset .value each time so picking the same file twice re-fires.
const imgBtn = document.getElementById('imgBtn');
const imgInput = document.getElementById('imgInput');
imgBtn.onclick = () => imgInput.click();
imgInput.addEventListener('change', () => {
  for (const f of imgInput.files) { if (f.type.startsWith('image/')) uploadImage(f); }
  imgInput.value = '';
});

// Locally-acked message queue: typing + Enter immediately shows a yellow box
// above the input so you know the message is on its way, even while claude is
// busy on a prior turn. Each entry is removed once its `user` event lands in the
// transcript (mirrors how the TUI drops your text below the loader).
let pendingMsgs = [];   // [{ key, el }] — `key` is the full sent text, matched on landing
function addPending(key, display) {
  const d = document.createElement('div');
  d.className = 'pending-msg';
  const tag = document.createElement('span'); tag.className = 'tag'; tag.textContent = '⏳ queued';
  const body = document.createElement('div'); body.textContent = display;
  d.appendChild(tag); d.appendChild(body);
  pendingEl.appendChild(d);
  pendingMsgs.push({ key, el: d });
}
// A user event landed in the transcript — drop the matching queued box. Exact
// (trimmed) match first; fall back to the oldest, since messages land in order
// and the server may lightly rewrite the text (noise-stripping, image paths).
function landPending(landed) {
  if (!pendingMsgs.length) return;
  const lt = (landed || '').trim();
  let i = pendingMsgs.findIndex(p => p.key.trim() === lt);
  if (i < 0) i = 0;
  const [p] = pendingMsgs.splice(i, 1);
  p.el.remove();
}
function clearPending() { pendingMsgs = []; pendingEl.innerHTML = ''; }
// Deliver the message typed on the sessions list, once the new session is up.
// Fires from the SessionStart hook (preferred) with a setTimeout fallback;
// guarded so whichever runs first wins and the other no-ops.
function flushPendingSend() {
  if (!pendingSendText || !ws || ws.readyState !== 1) return;
  hsend({ type: 'send', text: pendingSendText });
  stashOutbox(currentCid, pendingSendText);  // now bound to a real session — hold until confirmed
  stashPending(null);                        // it's the outbox's job to recover it now
  pendingSendText = null;
}

// -- draft persistence: a half-typed message must survive a live-reload (we edit
// this very app, so an index.html change reloads the page out from under you) or
// any other reload. Each composer CONTEXT keeps its own draft — a session is keyed
// by its cid, and the sessions-list "new session" box is keyed per project — even
// though they share one physical <textarea>. On every context switch we save the
// box back to the OLD context and load the NEW one, so a session draft never bleeds
// into the new-session box (or vice-versa). Dropped once it's actually sent.
const draftKey = (id) => 'cc_draft:' + (id || '_');
function currentDraftId() {
  const v = currentView();
  if (v === 'pm') return 'pm:' + (pmCurrent || '_');           // a draft per PM thread
  if (v === 'sessions') return 'new:' + (currentPid || '_');   // the "new session" composer, per project
  if (v === 'transcript' || v === 'tty') return currentCid;    // talking to one specific session
  return null;                                                 // projects rung — composer is hidden
}
// The outbox closes the gap between "you hit Enter" and "claude actually has it".
// On send we clear the draft but stash the text here; we only drop it once claude
// confirms receipt (UserPromptSubmit). So if a restart/reload lands in that window,
// the text comes back into the box instead of vanishing. (See syncComposer.)
const outboxKey = (cid) => 'cc_outbox:' + (cid || '_');
function stashOutbox(cid, text) { try { if (cid && text) localStorage.setItem(outboxKey(cid), text); } catch {} }
function clearOutbox(cid) { try { localStorage.removeItem(outboxKey(cid)); } catch {} }
// Text typed on the sessions list (no session yet) — survives reload before the
// new session even exists; recovered into the new-session composer.
const PENDING_KEY = 'cc_pendingsend';
function stashPending(text) { try { text ? localStorage.setItem(PENDING_KEY, text) : localStorage.removeItem(PENDING_KEY); } catch {} }
function takePending() { try { const t = localStorage.getItem(PENDING_KEY) || ''; localStorage.removeItem(PENDING_KEY); return t; } catch { return ''; } }

let activeDraftId = null;   // which context's draft is currently sitting in the box
// Persist the box into the context it belongs to (called as you type, and before any swap).
function saveDraft() {
  if (!activeDraftId) return;
  try { box.value ? localStorage.setItem(draftKey(activeDraftId), box.value)
                  : localStorage.removeItem(draftKey(activeDraftId)); } catch {}
}
function clearDraft() { try { if (activeDraftId) localStorage.removeItem(draftKey(activeDraftId)); } catch {} }
// Preserve the message-box caret across a reload (live-reload / daemon restart):
// snapshot before location.reload(), restore once the same draft is back in the box.
function snapshotBoxFocus() {
  try {
    if (document.activeElement !== box) return;
    sessionStorage.setItem('cc_boxfocus', JSON.stringify({
      id: activeDraftId, start: box.selectionStart, end: box.selectionEnd }));
  } catch {}
}
function restoreBoxFocus() {
  let s;
  try { s = JSON.parse(sessionStorage.getItem('cc_boxfocus') || 'null'); } catch {}
  if (!s || s.id !== activeDraftId) return;     // wait for the composer we were typing in
  try { sessionStorage.removeItem('cc_boxfocus'); } catch {}
  try {
    box.focus({ preventScroll: false });
    const n = box.value.length;
    box.setSelectionRange(Math.min(s.start ?? n, n), Math.min(s.end ?? n, n));
  } catch {}
}
// Reconcile the shared textarea to whatever context we're now in: save the outgoing
// context, then load the incoming one (recovering unconfirmed sent text or a queued
// sessions-list message if there's no live draft). Never loses text, never bleeds it.
function syncComposer() {
  const id = currentDraftId();
  if (id === activeDraftId) return;          // same context — leave the box alone
  saveDraft();                               // stash the outgoing context first
  activeDraftId = id;
  if (!id) { box.value = ''; autosizeBox(); return; }   // projects rung — nothing to compose
  let v = '';
  try {
    v = localStorage.getItem(draftKey(id)) || '';
    if (!v) v = String(id).startsWith('new:') ? takePending()                          // sessions composer recovers a queued send
                                              : (localStorage.getItem(outboxKey(id)) || '');  // session recovers an unconfirmed send
  } catch {}
  box.value = v;
  autosizeBox();                             // size to the restored draft (or shrink back if empty)
  restoreBoxFocus();                         // if a reload stole focus mid-type, put it back here
}
// Grow the textarea (and thus the footer/bottom panel) as lines are added, clamped
// by the CSS max-height; the footer's ResizeObserver (see refitTTY) pushes the
// terminal up as we grow. Modern browsers do this natively via `field-sizing:content`
// (see #box CSS) — there we MUST NOT set an explicit height or it would pin the box
// and defeat the native shrink-on-clear. So autosizeBox is a no-op when supported and
// only the JS fallback below runs on older engines. Fallback stays desktop-only.
const finePointer = window.matchMedia('(pointer: fine)').matches;
const nativeFieldSizing = window.CSS && CSS.supports && CSS.supports('field-sizing', 'content');
function autosizeBox() {
  if (nativeFieldSizing || !finePointer) return;   // CSS owns sizing when field-sizing is supported
  box.style.height = 'auto';                       // let it shrink back when lines are removed
  box.style.height = box.scrollHeight + 'px';      // CSS min/max-height clamp the result
}
box.addEventListener('input', () => { saveDraft(); autosizeBox(); });

// -- don't yank the view while you're mid-message. Hook-driven auto-switches (a
// question surfacing the TUI, then restoring) go through autoSetView, which parks
// the switch until you blur the box rather than jerking you off a live draft.
let deferredView = null;
function composing() { return document.activeElement === box && box.value.trim() !== ''; }
function autoSetView(v) { if (composing()) { deferredView = v; return; } setView(v); }
box.addEventListener('blur', () => {
  if (deferredView !== null) { const v = deferredView; deferredView = null; setView(v); }
});

function sendMessage() {
  const text = box.value.trim();
  // PM view: the composer talks to the current PM thread (HTTP), not a WS session.
  if (currentView() === 'pm') { if (text) { box.value = ''; autosizeBox(); clearDraft(); pmSend(text); } return; }
  // `/new` is a console-level command — it spins up a fresh claude session
  // rather than being typed into the current one.
  if (/^\/new(\s|$)/.test(text)) { box.value = ''; autosizeBox(); clearDraft(); newSession(); return; }
  const ready = attachments.filter(a => a.path);
  if ((!text && !ready.length) || !ws || ws.readyState !== 1) return;
  // claude reads each path via its Read tool → sees the image
  const full = [text, ...ready.map(a => a.path)].filter(Boolean).join(' ');
  // On the sessions list there's no session to talk to — spin up a fresh one in
  // this project and deliver the text once it's booted (see flushPendingSend).
  if (currentView() === 'sessions') {
    if (!currentPid) return;
    pendingSendText = full;
    stashPending(text || full);       // survive a reload before the session even exists
    box.value = ''; autosizeBox(); clearDraft(); attachments = []; renderChips();
    newSession();                     // focus reply → openSession → queued box shown
    setTimeout(flushPendingSend, 8000);   // fallback if the SessionStart hook never lands
    return;
  }
  hsend({ type: 'send', text: full });
  stashOutbox(currentCid, text || full);  // hold until claude confirms (UserPromptSubmit) — survives a mid-send restart
  viewBeforeQuestion = null;          // you're acting here on purpose — don't auto-return
  addPending(full, text || ready.map(a => a.name).join(', ') || full);
  box.value = ''; autosizeBox(); clearDraft(); attachments = []; renderChips();
}

box.addEventListener('paste', (e) => {
  const items = (e.clipboardData || {}).items || [];
  for (const it of items) {
    if (it.type && it.type.startsWith('image/')) {
      const f = it.getAsFile(); if (f) { e.preventDefault(); uploadImage(f); }
    }
  }
});
['dragover', 'drop'].forEach(ev => document.addEventListener(ev, (e) => {
  if (ev === 'dragover') { e.preventDefault(); return; }
  e.preventDefault();
  for (const f of (e.dataTransfer?.files || [])) {
    if (f.type.startsWith('image/')) uploadImage(f);
  }
}));
sendBtn.onclick = sendMessage;
box.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
// Raw passthrough when the user types directly in the terminal (desktop only;
// the terminal is read-only on touch, so onData won't fire there).
term.onData(d => sendKeys(d));
// Shift+Enter should insert a newline, not submit. xterm sends a bare \r for
// Enter regardless of modifiers, so intercept it and send \n (0x0A / Ctrl+J) —
// the sequence claude's input box treats as "newline" in any terminal.
// We must preventDefault() ourselves: returning false makes xterm bail without
// preventing the browser's default Enter action, which would otherwise insert a
// newline into xterm's helper textarea and get forwarded to the PTY as a submit.
term.attachCustomKeyEventHandler((e) => {
  if (e.type === 'keydown' && e.key === 'Enter' && e.shiftKey) {
    e.preventDefault();
    e.stopPropagation();
    sendKeys('\n');
    return false;  // stop xterm from also sending a plain \r (which submits)
  }
  return true;
});

// Control-key bar: send raw escape sequences straight to the PTY (bypasses
// xterm, so it drives TUI menus even on touch where the terminal is read-only).
const KEY_SEQ = {
  esc: '\x1b', up: '\x1b[A', down: '\x1b[B', right: '\x1b[C', left: '\x1b[D',
  enter: '\r', tab: '\t', ctrlc: '\x03',

}

// -- voice: read replies aloud (TTS) + dictate into the box (STT) -------------
// TTS prefers ElevenLabs (server-proxied via /tts when ELEVENLABS_API_KEY is set)
// and falls back to the browser-native Web Speech voice. STT rides Web Speech.
const ttsBtn = document.getElementById('ttsBtn');
const micBtn = document.getElementById('micBtn');

// --- text-to-speech: speak live assistant prose, chunk by chunk as it streams.
const synth = window.speechSynthesis || null;
let ttsOn = false;
let serverTts = false;                 // true once /config reports an ElevenLabs key
try { ttsOn = localStorage.getItem('cc_tts') === '1'; } catch {}
// Probe the server once: with a key we route audio through /tts (better voice).
// /config is token-gated (it leaks workdir/lanIp); send the token we hold. In
// fleet mode the relay doesn't serve /config, so this just falls through to catch.
fetch('/config' + (FLEET ? '' : '?t=' + encodeURIComponent(token))).then(r => r.json()).then(c => { serverTts = !!c.tts; }).catch(() => {});

// ElevenLabs playback queue. speak() fires per streamed chunk and the fetches
// return out of order, so we play strictly in enqueue order. Each item carries
// an AbortController so toggling TTS off cancels in-flight fetches and audio.
let audioQueue = [], audioPlaying = false, audioEl = null;

  audioAborts.forEach(a => { try { a.abort(); } catch {} }); audioAborts.clear();
  audioQueue = []; audioPlaying = false;
  if (audioEl) { try { audioEl.pause(); } catch {} audioEl = null; }
}
function playNext() {
  if (audioPlaying) return;
  const item = audioQueue.shift();
  if (!item) { if (!audioEl) ttsBtn.classList.remove('speaking'); return; }
  audioPlaying = true;
  item.urlP.then(url => {
    if (!ttsOn || url == null) { audioPlaying = false; return playNext(); }
    const a = new Audio(url); audioEl = a;
    a.playbackRate = 1.4;   // bump ElevenLabs read-aloud ~40% (pitch preserved by browser)
    ttsBtn.classList.add('speaking');
    a.onended = a.onerror = () => {
      URL.revokeObjectURL(url); audioPlaying = false;
      if (audioEl === a) audioEl = null;
      playNext();
    };
    a.play().catch(() => { audioPlaying = false; playNext(); });
  });
}
function speakServer(text) {
  // Fire the fetch immediately (parallel), but keep play order = enqueue order.
  const ac = new AbortController(); audioAborts.add(ac);
  const urlP = fetch(`/tts?t=${encodeURIComponent(token)}`, {
    method: 'POST', signal: ac.signal,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  }).then(r => r.ok ? r.blob() : null)
    .then(b => b ? URL.createObjectURL(b) : null)
    .catch(() => null)
    .finally(() => audioAborts.delete(ac));

function setTts(on) {
  ttsOn = on;
  ttsBtn.classList.toggle('on', on);
  try { localStorage.setItem('cc_tts', on ? '1' : '0'); } catch {}
  // Chrome's cancel() doesn't reliably fire onend, so drop the pulse class by
  // hand — otherwise the button keeps animating as if it's still reading.
  if (!on) {

ttsBtn.onclick = () => setTts(!ttsOn);

// Strip markdown down to something worth hearing: drop fenced code (reading it
// aloud is useless), unwrap inline code/bold/italic/links, flatten bullets.
function speakable(md) {
  return String(md)
    .replace(/```[\s\S]*?```/g, ' . code block . ')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/(^|[^*])\*([^*\n]+)\*/g, '$1$2')
    .replace(/^#{1,6}\s+/gm, '')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/^\s*[-*]\s+/gm, ', ')
    .replace(/\s+/g, ' ').trim();
}
function speak(text) {
  if (!ttsOn || !text) return;
  if (serverTts) { speakServer(text); return; }   // ElevenLabs path
  if (!synth) return;
  // Browser fallback: chunk into sentences so toggling-off stops fast.
  for (const p of (text.match(/[^.!?]+[.!?]*/g) || [text])) {
    const s = p.trim(); if (!s) continue;
    const u = new SpeechSynthesisUtterance(s);
    u.rate = 1.05;
    u.onstart = () => ttsBtn.classList.add('speaking');
    u.onend = () => { if (!synth.speaking && !synth.pending) ttsBtn.classList.remove('speaking'); };
    synth.speak(u);
  }
}

// --- speech-to-text: dictate into the box by press-and-holding the mic button.
const SR = window.SpeechRecognition || window.webkitSpeechRecognition || null;

function buildRec() {
  const r = new SR();
  r.continuous = true; r.interimResults = true; r.lang = 'en-US';
  r.onresult = (e) => {
    let finalT = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const tr = e.results[i];
      if (tr.isFinal) finalT += tr[0].transcript; else interim += tr[0].transcript;
    }
    if (finalT) recBase = (recBase + ' ' + finalT).replace(/\s+/g, ' ').trimStart();
    box.value = (recBase + ' ' + interim).replace(/\s+/g, ' ').trimStart();
  };
  r.onend = () => { if (recOn) { try { r.start(); } catch {} } };  // Chrome auto-stops; keep alive while on
  r.onerror = (ev) => { if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') stopRec(); };
  return r;
}
function startRec() {
  if (!SR || recOn) return;
  if (synth) synth.cancel();                  // barge-in: don't read replies back into the mic
  rec = rec || buildRec();
  recBase = box.value; recOn = true;
  micBtn.classList.add('rec'); box.focus();
  try { rec.start(); } catch {}
}
function stopRec() {
  if (!recOn) return;
  recOn = false; micBtn.classList.remove('rec');
  try { rec.stop(); } catch {}
}
if (!SR) { micBtn.disabled = true; micBtn.title = 'Speech-to-text not supported in this browser'; }
else {
  // Push-to-talk: press and hold the mic to dictate, release to stop. The space
  // bar is intentionally NOT bound — it types a normal space like any textarea.
  micBtn.title = 'Hold to dictate (speech-to-text)';
  const hold = (e) => { e.preventDefault(); startRec(); };
  const release = () => stopRec();
  micBtn.addEventListener('pointerdown', hold);
  micBtn.addEventListener('pointerup', release);
  micBtn.addEventListener('pointerleave', release);
  micBtn.addEventListener('pointercancel', release);
}

// -- view switcher: one of four depth levels at a time ------------------------
// projects → sessions → transcript → tty. Mobile defaults to the transcript
// (native scroll, markdown, no xterm pain) for a session; the app opens on the
// projects rung. Drop to the tty only to get surgical.
const machinesPanel = document.getElementById('machines');
const projectsPanel = document.getElementById('projects');
const menuPanel = document.getElementById('menu');
const leftPanel = document.getElementById('left');
const rightPanel = document.getElementById('right');
const pmPanel = document.getElementById('pm');
const pmfeed = document.getElementById('pmfeed');
const panelBtn = document.getElementById('panelBtn');
const menuBtn = document.getElementById('menuBtn');
const projectsBtn = document.getElementById('projectsBtn');
function setView(view) {
  const tty = view === 'tty', sessions = view === 'sessions', projects = view === 'projects',
        machines = view === 'machines', pm = view === 'pm';
  machinesPanel.classList.toggle('hidden', !machines);
  projectsPanel.classList.toggle('hidden', !projects);
  menuPanel.classList.toggle('hidden', !sessions);
  leftPanel.classList.toggle('hidden', !tty);
  rightPanel.classList.toggle('hidden', !(view === 'transcript'));
  pmPanel.classList.toggle('hidden', !pm);
  document.getElementById('keys').style.display = (tty && isTouch) ? '' : 'none';  // key bar only for touch (the desktop terminal takes these keys natively)
  // Composer is hidden on the machines + projects rungs (nothing to talk to). On

  // than going to a session you're not viewing — say so in the placeholder.

  composer.style.display = (projects || machines) ? 'none' : '';
  box.placeholder = pm ? 'message → fleet PM' : sessions ? 'message → new session' : 'message';
  syncComposer();              // each level has its own draft — swap the box to this one's

  projectsBtn.classList.toggle('on', projects);
  machinesBtn.classList.toggle('on', machines);
  statusEl.classList.toggle('pmopen', pm);
  try { localStorage.setItem('cc_view', view); } catch {}
  refreshBreadcrumb(view);         // breadcrumb tracks the depth we just moved to
  syncUrl();                       // keep the URL in step with the depth we're at
  if (tty) showTTY();
  else if (projects && !isTouch) {  // landing on projects: box takes focus (skip touch — avoids popping the soft keyboard)
    const inp = projectsEl.querySelector('#addProject input');

  }

// the toggle button hops between the two deep views; projects/sessions have their own entries.
// Each is a manual nav, so it cancels any pending question auto-return (navTo wraps that).
const navTo = (v) => { viewBeforeQuestion = null; deferredView = null; setView(v); };
panelBtn.onclick = () => navTo(currentView() === 'tty' ? 'transcript' : 'tty');
menuBtn.onclick = () => { if (currentPid) navTo('sessions'); else navTo(FLEET && !currentMachine ? 'machines' : 'projects'); };
projectsBtn.onclick = () => navTo(FLEET && !currentMachine ? 'machines' : 'projects');
machinesBtn.onclick = () => navTo('machines');
document.getElementById('brand').onclick = () => navTo(FLEET ? 'machines' : 'projects');
if (!FLEET) machinesBtn.style.display = 'none';   // no machines rung when talking to a harness directly
pendingNav = parseHash();        // restore project / session / depth from the URL…
setView(pendingNav.view);        // …optimistically; resolvePendingNav refines once data lands

// Auto-surface the TUI when claude asks something interactive (AskUserQuestion,
// plan approval, permission prompt) — those render only in the terminal, so the
// transcript view would otherwise leave you not knowing. Restore the prior view
// once the prompt is answered. Skips work if you're already on the tty.
let viewBeforeQuestion = null;
function currentView() {
  if (!pmPanel.classList.contains('hidden')) return 'pm';
  if (!machinesPanel.classList.contains('hidden')) return 'machines';
  if (!projectsPanel.classList.contains('hidden')) return 'projects';
  if (!menuPanel.classList.contains('hidden')) return 'sessions';
  if (!leftPanel.classList.contains('hidden')) return 'tty';
  return 'transcript';

// -- URL routing: machine / project / session / depth live in the hash (the `?t=`
// token stays in the query) so a reload — or a shared link — lands back where you
// were. Shapes: `#/` machines · `#/m/<machine>` projects ·
// `#/m/<machine>/p/<pid>` sessions · `…/s/<cid>` transcript · `…/s/<cid>/tty` tty.
function parseHash() {
  const parts = location.hash.replace(/^#\/?/, '').split('/').filter(Boolean);
  const nav = { view: FLEET ? 'machines' : 'projects', machine: null, pid: null, cid: null };
  let i = 0;
  if (parts[0] === 'pm') { nav.view = 'pm'; return nav; }   // Fleet PM (its own top-level view)
  if (FLEET) {                                   // fleet: a machine prefixes the path
    if (parts[0] !== 'm' || !parts[1]) return nav;
    nav.machine = decodeURIComponent(parts[1]); nav.view = 'projects'; i = 2;
  }
  if (parts[i] === 'p' && parts[i + 1]) {
    nav.pid = decodeURIComponent(parts[i + 1]); nav.view = 'sessions';
    if (parts[i + 2] === 's' && parts[i + 3]) {
      nav.cid = decodeURIComponent(parts[i + 3]);
      nav.view = parts[i + 4] === 'tty' ? 'tty' : 'transcript';
    }
  }
  return nav;
}
function syncUrl() {
  if (pendingNav) return;          // mid-restore: don't write until the URL's state is applied
  const v = currentView();
  if (v === 'pm') { const h = '#/pm'; if (h !== location.hash) { lastWrittenHash = h; location.hash = h; } return; }
  let h = '#/';
  if (FLEET && currentMachine && v !== 'machines') h += 'm/' + encodeURIComponent(currentMachine);
  if ((!FLEET || currentMachine) && currentPid && v !== 'machines' && v !== 'projects') {
    if (h !== '#/') h += '/';
    h += 'p/' + encodeURIComponent(currentPid);
    if ((v === 'transcript' || v === 'tty') && currentCid) {
      h += '/s/' + encodeURIComponent(currentCid);
      if (v === 'tty') h += '/tty';
    }
  }
  if (h !== location.hash) { lastWrittenHash = h; location.hash = h; }
}
// Re-apply pendingNav as server data arrives (project list, then session list).
// Returns early — leaving pendingNav set — until the data it names shows up.
function resolvePendingNav() {
  const nav = pendingNav;
  if (!nav) return;
  if (nav.view === 'pm') { pendingNav = null; openPM(); return; }   // PM is harness-data-independent
  if (nav.machine) {
    if (!machineList.length) return;                         // roster not in yet
    if (!machineList.some(x => x.id === nav.machine)) {      // machine is gone
      pendingNav = null; currentMachine = null; setView('machines'); return;
    }
    if (currentMachine !== nav.machine) {                    // attach to it + fetch its list
      currentMachine = nav.machine;
      currentPid = null; currentCid = null; currentTitle = '';
      projectList = []; sessionList = []; gotSessions = false;
      hsend({ type: 'list' });
    }
  }
  if (nav.pid) {
    if (!projectList.length) return;                         // projects not in yet
    if (!projectList.some(p => p.pid === nav.pid)) {         // project is gone
      pendingNav = null; currentPid = null; setView('projects'); return;
    }
    currentPid = nav.pid;
    renderSessions();
  }
  if (nav.cid) {
    if (!gotSessions) return;                                // sessions not in yet
    const s = sessionList.find(x => x.cid === nav.cid);
    if (!s) {                                                // session is gone
      pendingNav = null; setView(currentPid ? 'sessions' : 'projects'); return;
    }
    currentPid = s.pid;
    subscribe(nav.cid);
  }
  pendingNav = null;
  setView(nav.view);
}
// Back/forward (or a hand-edited hash) — but ignore the writes syncUrl makes.
window.addEventListener('hashchange', () => {
  if (location.hash === lastWrittenHash) return;
  pendingNav = parseHash();
  resolvePendingNav();
});
function openTtyForQuestion() {
  if (currentView() === 'tty') return;
  if (viewBeforeQuestion === null) viewBeforeQuestion = currentView();
  autoSetView('tty');          // parks until you blur if you're mid-message
}
function restoreViewAfterQuestion() {
  if (viewBeforeQuestion === null) return;
  const v = viewBeforeQuestion; viewBeforeQuestion = null;
  autoSetView(v);
}

// -- depth navigation: views are an ordered stack, shallow → deep. Swipe right
// climbs out (toward projects); swipe left dives in (toward the tty), matching
// the iOS back-gesture feel. projects → sessions → transcript → tty.
// The two deep rungs are ordered by device preference: desktop dives into the
// terminal first (transcript one rung deeper), touch into the transcript first.
const LEVELS = (FLEET ? ['machines'] : []).concat(
  isTouch ? ['projects', 'sessions', 'transcript', 'tty']
          : ['projects', 'sessions', 'tty', 'transcript']);
function stepLevel(dir) {
  const i = LEVELS.indexOf(currentView());
  if (i === -1) return;
  let next = LEVELS[Math.min(LEVELS.length - 1, Math.max(0, i + dir))];
  // diving past the machines rung needs a chosen machine; pick the first online
  // one (selectMachine fetches its projects + drops us on the projects rung).
  if (FLEET && next === 'projects' && !currentMachine) {
    const on = machineList.find(m => m.online && m.kind !== 'relay');
    if (!on) return;
    selectMachine(on.id);
    return;
  }
  // diving past projects needs a selected project; fall back to the last one we
  // were on (currentPid persists), else the first ready project, else stay put.
  if (next === 'sessions' && !currentPid) {
    const ready = projectList.find(p => p.status !== 'cloning' && p.status !== 'error');
    if (!ready) return;
    currentPid = ready.pid; renderSessions();
  }
  // diving from the sessions list into a session returns to the last session we
  // viewed (currentCid persists). If that's gone/foreign to this project, pick
  // the first session in the project; if it has none, stay on the list.
  if ((next === 'transcript' || next === 'tty') && currentView() === 'sessions') {
    const here = sessionList.filter(s => s.pid === currentPid);
    if (!here.some(s => s.cid === currentCid)) {
      if (!here.length) return;            // nothing to dive into — stay on the list
      subscribe(here[0].cid);              // re-point at a real session for this project
    }
  }
  if (next !== currentView()) { viewBeforeQuestion = null; setView(next); }  // manual nav cancels auto-return
}

const goShallower = () => stepLevel(-1);   // swipe right / arrow left — climb out

// Keyboard mirror of the swipe gesture: ← climbs out, → dives in. Skipped while
// a text field owns focus — the message box (so arrows edit your draft) and the
// terminal's own hidden textarea (so arrows reach claude's TUI) — and when a
// modifier is held (Cmd/Alt+← etc. stay as browser/word-nav shortcuts).
window.addEventListener('keydown', (e) => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const el = document.activeElement;
  const tag = el && el.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'SELECT' ||
      (el && el.isContentEditable)) return;
  e.preventDefault();
  if (e.key === 'ArrowRight') goDeeper(); else goShallower();
});

// Ctrl+Shift navigation, mirroring the swipe/plain-arrow model but usable from
// inside the live terminal too: ←/→ move through the abstraction levels
// (projects ↔ sessions ↔ tty ↔ transcript), ↑/↓ cycle sessions at the current
// depth, W closes the current session, N spawns a new one (focusing the box on
// desktop, via openSession). Capture phase + stopPropagation so the
// keys never reach xterm's textarea (it would otherwise send them to the PTY).
// On macOS Ctrl+Shift+W is free (the browser's close-window shortcut is
// Cmd+Shift+W), so we don't fight it.
window.addEventListener('keydown', (e) => {
  if (!e.ctrlKey || !e.shiftKey || e.metaKey || e.altKey) return;
  let handled = true;
  if (e.key === 'ArrowRight') goDeeper();
  else if (e.key === 'ArrowLeft') goShallower();
  else if (e.key === 'ArrowDown') cycleSession(+1);
  else if (e.key === 'ArrowUp') cycleSession(-1);
  else if (e.code === 'KeyW') closeCurrentSession();
  else if (e.code === 'KeyN') newSession();   // spawn a session + focus the box to start typing
  else handled = false;
  if (handled) { e.preventDefault(); e.stopPropagation(); }
}, true);

// Horizontal swipe switches depth. Listen in the capture phase so xterm (which
// handles its own touches on the tty view) can't swallow it. Vertical motion is
// left untouched so the transcript scrolls natively.
//
// Bound to #app (header + main + FOOTER), not just <main>: on a phone the mobile
// key bar lives in the footer right below a short terminal, so a back-swipe near
// the bottom of the tty actually lands over the key bar. If we only listened on
// <main> that gesture was invisible to nav AND registered as a tap on the ↑
// button — the exact "swipe back triggers the up arrow" bug. Covering the footer
// makes the swipe win there too; swipeTap suppresses the stray key tap.
//
// ALL THREE listeners are PASSIVE — they never preventDefault(). An earlier
// version made touchmove non-passive to cancel horizontal native gestures, but a
// non-passive touchmove on an ancestor of a scroll container forces the browser
// to run this JS on every move *before* it may scroll, which made vertical
// scrolling in the terminal crawl and starved the swipe of frames ("works after
// a while"). We no longer need preventDefault: `touch-action: pan-y` on <main>
// and the xterm subtree already tells the browser "vertical scroll only, leave
// horizontal to JS", so it won't native-scroll horizontally or fire iOS's
// edge-swipe-back. We just observe the gesture and act on it at touchend, and the
// compositor scrolls vertically on its own thread → smooth.
const stage = document.getElementById('app');
let swX = 0, swY = 0, swT = 0, swOn = false, swAxis = null;   // swAxis: 'h' | 'v' once the gesture commits
let swipeTap = false;   // set when a gesture commits to horizontal → suppress the trailing click (e.g. on a key-bar button)
stage.addEventListener('touchstart', (e) => {
  swOn = e.touches.length === 1;
  swipeTap = false;
  // Don't hijack drags inside the message box (text selection / caret placement).
  if (e.target.closest('#box')) { swOn = false; return; }
  if (!swOn) return;
  const t = e.touches[0]; swX = t.clientX; swY = t.clientY; swT = Date.now(); swAxis = null;
}, { capture: true, passive: true });
stage.addEventListener('touchmove', (e) => {
  if (!swOn) return;
  const t = e.touches[0];
  const dx = t.clientX - swX, dy = t.clientY - swY;
  if (swAxis === null && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
    swAxis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';        // lock the axis on first real movement
  }
  if (swAxis === 'h') swipeTap = true;                        // a horizontal gesture → suppress the trailing key-bar tap
}, { capture: true, passive: true });
stage.addEventListener('touchend', (e) => {
  if (!swOn) return; swOn = false;
  const t = e.changedTouches[0];
  const dx = t.clientX - swX, dy = t.clientY - swY;
  if (Date.now() - swT > 800) return;                       // too slow for a flick
  if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy) * 1.8) return;  // not a clean horizontal swipe
  if (dx < 0) goDeeper(); else goShallower();
}, { capture: true, passive: true });

}

// ── Fleet PM — folded into the harness as a first-class 'pm' view (not a drawer).
//    Its conversation threads ride the same #sessionbar tab strip a project's
//    sessions do, and the chat reuses the transcript #feed look; the footer
//    composer talks to the current thread. Same-origin via the /pm/* proxy in
//    BOTH modes: direct → harness reverse-proxies to the local controller; fleet
//    → relay proxies to the box-resident controller (gated by your passkey).
const PM_BASE = '/pm';
const pmPost = (body) => ({ method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body || {}) });
const pmApi = async (path, opts) => (await fetch(PM_BASE + path, opts)).json();

// Rebuild a PM-minted deep link against THIS browser's hostname (so a link made
// on localhost still opens over the LAN), matching the controller chat's navHref.
function pmNavHref(r) {
  // Direct mode carries an explicit port (the chat origin ≠ the harness origin),
  // so rebuild host:port. Fleet mode omits the port (`port:null`) — the relay
  // serves chat + harness at one public origin, so rebuild against location.origin
  // (no box-internal :8788). Fall back to the absolute url for non-browser clients.
  if (r.path) return r.port ? location.protocol + '//' + location.hostname + ':' + r.port + r.path
                            : location.origin + r.path;
  return r.url || null;
}
// PM's own thinking spinner — independent of the session's singleton (a background
// session may be mid-turn while you're in the PM view), but reusing the same
// braille frames + .thinking markup so it reads identically to the transcript.
// (State declared up top so the hoisted render fns can touch it at boot.)
function pmShowThinking() {
  if (!pmThinkEl) {
    pmThinkEl = document.createElement('div');
    pmThinkEl.className = 'thinking';
    pmThinkEl.innerHTML = '<span class="spin"></span><span class="lbl"></span>';
    pmThinkStart = Date.now();
    pmThinkTimer = setInterval(pmPaintThinking, 1000);
    pmSpinTimer = setInterval(() => { if (pmThinkEl) { pmSpinFrame = (pmSpinFrame + 1) % SPIN_FRAMES.length; pmThinkEl.querySelector('.spin').textContent = SPIN_FRAMES[pmSpinFrame]; } }, 80);
  }
  pmfeed.appendChild(pmThinkEl); pmPaintThinking(); pmfeed.scrollTop = pmfeed.scrollHeight;
}
function pmPaintThinking() {
  if (!pmThinkEl) return;
  const secs = Math.round((Date.now() - pmThinkStart) / 1000);
  pmThinkEl.querySelector('.lbl').textContent = `pm is thinking… ${secs}s`;
}
function pmHideThinking() {
  if (pmThinkTimer) { clearInterval(pmThinkTimer); pmThinkTimer = null; }
  if (pmSpinTimer) { clearInterval(pmSpinTimer); pmSpinTimer = null; }
  if (pmThinkEl) { pmThinkEl.remove(); pmThinkEl = null; }
}
function pmBumpThinking() { if (pmThinkEl) pmfeed.appendChild(pmThinkEl); }   // re-pin below newest content

// A turn's tool trace → the same .msg.tool + collapsible .msg.tool_result bubbles
// a session shows for tool_use/tool_result events.
function pmRenderTrace(trace) {
  (trace || []).forEach(t => {
    if (!t || !t.tool) return;
    const d = bubble('tool', 'tool', '', false, pmfeed);
    const body = d.lastChild;
    const nm = document.createElement('span'); nm.className = 'toolname'; nm.textContent = t.tool;
    body.appendChild(nm); body.appendChild(document.createTextNode(' ' + summarizeInput(t.args || {})));
    if (t.result !== undefined)
      resultBubble(typeof t.result === 'string' ? t.result : JSON.stringify(t.result, null, 2), pmfeed);
  });
}
// The PM's prose reply → an assistant bubble (typewriter when live), with any
// "open ↗" deep-link button the PM produced appended to it.
function pmReplyBubble(m, typing) {
  const d = typing ? typeBubble('assistant', 'pm', m.text || '', pmfeed)
                   : bubble('assistant', 'pm', m.text || '', true, pmfeed);
  const nav = (m.trace || []).map(t => t && t.result).filter(r => r && r.nav).pop();
  const href = nav && pmNavHref(nav);
  if (href) {
    const a = document.createElement('a'); a.className = 'pmopen'; a.href = href;
    a.textContent = '↗ open ' + (nav.cid ? (nav.title || nav.cid) : (nav.name || nav.pid));
    d.appendChild(a);
  }
  return d;
}
// Rebuild the whole feed from the stored transcript (on thread switch / load),
// using the exact session vocabulary: user turn, then each bot turn's tools +
// reply. Live sends append incrementally (see pmSend) for the spinner/typewriter.
function renderPmFeed() {
  pmHideThinking();
  pmfeed.innerHTML = '';
  if (!pmMessages.length) {
    bubble('assistant', 'pm', "Hi — I'm your fleet PM. Ask what needs you, or tell me to start work on a project.", true, pmfeed);
  } else {
    pmMessages.forEach(m => {
      if (m.who === 'me') bubble('user', 'you', m.text || '', true, pmfeed);
      else { pmRenderTrace(m.trace); pmReplyBubble(m, false); }
    });
  }
  if (pmBusy) pmShowThinking();
  pmfeed.scrollTop = pmfeed.scrollHeight;
}
// PM threads in the #sessionbar: same .stab look as session tabs (dot + title),
// a subtle ✕ to archive, then trailing controls (new / clear / show-archived / debug).
function renderPmBar(bar, wasHidden) {
  bar.innerHTML = '';
  pmThreads.forEach(t => {
    if (t.archived && !pmArchOpen) return;
    const tab = document.createElement('button');
    tab.className = 'stab pmtab' + (t.id === pmCurrent ? ' active' : '') + (t.archived ? ' arch' : '');
    tab.title = t.archived ? 'archived — click to restore' : (t.title || 'thread');
    const dot = document.createElement('span'); dot.className = 'sdot'; tab.appendChild(dot);
    const lbl = document.createElement('span'); lbl.className = 'lbl'; lbl.textContent = t.title || 'new thread'; tab.appendChild(lbl);
    if (!t.archived) {
      const x = document.createElement('span'); x.className = 'x'; x.textContent = '✕'; x.title = 'archive';
      x.onclick = e => { e.stopPropagation(); pmArchive(t.id); };
      tab.appendChild(x);
    }
    tab.onclick = () => pmSelect(t.id);
    bar.appendChild(tab);
  });
  const ctl = (txt, title, fn) => { const b = document.createElement('button'); b.className = 'pmctl'; b.textContent = txt; b.title = title; b.onclick = fn; bar.appendChild(b); };
  ctl('＋ new', 'New PM thread', pmNew);
  ctl('🧹 clear', "Clear this thread's context (keeps the thread)", pmClear);
  const archN = pmThreads.filter(t => t.archived).length;
  if (archN) ctl(pmArchOpen ? 'hide archived' : '🗄 ' + archN, 'Show / hide archived threads',
                 () => { pmArchOpen = !pmArchOpen; renderPmBar(bar, false); });
  ctl('🛠', 'PM debug (prompt, tools, raw data)', () => window.open(PM_BASE + '/debug', '_blank'));
  // model picker — only meaningful for the bankr backend (claude-code -p drives
  // its own model). Fed from the cached /api/state (pmRefreshBadge keeps it warm).
  if ((pmState.backend || 'bankr') === 'bankr' && (pmState.models || []).length) {
    const sel = document.createElement('select');
    sel.className = 'pmctl'; sel.title = 'PM model (Bankr brain)';
    pmState.models.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; sel.appendChild(o); });
    if (pmState.model) sel.value = pmState.model;
    sel.onchange = async e => {
      const m = e.target.value;
      try { await pmApi('/api/model', pmPost({ model: m })); pmState.model = m; } catch (err) {}
    };
    bar.appendChild(sel);
  }
  bar.hidden = false;
  if (wasHidden) refitTTY();
}
function pmApplyThreads(s) {           // s = {threads, current, archived_count}
  if (!s || !s.threads) return;
  pmThreads = s.threads; pmCurrent = s.current; pmLoaded = true;
  if (currentView() === 'pm') renderSessionBar('pm');
}
async function pmLoadMessages() {
  try { const r = await pmApi('/api/thread/messages'); pmMessages = r.messages || []; }
  catch (e) { pmMessages = []; }
  if (currentView() === 'pm') renderPmFeed();
}
async function openPM() {
  setView('pm');                       // show immediately (renders current state)
  pmRefreshBadge();                    // populate pmState → the model picker shows without waiting for the poll
  try { pmApplyThreads(await pmApi('/api/threads')); } catch (e) { /* controller offline → greeting */ }
  await pmLoadMessages();
  syncComposer();                      // swap the footer box to this thread's draft
  setTimeout(() => box.focus(), 60);
}
async function pmSelect(tid) {
  if (tid === pmCurrent && pmLoaded) return;
  try { pmApplyThreads(await pmApi('/api/thread/select', pmPost({ id: tid }))); } catch (e) {}
  await pmLoadMessages();
  syncComposer(); syncUrl();
}
async function pmNew() {
  pmArchOpen = false;
  try { pmApplyThreads(await pmApi('/api/thread/new', pmPost({}))); } catch (e) {}
  pmMessages = []; renderPmFeed(); syncComposer(); box.focus();
}
async function pmClear() {
  try { pmApplyThreads(await pmApi('/api/thread/clear', pmPost({}))); } catch (e) {}
  pmMessages = []; renderPmFeed();
}
async function pmArchive(tid) {
  const wasCurrent = tid === pmCurrent;
  try { pmApplyThreads(await pmApi('/api/thread/archive', pmPost({ id: tid }))); } catch (e) {}
  if (wasCurrent) { await pmLoadMessages(); syncComposer(); }
}
async function pmSend(text) {
  if (pmBusy || !text.trim()) return;
  pmBusy = true;
  pmMessages.push({ who: 'me', text });
  bubble('user', 'you', text, true, pmfeed);   // append the user turn (no full rebuild)
  pmShowThinking();                             // braille spinner + elapsed time, like a session
  let out;
  try { out = await pmApi('/api/chat', pmPost({ message: text })); }
  catch (e) { out = { reply: '⚠️ controller unreachable (/pm)', trace: [] }; }
  pmHideThinking();
  const msg = { who: 'bot', text: out.reply || '(no reply)', trace: out.trace || [] };
  pmMessages.push(msg);
  pmRenderTrace(msg.trace);     // tool + collapsible result bubbles
  pmReplyBubble(msg, true);     // typewriter reveal of the reply
  pmBusy = false;
  try { pmApplyThreads(await pmApi('/api/threads')); } catch (e) {}   // refresh tab titles + counts (bar only)
  if (currentView() === 'pm') box.focus();
}
// The #status chip is the PM launcher; keep its attention badge fresh and, while
// the PM view is open, poll the thread list so titles/counts track live.
async function pmRefreshBadge() {
  try {
    const st = await pmApi('/api/state'); const n = st.attention_count;
    statusEl.title = 'Fleet PM — ' + (n ? n + ' need you' : 'all clear');
    statusEl.classList.toggle('needs', !!n);
    // cache model/backend for the PM-bar picker; re-render the bar if it changed
    const changed = st.model !== pmState.model || (st.models || []).join() !== (pmState.models || []).join()
                    || st.backend !== pmState.backend;
    pmState = { models: st.models || [], model: st.model || '', backend: st.backend || 'bankr' };
    if (changed && currentView() === 'pm') renderSessionBar('pm');
  } catch (e) { statusEl.title = 'Fleet PM (controller offline)'; statusEl.classList.remove('needs'); }
}
// #status opens the PM view, or leaves it (back to projects/sessions) if already there.
statusEl.onclick = () => {
  if (currentView() === 'pm') navTo(FLEET && !currentMachine ? 'machines' : (currentPid ? 'sessions' : 'projects'));
  else openPM();
};
pmRefreshBadge();
setInterval(() => {
  pmRefreshBadge();
  if (currentView() === 'pm' && pmLoaded) pmApi('/api/threads').then(pmApplyThreads).catch(() => {});
}, 5000);
if (parseHash().view === 'pm') openPM();   // deep-linked straight to the PM

connect();   // fleet: the passkey gate is the door. direct: the loopback harness needs no token, so always
             // connect; only a non-loopback (BIND=0.0.0.0) server that actually rejects surfaces a login
             // lazily via the authFails path in ws.onclose.
</script>
</body>
</html>
